      if (view === 'stockrrg') loadAllPanelsThen(() => { populateSectorDropdown(); drawStockRRG(); });
      if (view === 'swing') loadAllPanelsThen(buildSwingView);
      if (view === 'grid') loadAllPanelsThen(buildGridView);
      updateViewTitle();
    }

    // ── Shared table utilities ──
    const RANGE_KEYS = [
      { key: '1D',  label: '1D' },
      { key: '5D',  label: '5D' },
      { key: '1M',  label: '1M' },
      { key: '3M',  label: '3M' },
      { key: '6M',  label: '6M' },
      { key: 'YTD', label: 'YTD' },
      { key: '12M', label: '1Y' },
    ];

    let sectorsSortCol = 1;
    let sectorsSortAsc = false;
    let stocksSortCol = 3;
    let stocksSortAsc = false;
    let stocksFilterSector = -1; // -1 = all

    function computePctChange(prices, dates, rangeKey) {
      if (!prices || prices.length === 0) return null;
      const startDate = getRangeStartDate(rangeKey, dates);
      const startIdx = findStartIndex(dates, startDate);
      let startPrice = null;
      for (let i = startIdx; i < prices.length; i++) {
        if (prices[i] != null) { startPrice = prices[i]; break; }
      }
      if (!startPrice) return null;
      let endPrice = null;
      for (let i = prices.length - 1; i >= startIdx; i--) {
        if (prices[i] != null) { endPrice = prices[i]; break; }
      }
      if (!endPrice) return null;
      return ((endPrice - startPrice) / startPrice) * 100;
    }

    function heatmapColor(pct) {
      const isLight = document.documentElement.classList.contains('light');
      if (pct == null) return { bg: 'transparent', text: currentThemeColors.textQuaternary };
      const clamped = Math.max(-50, Math.min(100, pct));
      let r, g, b;
      if (isLight) {
        if (clamped >= 0) {
          const t = Math.min(clamped / 40, 1);
          r = Math.round(220 - t * 100);
          g = Math.round(240 - t * 40);
          b = Math.round(220 - t * 90);
        } else {
          const t = Math.min(Math.abs(clamped) / 30, 1);
          r = Math.round(240 - t * 20);
          g = Math.round(220 - t * 100);
          b = Math.round(220 - t * 100);
        }
        return { bg: `rgba(${r},${g},${b},0.7)`, text: currentThemeColors.textPrimary };
      } else {
        if (clamped >= 0) {
          const t = Math.min(clamped / 40, 1);
          r = Math.round(20 + t * 0);
          g = Math.round(40 + t * 140);
          b = Math.round(30 + t * 20);
        } else {
          const t = Math.min(Math.abs(clamped) / 30, 1);
          r = Math.round(60 + t * 150);
          g = Math.round(30 - t * 10);
          b = Math.round(30 - t * 5);
        }
        return { bg: `rgba(${r},${g},${b},0.6)`, text: currentThemeColors.textSecondary };
      }
    }

    function formatPct(pct) {
      if (pct == null) return '--';
      const sign = pct >= 0 ? '+' : '';
      return `${sign}${pct.toFixed(1)}%`;
    }

    function sortHeader(label, colIdx, activeCol, asc, fnName) {
      const sorted = colIdx === activeCol;
      const arrow = sorted ? (asc ? '&#9650;' : '&#9660;') : '&#9660;';
      return `<th class="${sorted ? 'sorted' : ''}" onclick="${fnName}(${colIdx})">
        ${label} <span class="sort-arrow">${arrow}</span></th>`;
    }

    function heatCell(pct) {
      const color = heatmapColor(pct);
      return `<td class="heatmap-cell" style="background:${color.bg};color:${color.text}">${formatPct(pct)}</td>`;
    }

    function pctTextColor(pct) {
      if (pct == null) return currentThemeColors.textQuaternary;
      if (pct > 0.5) return currentThemeColors.semanticBullish;
      if (pct < -0.5) return currentThemeColors.semanticBearish;
      return currentThemeColors.textQuaternary;
    }

    // Brighter colors for stocks table on black background
    function pctTextColorBright(pct) {
      const isLight = document.documentElement.classList.contains('light');
      if (pct == null) return isLight ? '#9ca3af' : '#555';
      if (pct > 0.5) return isLight ? '#059669' : '#4dd8b4';
      if (pct < -0.5) return isLight ? '#dc2626' : '#f0616d';
      return isLight ? '#9ca3af' : '#555';
    }

    async function loadAllPanelsThen(callback) {
      let allLoaded = true;
      for (let i = 0; i < PANEL_COUNT; i++) {
        if (!panelDataCache[i]) { allLoaded = false; break; }
      }
      if (!allLoaded) {
        for (let i = 0; i < PANEL_COUNT; i++) {
          if (!panelDataCache[i]) {
            const filename = `data/panel_${String(i + 1).padStart(2, '0')}.json`;
            try {
              const resp = await fetch(filename, { cache: 'no-store' });
              if (resp.ok) panelDataCache[i] = await resp.json();
            } catch (e) {}
          }
        }
      }
      callback();
    }

    // Get SPY pct changes (from panel 0)
    function getSpyPcts() {
      const data = panelDataCache[0];
      if (!data || !data.prices['SPY']) return RANGE_KEYS.map(() => null);
      return RANGE_KEYS.map(rk => computePctChange(data.prices['SPY'], data.dates, rk.key));
    }

    // Known ETFs - base symbols + equal-weight counterparts
    const ETF_TICKERS = new Set([
      'SPY','RSP','QQQ','DIA','IWM',
      'XLK','RYT','XLV','RYH','XLF','RYF','XLY','RCD',
      'XLP','RHS','XLE','RYE','XLI','RGI','XLB','RTM',
      'XLC','RSPC','XLU','RYU','XLRE','EWRE',
      'SMH','SOXX','XRT','XHB','IYT','XTN',
      'QQQE',
    ]);

    // ── Sectors View (ETFs + breadth + vs SPY) ──
    function buildSectorsView() {
      const container = document.getElementById('sectors-view');
      const spyPcts = getSpyPcts();

      const rows = [];
      for (let pi = 1; pi < PANEL_COUNT; pi++) { // skip panel 0 (Market ETFs Overview)
        const data = panelDataCache[pi];
        if (!data) continue;

        const basePrices = data.prices[data.baseSymbol];
        const basePcts = basePrices
          ? RANGE_KEYS.map(rk => computePctChange(basePrices, data.dates, rk.key))
          : RANGE_KEYS.map(() => null);

        // vs SPY for the selected sort column
        const vsSpy = RANGE_KEYS.map((rk, ci) =>
          (basePcts[ci] != null && spyPcts[ci] != null) ? basePcts[ci] - spyPcts[ci] : null
        );

        // Equal-weight ETF pcts
        const ewSym = CAP_TO_EQUAL[data.baseSymbol];
        let ewPcts = RANGE_KEYS.map(() => null);
        if (ewSym && ewSym !== data.baseSymbol) {
          let ewPrices = data.prices[ewSym];
          if (!ewPrices && panelDataCache[0]) ewPrices = panelDataCache[0].prices[ewSym];
          if (ewPrices) {
            const ewDates = data.prices[ewSym] ? data.dates : panelDataCache[0].dates;
            ewPcts = RANGE_KEYS.map(rk => computePctChange(ewPrices, ewDates, rk.key));
          }
        }

        // Breadth: % of stocks in sector that are positive for selected timeframe
        let positiveCount = 0, totalCount = 0;
        data.symbols.forEach(sym => {
          if (ETF_TICKERS.has(sym)) return; // skip ETFs for breadth
          const prices = data.prices[sym];
          if (!prices) return;
          const pct = computePctChange(prices, data.dates, RANGE_KEYS[sectorsSortCol].key);
          if (pct != null) { totalCount++; if (pct > 0) positiveCount++; }
        });
        const breadth = totalCount > 0 ? (positiveCount / totalCount) * 100 : null;

        // Momentum: compare short-term rank direction (1M vs 3M performance)
        const pct1M = computePctChange(basePrices, data.dates, '1M');
        const pct3M = computePctChange(basePrices, data.dates, '3M');
        let momentum = 'flat';
        if (pct1M != null && pct3M != null) {
          // normalize 3M to monthly rate for comparison
          const monthly3M = pct3M / 3;
          if (pct1M > monthly3M + 1) momentum = 'up';
          else if (pct1M < monthly3M - 1) momentum = 'down';
        }

        // Collect ETF symbols in this sector
        const etfRows = [];
        data.symbols.forEach(sym => {
          if (!ETF_TICKERS.has(sym)) return;
          const prices = data.prices[sym];
          if (!prices) return;
          const pcts = RANGE_KEYS.map(rk => computePctChange(prices, data.dates, rk.key));
          const vsSpyPcts = RANGE_KEYS.map((rk, ci) =>
            (pcts[ci] != null && spyPcts[ci] != null) ? pcts[ci] - spyPcts[ci] : null
          );
          etfRows.push({ sym, pcts, vsSpy: vsSpyPcts, isBase: sym === data.baseSymbol });
        });

        etfRows.sort((a, b) => {
          const aVal = a.pcts[sectorsSortCol] ?? -Infinity;
          const bVal = b.pcts[sectorsSortCol] ?? -Infinity;
          return sectorsSortAsc ? aVal - bVal : bVal - aVal;
        });

        rows.push({
          panelIndex: pi, title: data.title, baseSymbol: data.baseSymbol,
          sectorColor: SECTOR_COLORS[pi % SECTOR_COLORS.length],
          basePcts, vsSpy, ewPcts, breadth, momentum, etfRows,
        });
      }

      // Sort sectors
      rows.sort((a, b) => {
        const aVal = a.basePcts[sectorsSortCol] ?? -Infinity;
        const bVal = b.basePcts[sectorsSortCol] ?? -Infinity;
        return sectorsSortAsc ? aVal - bVal : bVal - aVal;
      });

      // Sort toolbar
      let html = '<div class="sector-grid-toolbar">';
      html += '<span class="topbar-label">Sort</span>';
      RANGE_KEYS.forEach((rk, ci) => {
        const active = ci === sectorsSortCol ? ' active' : '';
        const arrow = ci === sectorsSortCol ? (sectorsSortAsc ? ' &#9650;' : ' &#9660;') : '';
        html += `<button class="sort-btn${active}" onclick="sortSectors(${ci})">${rk.label}${arrow}</button>`;
      });
      html += '</div>';

      // Market Health card
      const p0 = panelDataCache[0];
      if (p0) {
        const mhTickers = ['SPY', 'RSP', 'QQQ', 'QQQE'];
        const mhPctsMap = {};
        const mhSignalsMap = {};
        mhTickers.forEach(tk => {
          const prices = p0.prices[tk];
          if (prices) {
            mhPctsMap[tk] = RANGE_KEYS.map(rk => computePctChange(prices, p0.dates, rk.key));
            mhSignalsMap[tk] = computeMASignals(prices);
          } else {
            mhPctsMap[tk] = RANGE_KEYS.map(() => null);
            mhSignalsMap[tk] = { dEma8: null, dEma21: null, dMa50: null, dMa200: null, goldenCross: null, wEma8: null, wEma21: null, wMa50: null };
          }
        });

        const riskCats = computeRiskCategories(
          mhSignalsMap['SPY'], mhSignalsMap['RSP'],
          mhPctsMap['SPY'], mhPctsMap['RSP']
        );

        html += '<div class="market-health-card">';
        html += '<div class="market-health-header">';
        html += '<span class="mh-title">Market Health</span>';
        html += `<span class="market-health-risk ${riskCats.overall.cls}">${riskCats.overall.label}</span>`;
        html += '</div>';

        // Returns table
        html += '<table class="market-health-table"><thead><tr>';
        html += '<th></th>';
        RANGE_KEYS.forEach((rk, ci) => {
          const ac = ci === sectorsSortCol ? ' class="mh-active-col"' : '';
          html += `<th${ac}>${rk.label}</th>`;
        });
        html += '</tr></thead><tbody>';
        mhTickers.forEach(tk => {
          const pcts = mhPctsMap[tk];
          html += `<tr><td>${tk}</td>`;
          pcts.forEach((p, ci) => {
            const ac = ci === sectorsSortCol ? ' mh-active-col' : '';
            html += `<td class="${ac}" style="color:${pctTextColorBright(p)}">${formatPct(p)}</td>`;
          });
          html += '</tr>';
        });
        html += '</tbody></table>';

        // Category boxes
        function renderCatBox(name, cat) {
          let h = `<div class="mh-cat-box">`;
          h += `<div class="mh-cat-header">`;
          h += `<span class="mh-cat-label">${name}</span>`;
          h += `<span class="mh-cat-badge ${cat.cls}">${cat.label}</span>`;
          h += `</div><div class="mh-cat-signals">`;
          cat.signals.forEach(s => {
            const cls = s.value == null ? 'mh-sig-na' : s.value ? 'mh-sig-bull' : 'mh-sig-bear';
            const arrow = s.value == null ? '&#8211;' : s.value ? '&#9650;' : '&#9660;';
            const detail = s.detail ? `<span class="mh-sig-detail">${s.detail}</span>` : '';
            h += `<div class="mh-signal-row"><span class="mh-sig-label">${s.label}</span><span class="mh-sig-right">${detail}<span class="mh-sig-arrow ${cls}">${arrow}</span></span></div>`;
          });
          h += `</div></div>`;
          return h;
        }

        html += '<div class="mh-categories">';
        html += renderCatBox('Trend', riskCats.trend);
        html += renderCatBox('Breadth', riskCats.breadth);
        html += renderCatBox('Momentum', riskCats.momentum);
        html += renderCatBox('Regime', riskCats.regime);
        html += '</div>';

        html += '</div>'; // end market-health-card
      }

      // Tile grid
      html += '<div class="sector-grid">';
      rows.forEach(sector => {
        // Strip leading number + dot from title (e.g. "2. Tech - Software" → "Tech - Software")
        const shortTitle = sector.title.replace(/^\d+\.\s*/, '');
        const momClass = sector.momentum === 'up' ? 'momentum-up' : sector.momentum === 'down' ? 'momentum-down' : 'momentum-flat';
        const momArrow = sector.momentum === 'up' ? '&#9650;' : sector.momentum === 'down' ? '&#9660;' : '&#9644;';
        const bPct = sector.breadth != null ? sector.breadth.toFixed(0) : '--';
        const bWidth = sector.breadth != null ? sector.breadth : 0;
        const bColor = bWidth >= 60 ? currentThemeColors.semanticBullish : bWidth >= 40 ? currentThemeColors.semanticNeutral : currentThemeColors.semanticBearish;

        html += `<div class="sector-tile">`;

        // Header: color bar, name, symbol, breadth, momentum
        html += `<div class="sector-tile-header">`;
        html += `<div class="tile-color" style="background:${sector.sectorColor}"></div>`;
        html += `<span class="tile-name" style="color:${sector.sectorColor}">${shortTitle}</span>`;
        html += `<span class="tile-sym">${sector.baseSymbol}</span>`;
        const rsVal = sector.vsSpy[sectorsSortCol];
        const rsColor = pctTextColorBright(rsVal);
        html += `<span class="tile-rs-tag" style="color:${rsColor};border-color:${rsColor}">${formatPct(rsVal)}</span>`;
        html += `<span class="tile-breadth"><span class="tile-breadth-bar"><span class="tile-breadth-fill" style="width:${bWidth}%;background:${bColor}"></span></span><span class="tile-breadth-pct">${bPct}%</span></span>`;
        html += `<span class="tile-mom ${momClass}">${momArrow}</span>`;
        html += `</div>`;

        // Body: sub-headers + 7 timeframe rows
        html += `<div class="sector-tile-body">`;
        html += `<div class="sector-tile-row tile-col-headers"><span class="row-label"></span><span class="row-pct col-sub">CW</span><span class="row-vs col-sub">EW</span></div>`;
        RANGE_KEYS.forEach((rk, ci) => {
          const pct = sector.basePcts[ci];
          const ew = sector.ewPcts[ci];
          const activeClass = ci === sectorsSortCol ? ' active-sort' : '';
          html += `<div class="sector-tile-row${activeClass}">`;
          html += `<span class="row-label">${rk.label}</span>`;
          html += `<span class="row-pct" style="color:${pctTextColorBright(pct)}">${formatPct(pct)}</span>`;
          html += `<span class="row-vs" style="color:${pctTextColorBright(ew)}">${formatPct(ew)}</span>`;
          html += `</div>`;
        });
        html += `</div>`;

        // Collapsible ETF detail
        html += `<div class="sector-tile-etfs">`;
        sector.etfRows.forEach(etf => {
          const ePct = etf.pcts[sectorsSortCol];
          html += `<div class="etf-line">`;
          html += `<span class="etf-sym">${etf.sym}</span>`;
          html += `<span class="etf-pct" style="color:${pctTextColorBright(ePct)}">${formatPct(ePct)}</span>`;
          html += `</div>`;
        });
        html += `</div>`;

        html += `</div>`; // end .sector-tile
      });
      html += '</div>'; // end .sector-grid

      container.innerHTML = html;
    }

    function sortSectors(colIndex) {
      if (sectorsSortCol === colIndex) sectorsSortAsc = !sectorsSortAsc;
      else { sectorsSortCol = colIndex; sectorsSortAsc = false; }
      buildSectorsView();
    }

    // ── Stocks View (individual stocks, vs sector ETF) ──
    function buildStocksView() {
      const container = document.getElementById('stocks-view');
      const spyPcts = getSpyPcts();

      // Collect all individual stocks across all panels
      const allStocks = [];
      for (let pi = 0; pi < PANEL_COUNT; pi++) {
        const data = panelDataCache[pi];
        if (!data) continue;

        // Compute base ETF pcts for "vs Sector" column
        const basePrices = data.prices[data.baseSymbol];
        const basePcts = basePrices
          ? RANGE_KEYS.map(rk => computePctChange(basePrices, data.dates, rk.key))
          : RANGE_KEYS.map(() => null);

        data.symbols.forEach(sym => {
          if (ETF_TICKERS.has(sym)) return; // skip ETFs
          const prices = data.prices[sym];
          if (!prices) return;
          const pcts = RANGE_KEYS.map(rk => computePctChange(prices, data.dates, rk.key));

          // vs Sector: stock performance minus sector ETF performance
          const vsSector = RANGE_KEYS.map((rk, ci) =>
            (pcts[ci] != null && basePcts[ci] != null) ? pcts[ci] - basePcts[ci] : null
          );
          // vs SPY
          const vsSpy = RANGE_KEYS.map((rk, ci) =>
            (pcts[ci] != null && spyPcts[ci] != null) ? pcts[ci] - spyPcts[ci] : null
          );

          allStocks.push({
            sym, pcts, vsSector, vsSpy,
            panelIndex: pi,
            sectorTitle: data.title,
            sectorColor: SECTOR_COLORS[pi % SECTOR_COLORS.length],
            baseSymbol: data.baseSymbol,
          });
        });
      }

      // Filter by sector
      const filtered = stocksFilterSector === -1
        ? allStocks
        : allStocks.filter(s => s.panelIndex === stocksFilterSector);

      // Sort
      filtered.sort((a, b) => {
        const aVal = a.pcts[stocksSortCol] ?? -Infinity;
        const bVal = b.pcts[stocksSortCol] ?? -Infinity;
        return stocksSortAsc ? aVal - bVal : bVal - aVal;
      });

      // Toolbar with sector filter
      let html = '<div class="table-toolbar">';
      html += '<span class="topbar-label">Sector</span>';
      html += '<select onchange="filterStocksBySector(this.value)">';
      html += `<option value="-1" ${stocksFilterSector === -1 ? 'selected' : ''}>All Sectors (${allStocks.length} stocks)</option>`;

    function toggleSector(headerRow, viewType) {

    // ── Swing Scoring Engine ──

    function getWindowReturn(prices, endIdx, windowLen) {
      const startIdx = endIdx - windowLen;
      if (startIdx < 0) return null;
      const startP = prices[startIdx];
      const endP = prices[endIdx];
      if (startP == null || endP == null || startP === 0) return null;
      return (endP / startP - 1) * 100;
    }

    function computeAllSwingScores() {
      swingScoreCache = {};
      const spyData = panelDataCache[0];
      if (!spyData || !spyData.prices['SPY']) return;
      const spyPrices = spyData.prices['SPY'];
      const endIdx = spyData.dates.length - 1;
      if (endIdx < SWING_WINDOWS.long) return;

      // Ensure RS ratings are computed
      if (!rsRatingCache) computeAllRSRatings('12M');

      for (let pi = 0; pi < PANEL_COUNT; pi++) {
        const data = panelDataCache[pi];
        if (!data) continue;
        const basePrices = data.prices[data.baseSymbol];
        if (!basePrices) continue;
        const ewSym = CAP_TO_EQUAL[data.baseSymbol];
        let ewPrices = ewSym ? data.prices[ewSym] : null;
        if (!ewPrices && ewSym && panelDataCache[0]) ewPrices = panelDataCache[0].prices[ewSym];

        // Sector ETF returns vs SPY for sector context sub-score
        const sectorVsSpy10 = (getWindowReturn(basePrices, endIdx, SWING_WINDOWS.short) ?? 0) - (getWindowReturn(spyPrices, endIdx, SWING_WINDOWS.short) ?? 0);
        const sectorVsSpy20 = (getWindowReturn(basePrices, endIdx, SWING_WINDOWS.mid) ?? 0) - (getWindowReturn(spyPrices, endIdx, SWING_WINDOWS.mid) ?? 0);
        const sectorVsSpy40 = (getWindowReturn(basePrices, endIdx, SWING_WINDOWS.long) ?? 0) - (getWindowReturn(spyPrices, endIdx, SWING_WINDOWS.long) ?? 0);

        data.symbols.forEach(sym => {
          if (ETF_TICKERS.has(sym)) return;
          const prices = data.prices[sym];
          if (!prices) return;

          // Relative return series
          const stockRet10 = getWindowReturn(prices, endIdx, SWING_WINDOWS.short);
          const stockRet20 = getWindowReturn(prices, endIdx, SWING_WINDOWS.mid);
          const stockRet40 = getWindowReturn(prices, endIdx, SWING_WINDOWS.long);
          const baseRet10 = getWindowReturn(basePrices, endIdx, SWING_WINDOWS.short);
          const baseRet20 = getWindowReturn(basePrices, endIdx, SWING_WINDOWS.mid);
          const baseRet40 = getWindowReturn(basePrices, endIdx, SWING_WINDOWS.long);
          const spyRet10 = getWindowReturn(spyPrices, endIdx, SWING_WINDOWS.short);
          const spyRet20 = getWindowReturn(spyPrices, endIdx, SWING_WINDOWS.mid);
          const spyRet40 = getWindowReturn(spyPrices, endIdx, SWING_WINDOWS.long);

          if (stockRet10 == null || stockRet20 == null) return;

          const vsSectorCap10d = (stockRet10 ?? 0) - (baseRet10 ?? 0);
          const vsSectorCap20d = (stockRet20 ?? 0) - (baseRet20 ?? 0);
          const vsSectorCap40d = (stockRet40 ?? 0) - (baseRet40 ?? 0);

          const ewRet10 = ewPrices ? getWindowReturn(ewPrices, endIdx, SWING_WINDOWS.short) : baseRet10;
          const ewRet20 = ewPrices ? getWindowReturn(ewPrices, endIdx, SWING_WINDOWS.mid) : baseRet20;
          const vsSectorEW10d = (stockRet10 ?? 0) - (ewRet10 ?? 0);
          const vsSectorEW20d = (stockRet20 ?? 0) - (ewRet20 ?? 0);

          const vsSPY10d = (stockRet10 ?? 0) - (spyRet10 ?? 0);
          const vsSPY20d = (stockRet20 ?? 0) - (spyRet20 ?? 0);

          // Structure sub-score (0–6)
          let structure = 0;
          if (vsSectorCap10d > 0) structure++;
          if (vsSectorCap20d > 0) structure++;
          if (vsSectorEW10d > 0) structure++;
          if (vsSectorEW20d > 0) structure++;
          if (vsSPY10d > 0) structure++;
          if (vsSPY20d > 0) structure++;

          // Acceleration sub-score (0–5)
          let acceleration = 0;
          if (vsSectorCap10d > vsSectorCap20d) acceleration++;
          if (vsSectorEW10d > vsSectorEW20d) acceleration++;
          if (vsSPY10d > vsSPY20d) acceleration++;

          // RS Rating momentum
          const rsArr = rsRatingCache ? rsRatingCache[sym] : null;
          let rsRating = null;
          let rsRating10ago = null;
          let rsRating20ago = null;
          if (rsArr) {
            rsRating = rsArr[endIdx];
            rsRating10ago = endIdx >= 10 ? rsArr[endIdx - 10] : null;
            rsRating20ago = endIdx >= 20 ? rsArr[endIdx - 20] : null;
          }
          if (rsRating != null && rsRating10ago != null && rsRating > rsRating10ago) acceleration++;
          if (rsRating != null && rsRating20ago != null && rsRating > rsRating20ago) acceleration++;

          // Sector context sub-score (0–3)
          let sector = 0;
          if (sectorVsSpy10 > 0) sector++;
          if (sectorVsSpy20 > 0) sector++;
          if (sectorVsSpy40 > 0) sector++;

          const total = structure + acceleration + sector;

          // Rotation stage (1–4) — benchmark-dependent
          const vsSPY40d = (stockRet40 ?? 0) - (spyRet40 ?? 0);
          let rot10, rot20, rot40;
          if (rotationBenchmark === 'spy') {
            rot10 = vsSPY10d; rot20 = vsSPY20d; rot40 = vsSPY40d;
          } else if (rotationBenchmark === 'absolute') {
            rot10 = stockRet10 ?? 0; rot20 = stockRet20 ?? 0; rot40 = stockRet40 ?? 0;
          } else {
            rot10 = vsSectorCap10d; rot20 = vsSectorCap20d; rot40 = vsSectorCap40d;
          }
          let rotation;
          if (rot10 < 0 && rot20 < 0 && rot40 < 0) {
            rotation = 4; // Decline
          } else if (rot40 < 0 && rot10 > 0) {
            rotation = 1; // Accumulation
          } else if (rot10 > 0 && rot20 > 0 && rot40 > 0) {
            rotation = 2; // Markup
          } else if (rot40 > 0 && rot10 < 0) {
            rotation = 3; // Distribution
          } else {
            const positiveCount = (rot10 > 0 ? 1 : 0) + (rot20 > 0 ? 1 : 0) + (rot40 > 0 ? 1 : 0);
            if (positiveCount >= 2) rotation = 2;
            else rotation = 4;
          }

          // Signal derivation
          let signal = null;
          if (total >= 12 && (rotation === 1 || rotation === 2) && rsRating != null && rsRating > 75) {
            signal = 'BULLISH';
          } else if (total <= 2 && (rotation === 3 || rotation === 4) && rsRating != null && rsRating < 25) {
            signal = 'BEARISH';
          } else if (total >= 9 && rotation === 1 && acceleration >= 4) {
            signal = 'WATCH';
          }

          swingScoreCache[sym] = {
            total, structure, acceleration, sector, rotation,
            rotationLabel: ROTATION_STAGES[rotation].label,
            signal,
            rsRating: rsRating != null ? Math.round(rsRating) : null,
            vsSectorCap10d, vsSectorCap20d, vsSectorCap40d,
            vsSPY10d, vsSPY20d,
            panelIndex: pi,
            sectorTitle: data.title,
            baseSymbol: data.baseSymbol,
          };
        });
      }
    }

    // ── Grid View ──
    function buildGridView() {
      const container = document.getElementById('grid-view');
      if (!container.classList.contains('active')) return;

      // Collect sector options for filter
      const sectorOpts = ['<option value="all">All Sectors</option>'];
      const seenBase = new Set();
      for (let pi = 1; pi < PANEL_COUNT; pi++) {
        const d = panelDataCache[pi];
        if (!d) continue;
        const sym = d.baseSymbol;
        if (seenBase.has(sym)) continue;
        seenBase.add(sym);
        const name = SECTOR_SHORT_NAMES[sym] || d.title.replace(/^\d+\.\s*/, '');
        sectorOpts.push(`<option value="${pi}"${gridSectorFilter == pi ? ' selected' : ''}>${sym} — ${name}</option>`);
      }

      // Ensure swing scores are computed for rotation tags + RS rating
      if (Object.keys(swingScoreCache).length === 0) {
        if (!rsRatingCache) computeAllRSRatings('12M');
        computeAllSwingScores();
      }

      // Collect stocks with metadata
      const stocks = [];
      for (let pi = 1; pi < PANEL_COUNT; pi++) {
        const d = panelDataCache[pi];
        if (!d) continue;
        if (gridSectorFilter !== 'all' && pi !== parseInt(gridSectorFilter)) continue;
        for (const sym of d.symbols) {
          if (sym === d.baseSymbol) continue;
          if (!d.prices[sym]) continue;
          const sectorName = SECTOR_SHORT_NAMES[d.baseSymbol] || d.title.replace(/^\d+\.\s*/, '');
          const swing = swingScoreCache[sym] || {};
          // EMA proximity
          const prices = d.prices[sym];
          const len = prices.length;
          let last = null;
          for (let i = len - 1; i >= 0; i--) { if (prices[i] != null) { last = prices[i]; break; } }
          let nearEma8 = false, nearEma21 = false, ema8Dist = null, ema21Dist = null;
          if (last != null) {
            const calcEma = (period) => { const k = 2 / (period + 1); let ema = null; for (let i = 0; i < len; i++) { if (prices[i] == null) continue; ema = ema == null ? prices[i] : prices[i] * k + ema * (1 - k); } return ema; };
            const e8 = calcEma(8), e21 = calcEma(21);
            if (e8 != null) { ema8Dist = ((last - e8) / e8) * 100; nearEma8 = ema8Dist >= 0 && ema8Dist <= 3; }
            if (e21 != null) { ema21Dist = ((last - e21) / e21) * 100; nearEma21 = ema21Dist >= 0 && ema21Dist <= 5; }
          }
          // Compute returns (1D, 5D, 1M, 3M)
          let ret1d = null, ret5d = null, ret1m = null, ret3m = null;
          if (last != null) {
            const validPrices = [];
            for (let i = 0; i < len; i++) { if (prices[i] != null) validPrices.push(prices[i]); }
            const vLen = validPrices.length;
            if (vLen >= 2) ret1d = ((last - validPrices[vLen - 2]) / validPrices[vLen - 2]) * 100;
            if (vLen >= 6) ret5d = ((last - validPrices[vLen - 6]) / validPrices[vLen - 6]) * 100;
            if (vLen >= 22) ret1m = ((last - validPrices[vLen - 22]) / validPrices[vLen - 22]) * 100;
            if (vLen >= 65) ret3m = ((last - validPrices[vLen - 65]) / validPrices[vLen - 65]) * 100;
          }
          // RSI delta (5-bar) and MA50 distance
          let rsiDelta = null, ma50Dist = null;
          if (last != null) {
            // RSI series (14-period)
            const rsiPeriod = 14;
            let gains = 0, losses = 0, rsiArr = [];
            for (let i = 1; i < len; i++) {
              if (prices[i] == null || prices[i-1] == null) { rsiArr.push(null); continue; }
              const chg = prices[i] - prices[i-1];
              if (i <= rsiPeriod) {
                if (chg > 0) gains += chg; else losses -= chg;
                if (i === rsiPeriod) {
                  gains /= rsiPeriod; losses /= rsiPeriod;
                  rsiArr.push(losses === 0 ? 100 : 100 - 100 / (1 + gains / losses));
                } else { rsiArr.push(null); }
              } else {
                gains = (gains * (rsiPeriod - 1) + (chg > 0 ? chg : 0)) / rsiPeriod;
                losses = (losses * (rsiPeriod - 1) + (chg < 0 ? -chg : 0)) / rsiPeriod;
                rsiArr.push(losses === 0 ? 100 : 100 - 100 / (1 + gains / losses));
              }
            }
            const rsiValid = rsiArr.filter(v => v != null);
            const rsiLen = rsiValid.length;
            if (rsiLen >= 6) {
              rsiDelta = rsiValid[rsiLen - 1] - rsiValid[rsiLen - 6];
            }
            // MA50 distance in ATR multiples
            const ohlcSym = d.ohlc && d.ohlc[sym];
            const validPricesAll = [];
            for (let i = 0; i < len; i++) { if (prices[i] != null) validPricesAll.push(prices[i]); }
            if (validPricesAll.length >= 50) {
              let sum50 = 0;
              for (let i = validPricesAll.length - 50; i < validPricesAll.length; i++) sum50 += validPricesAll[i];
              const ma50 = sum50 / 50;
              // ATR(14) using true range: max(H-L, |H-prevC|, |L-prevC|)
              const atrPeriod = 14;
              let atrSum = 0, atrCount = 0;
              for (let i = len - atrPeriod; i < len; i++) {
                if (i < 1 || prices[i] == null || prices[i-1] == null) continue;
                const h = ohlcSym && ohlcSym.h && ohlcSym.h[i] != null ? ohlcSym.h[i] : prices[i];
                const l = ohlcSym && ohlcSym.l && ohlcSym.l[i] != null ? ohlcSym.l[i] : prices[i];
                const pc = prices[i-1];
                const tr = Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc));
                atrSum += tr; atrCount++;
              }
              if (atrCount > 0) {
                const atr = atrSum / atrCount;
                ma50Dist = atr > 0 ? (last - ma50) / atr : null;
              }
            }
          }
          // ADR% = (SMA(High, 14) / SMA(Low, 14) - 1) * 100  (TradingView method)
          let adrPct = null;
          const ohlcSymAdr = d.ohlc && d.ohlc[sym];
          if (last != null && ohlcSymAdr && ohlcSymAdr.h && ohlcSymAdr.l) {
            let hSum = 0, lSum = 0, adrN = 0;
            for (let i = len - 14; i < len; i++) {
              if (i < 0 || ohlcSymAdr.h[i] == null || ohlcSymAdr.l[i] == null) continue;
              hSum += ohlcSymAdr.h[i];
              lSum += ohlcSymAdr.l[i];
              adrN++;
            }
            if (adrN > 0 && lSum > 0) adrPct = ((hSum / adrN) / (lSum / adrN) - 1) * 100;
          }
          // RS leading price: RS Rating climbing ranks while price flat/down
          let rsLeading = false;
          const rsArr = rsRatingCache ? rsRatingCache[sym] : null;
          if (rsArr && len > 20) {
            let rsNow = null, rs20ago = null;
            for (let i = len - 1; i >= 0; i--) { if (rsArr[i] != null) { rsNow = rsArr[i]; break; } }
            const ago20 = len - 21;
            if (ago20 >= 0) rs20ago = rsArr[ago20];
            const rsRising = rsNow != null && rs20ago != null && rsNow - rs20ago >= 5;
            const priceFlat = ret1m != null && ret1m <= 2;
            rsLeading = rsRising && priceFlat;
          }
          // Pullback detection: strong stock pulling back to EMA with RSI cooling
          let isPullback = false;
          if (last != null && swing.rsRating != null && swing.rsRating >= 60 && (swing.rotation === 2 || swing.rotation === 1)) {
            const nearMA = (ema8Dist != null && ema8Dist >= -3 && ema8Dist <= 1) || (ema21Dist != null && ema21Dist >= -3 && ema21Dist <= 2);
            const rsiCooled = rsiDelta != null && rsiDelta < 0;
            isPullback = nearMA && rsiCooled;
          }
          // Volatility contraction: recent ATR shrinking vs historical
          let volContraction = false;
          if (last != null && ohlcSymAdr && ohlcSymAdr.h && ohlcSymAdr.l && len >= 40) {
            let atr5 = 0, n5 = 0, atr20 = 0, n20 = 0;
            for (let i = len - 5; i < len; i++) {
              if (i < 1 || prices[i] == null || prices[i-1] == null) continue;
              const hv = ohlcSymAdr.h[i] != null ? ohlcSymAdr.h[i] : prices[i];
              const lv = ohlcSymAdr.l[i] != null ? ohlcSymAdr.l[i] : prices[i];
              atr5 += Math.max(hv - lv, Math.abs(hv - prices[i-1]), Math.abs(lv - prices[i-1]));
              n5++;
            }
            for (let i = len - 20; i < len; i++) {
              if (i < 1 || prices[i] == null || prices[i-1] == null) continue;
              const hv = ohlcSymAdr.h[i] != null ? ohlcSymAdr.h[i] : prices[i];
              const lv = ohlcSymAdr.l[i] != null ? ohlcSymAdr.l[i] : prices[i];
              atr20 += Math.max(hv - lv, Math.abs(hv - prices[i-1]), Math.abs(lv - prices[i-1]));
              n20++;
            }
            if (n5 > 0 && n20 > 0) {
              const ratio = (atr5 / n5) / (atr20 / n20);
              volContraction = ratio < 0.7;
            }
          }
          // 52-week high proximity
          let near52wHigh = false, at52wHigh = false;
          if (last != null && len >= 252) {
            let high52 = -Infinity;
            for (let i = len - 252; i < len; i++) {
              if (prices[i] != null && prices[i] > high52) high52 = prices[i];
            }
            if (high52 > 0) {
              const pctFrom52 = ((last - high52) / high52) * 100;
              at52wHigh = pctFrom52 >= -2;
              near52wHigh = pctFrom52 >= -5 && !at52wHigh;
            }
          }
          // Relative volume and pocket pivot
          let relVolume = null, pocketPivot = false;
          const volArr = d.volume && d.volume[sym];
          if (volArr && len >= 50) {
            const todayVol = volArr[len - 1];
            if (todayVol != null && todayVol > 0) {
              let volSum = 0, volN = 0;
              for (let i = len - 51; i < len - 1; i++) {
                if (i >= 0 && volArr[i] != null) { volSum += volArr[i]; volN++; }
              }
              if (volN > 0) relVolume = todayVol / (volSum / volN);
              // Pocket pivot: up-day volume > highest down-day volume of prior 10 sessions
              const todayClose = prices[len - 1];
              const yesterdayClose = prices[len - 2];
              if (todayClose != null && yesterdayClose != null && todayClose > yesterdayClose) {
                let maxDownVol = 0;
                for (let i = len - 11; i < len - 1; i++) {
                  if (i < 1 || prices[i] == null || prices[i-1] == null || volArr[i] == null) continue;
                  if (prices[i] < prices[i-1]) maxDownVol = Math.max(maxDownVol, volArr[i]);
                }
                if (maxDownVol > 0 && todayVol > maxDownVol) {
                  const nearMA2 = (ema8Dist != null && Math.abs(ema8Dist) <= 5) || (ema21Dist != null && Math.abs(ema21Dist) <= 5);
                  pocketPivot = nearMA2;
                }
              }
            }
          }
          stocks.push({ sym, panelIndex: pi, sectorName, data: d, rsRating: swing.rsRating != null ? swing.rsRating : null, rotation: swing.rotation || null, swingScore: swing.total != null ? swing.total : null, nearEma8, nearEma21, ema8Dist, ema21Dist, ret1d, ret5d, ret1m, ret3m, rsiDelta, ma50Dist, adrPct, rsLeading, isPullback, volContraction, near52wHigh, at52wHigh, relVolume, pocketPivot });
        }
      }

      // ── Compute RRG quadrant via the same function as Stock RRG view ──
      // Ensure srrg-sector dropdown is populated and set to 'all'
      populateSectorDropdown();
      const sectorSel = document.getElementById('srrg-sector');
      const prevSectorVal = sectorSel.value;
      sectorSel.value = 'all';
      const rrgResult = computeStockRRGData();
      sectorSel.value = prevSectorVal;

      // Build lookup: sym → RRG data (quadrant, arrow, signal, crossing, EMA)
      const rrgLookup = {};
      rrgResult.stocks.forEach(rs => {
        if (rs.trail.length === 0) return;
        const curr = rs.trail[rs.trail.length - 1];
        const prev = rs.trail.length >= 2 ? rs.trail[rs.trail.length - 2] : curr;
        const currQ = getQuadrant(curr.x, curr.y);
        const prevQ = getQuadrant(prev.x, prev.y);
        const heading = rrgHeading(rs.trail);
        rrgLookup[rs.sym] = {
          quadrant: currQ,
          arrow: heading.arrow,
          signal: heading.signal,
          prevQ,
          isCrossing: currQ !== prevQ,
          nearEma8: rs.nearEma8,
          nearEma21: rs.nearEma21,
          rsRatio: curr.x,
          rsMomentum: curr.y,
        };
      });

      // Apply RRG data to each stock (override grid-computed EMA with RRG's)
      stocks.forEach(s => {
        const rrg = rrgLookup[s.sym];
        if (rrg) {
          s.quadrant = rrg.quadrant;
          s.arrow = rrg.arrow;
          s.signal = rrg.signal;
          s.prevQ = rrg.prevQ;
          s.isCrossing = rrg.isCrossing;
          s.nearEma8 = rrg.nearEma8;
          s.nearEma21 = rrg.nearEma21;
          s.rsRatio = rrg.rsRatio;
          s.rsMomentum = rrg.rsMomentum;
        } else {
          s.quadrant = 'lagging'; s.arrow = ''; s.signal = 'neutral'; s.isCrossing = false;
          s.rsRatio = 99; s.rsMomentum = 99;
        }
      });

      // ── Apply filters ──
      let filtered = stocks;
      if (gridShowFavorites) {
        filtered = filtered.filter(s => gridFavorites.has(s.sym));
      }
      if (gridFilterQuadrant !== 'all') {
        filtered = filtered.filter(s => s.quadrant === gridFilterQuadrant);
      }
      if (gridFilterMomentum !== 'all') {
        if (gridFilterMomentum === 'bullish') filtered = filtered.filter(s => s.signal === 'bullish');
        else if (gridFilterMomentum === 'bearish') filtered = filtered.filter(s => s.signal === 'bearish');
        else if (gridFilterMomentum === 'crossing') filtered = filtered.filter(s => s.isCrossing);
        else if (gridFilterMomentum === 'nearEma8') filtered = filtered.filter(s => s.nearEma8);
        else if (gridFilterMomentum === 'nearEma21') filtered = filtered.filter(s => s.nearEma21);
      }

      // ── Group by quadrant ──
      const groups = { leading: [], improving: [], weakening: [], lagging: [] };
      filtered.forEach(s => {
        groups[s.quadrant].push(s);
      });

      // Sort within each quadrant — same logic as Stock RRG sidebar
      for (const q of QUADRANT_ORDER) {
        groups[q].sort((a, b) => {
          if (q === 'improving') return b.rsRatio - a.rsRatio;
          if (q === 'weakening') return a.rsMomentum - b.rsMomentum;
          return b.rsMomentum - a.rsMomentum; // leading & lagging
        });
      }

      // Sort-by dropdown
      const sortOpts = [['default','Quadrant'],['rsRating','RS Rating'],['swingScore','Swing Score'],['ret1d','1D Return'],['rsiDelta','RSI Delta'],['ma50Dist','MA50 (ATR)'],['relVolume','Rel Volume'],['near52w','52w High'],['volContract','Tight'],['pullback','Pullbacks'],['pocketPivot','Pocket Pivots']].map(([v,l]) =>
        `<option value="${v}"${gridSortBy===v?' selected':''}>${l}</option>`
      ).join('');

      // Column select
      const colOpts = [2, 3, 4, 6].map(n =>
        `<option value="${n}"${gridColumns === n ? ' selected' : ''}>${n}</option>`
      ).join('');

      // Chart mode select
      const modeOpts = `<option value="line"${gridChartMode==='line'?' selected':''}>Line</option><option value="candle"${gridChartMode==='candle'?' selected':''}>Candle</option>`;

      // Bench select
      const benchOpts = `<option value="sector"${rotationBenchmark==='sector'?' selected':''}>vs Sector</option><option value="spy"${rotationBenchmark==='spy'?' selected':''}>vs SPY</option><option value="absolute"${rotationBenchmark==='absolute'?' selected':''}>Absolute</option>`;

      // Range buttons
      const rangeBtns = ['1M','3M','6M','YTD','1Y'].map(r =>
        `<button class="btn${gridRange===r?' active':''}" onclick="setGridRange('${r}')">${r}</button>`
      ).join('');

      // Quadrant filter
      const quadOpts = [['all','All'],['leading','Leading'],['improving','Improving'],['weakening','Weakening'],['lagging','Lagging']].map(([v,l]) =>
        `<option value="${v}"${gridFilterQuadrant===v?' selected':''}>${l}</option>`
      ).join('');

      // Momentum filter
      const momOpts = [['all','All'],['bullish','Bullish'],['bearish','Bearish'],['crossing','Crossing'],['nearEma8','Near EMA8'],['nearEma21','Near EMA21']].map(([v,l]) =>
        `<option value="${v}"${gridFilterMomentum===v?' selected':''}>${l}</option>`
      ).join('');

      const tc = getThemeColors();

      let html = `<div class="grid-toolbar">
        <div class="btn-group"><span class="topbar-label">Sector</span>
          <select onchange="setGridSector(this.value)">${sectorOpts.join('')}</select>
        </div>
        <div class="separator"></div>
        <div class="btn-group"><span class="topbar-label">Quadrant</span>
          <select onchange="setGridFilter('quadrant',this.value)">${quadOpts}</select>
        </div>
        <div class="separator"></div>
        <div class="btn-group"><span class="topbar-label">Momentum</span>
          <select onchange="setGridFilter('momentum',this.value)">${momOpts}</select>
        </div>
        <div class="separator"></div>
        <div class="btn-group"><span class="topbar-label">Sort</span>
          <select onchange="setGridSort(this.value)">${sortOpts}</select>
        </div>
        <div class="separator"></div>
        <div class="btn-group"><span class="topbar-label">Range</span>${rangeBtns}</div>
        <div class="separator"></div>
        <div class="btn-group"><span class="topbar-label">Columns</span>
          <select onchange="setGridColumns(+this.value)">${colOpts}</select>
        </div>
        <div class="separator"></div>
        <div class="btn-group"><span class="topbar-label">Chart</span>
          <select onchange="setGridChartMode(this.value)">${modeOpts}</select>
        </div>
        <div class="separator"></div>
        <div class="btn-group"><span class="topbar-label">Overlays</span>
          <select onchange="toggleGridEma(+this.value)">
            <option value="0" disabled selected>${[gridShowEma8?'E8':null,gridShowEma21?'E21':null,gridShowMa50?'MA50':null].filter(Boolean).join(', ')||'None'}</option>
            <option value="8">${gridShowEma8?'\u2713 ':''}EMA 8</option>
            <option value="21">${gridShowEma21?'\u2713 ':''}EMA 21</option>
            <option value="50">${gridShowMa50?'\u2713 ':''}MA 50</option>
          </select>
        </div>
        <div class="separator"></div>
        <button class="btn${gridHighlightIndicators?' active':''}" onclick="toggleGridHighlight()">RSI/AO</button>
        <div class="separator"></div>
        <div class="btn-group"><span class="topbar-label">Bench</span>
          <select onchange="setRotationBenchmark(this.value)">${benchOpts}</select>
        </div>
        <div class="separator"></div>
        <button class="btn${gridShowFavorites?' active':''}" onclick="toggleGridFavorites()" style="white-space:nowrap;${gridShowFavorites?'color:var(--text-positive,#4dd8b4)':''}">&#9733; Favorites${gridFavorites.size?' ('+gridFavorites.size+')':''}</button>
        <div class="separator"></div>
        <span style="font-size:var(--fs-sm);color:var(--text-quaternary)">${filtered.length} stocks</span>
      </div>`;

      const sparkH = gridChartMode === 'candle' ? 240 : 170;

      const fmtRet = (v, label) => {
        if (v == null) return '';
        const c = v >= 0 ? tc.semanticBullish : tc.semanticBearish;
        const sign = v >= 0 ? '+' : '';
        return `<span class="ret-pair"><span class="ret-label">${label}</span><span style="color:${c}">${sign}${v.toFixed(1)}%</span></span>`;
      };
      const fmtVal = (v, suffix) => {
        if (v == null) return '';
        const c = v >= 0 ? tc.semanticBullish : tc.semanticBearish;
        const sign = v >= 0 ? '+' : '';
        return `<span style="font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;color:${c};background:${c}18">${sign}${v.toFixed(1)}${suffix}</span>`;
      };

      const renderTile = (s, qColor) => {
        const rotStage = s.rotation ? ROTATION_STAGES[s.rotation] : null;
        const rotTag = rotStage ? `<span class="grid-tile-rotation" style="background:${rotStage.color}22;color:${rotStage.color}">${rotStage.label}</span>` : '';
        const emaTags = (s.nearEma21 ? '<span class="rrg-ema-tag">E21</span>' : '') + (s.nearEma8 ? '<span class="rrg-ema-tag">E8</span>' : '');
        const rsColor = s.rsRating != null ? (s.rsRating >= 50 ? 'var(--text-positive,#4dd8b4)' : 'var(--text-negative,#f0616d)') : '';
        const rsBg = s.rsRating != null ? (s.rsRating >= 50 ? 'rgba(77,216,180,0.12)' : 'rgba(240,97,109,0.12)') : '';
        const rsTag = s.rsRating != null ? `<span style="font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;color:${rsColor};background:${rsBg}">RS ${s.rsRating}</span>` : '';
        const arrowColor = s.signal === 'bullish' ? tc.semanticBullish : s.signal === 'bearish' ? tc.semanticBearish : tc.textQuaternary;
        const momentumTag = s.arrow ? `<span style="font-size:11px;font-weight:700;color:${arrowColor}">${s.arrow}</span>` : '';
        const crossingTag = s.isCrossing ? `<span class="rrg-crossing" style="color:${qColor};background:${qColor}22">NEW</span>` : '';
        const fromTag = s.isCrossing ? `<span class="rrg-from" style="color:${tc[QUADRANT_META[s.prevQ].colorVar]}">from ${QUADRANT_META[s.prevQ].short}</span>` : '';
        const adrHigh = s.adrPct != null && s.adrPct >= 4;
        const adrTag = s.adrPct != null ? `<span style="font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;color:${adrHigh ? 'var(--text-positive,#4dd8b4)' : 'var(--text-tertiary)'};background:${adrHigh ? 'rgba(77,216,180,0.12)' : 'rgba(255,255,255,0.06)'}">ADR ${s.adrPct.toFixed(1)}%</span>` : '';
        const rsLeadTag = s.rsLeading ? `<span style="font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;color:#f5a623;background:rgba(245,166,35,0.12)">RS Lead</span>` : '';
        const pullbackTag = s.isPullback && gridSortBy !== 'pullback' ? `<span style="font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;color:#9b7db8;background:rgba(155,125,184,0.12)">Pullback</span>` : '';
        const tightTag = s.volContraction && gridSortBy !== 'volContract' ? `<span style="font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;color:#b48efa;background:rgba(180,142,250,0.12)">Tight</span>` : '';
        const highTag = gridSortBy !== 'near52w' ? (s.at52wHigh ? `<span style="font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;color:var(--text-positive,#4dd8b4);background:rgba(77,216,180,0.12)">52w Hi</span>` : s.near52wHigh ? `<span style="font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;color:var(--text-tertiary);background:rgba(255,255,255,0.06)">Nr 52w</span>` : '') : '';
        const rVolTag = s.relVolume != null && s.relVolume >= 1.5 ? `<span style="font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;color:${s.ret1d >= 0 ? 'var(--text-positive,#4dd8b4)' : 'var(--text-negative,#f0616d)'};background:${s.ret1d >= 0 ? 'rgba(77,216,180,0.12)' : 'rgba(240,97,109,0.12)'}">Vol ${s.relVolume.toFixed(1)}x</span>` : '';
        const ppTag = s.pocketPivot && gridSortBy !== 'pocketPivot' ? `<span style="font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;color:#2a82da;background:rgba(42,130,218,0.15);border:1px solid rgba(42,130,218,0.3)">PP</span>` : '';
        const retHtml = `<div class="grid-tile-returns">${fmtRet(s.ret1d,'1D')}${fmtRet(s.ret5d,'5D')}${fmtRet(s.ret1m,'1M')}${fmtRet(s.ret3m,'3M')}</div>`;
        const isFav = gridFavorites.has(s.sym);
        const noHighlight = gridSortBy !== 'default';
        const tileClasses = ['grid-tile', isFav && 'favorited', !noHighlight && s.rsLeading && 'rs-leading', !noHighlight && s.isPullback && 'pullback', !noHighlight && s.pocketPivot && 'pocket-pivot'].filter(Boolean).join(' ');
        return `<div class="${tileClasses}" data-sym="${s.sym}" data-pi="${s.panelIndex}">
          <div class="grid-tile-header">
            <span class="grid-tile-sym">${s.sym}</span>
            <span class="grid-tile-sector">${s.sectorName}</span>
          </div>
          <div class="grid-tile-tags">${momentumTag}${rotTag}${crossingTag}${fromTag}${emaTags}${rsTag}${adrTag}${rsLeadTag}${pullbackTag}${tightTag}${highTag}${rVolTag}${ppTag}</div>
          ${retHtml}
          <div class="grid-spark-wrap">
            <canvas class="grid-spark" height="${sparkH}" style="height:${sparkH}px"></canvas>
            <div class="grid-spark-hover">${s.ema8Dist != null ? `<span style="color:${s.ema8Dist >= 0 ? tc.semanticBullish : tc.semanticBearish}">E8 ${s.ema8Dist >= 0 ? '+' : ''}${s.ema8Dist.toFixed(1)}%</span>` : ''}${s.ema21Dist != null ? `<span style="color:${s.ema21Dist >= 0 ? tc.semanticBullish : tc.semanticBearish}">E21 ${s.ema21Dist >= 0 ? '+' : ''}${s.ema21Dist.toFixed(1)}%</span>` : ''}</div>
          </div>
          <div class="grid-tile-label">RSI <span class="grid-rsi-val"></span></div>
          <canvas class="grid-rsi" height="60" style="height:60px"></canvas>
          <div class="grid-tile-label">AO</div>
          <canvas class="grid-ao" height="55" style="height:55px"></canvas>
          <button class="grid-fav-btn" onclick="event.stopPropagation();toggleGridFav('${s.sym}',this)">${isFav ? '\u2605' : '\u2606'}</button>
        </div>`;
      };

      if (gridSortBy !== 'default') {
        // Flat sorted list
        const sortKey = { rsRating: s => s.rsRating ?? -1, swingScore: s => s.swingScore ?? -1, ret1d: s => s.ret1d ?? -999, rsiDelta: s => s.rsiDelta ?? -999, ma50Dist: s => s.ma50Dist ?? -999, relVolume: s => s.relVolume ?? -1, near52w: s => s.at52wHigh ? 2 : s.near52wHigh ? 1 : 0, volContract: s => s.volContraction ? 1 : 0, pullback: s => s.isPullback ? 1 : 0, pocketPivot: s => s.pocketPivot ? 1 : 0 }[gridSortBy];
        const allItems = [];
        for (const q of QUADRANT_ORDER) allItems.push(...groups[q]);
        allItems.sort((a, b) => sortKey(b) - sortKey(a));
        const sortLabels = { rsRating: 'RS Rating', swingScore: 'Swing Score', ret1d: '1D Return', rsiDelta: 'RSI Delta (5-bar)', ma50Dist: 'MA50 Distance (ATR)', relVolume: 'Relative Volume', near52w: '52-Week High', volContract: 'Volatility Contraction', pullback: 'Pullbacks', pocketPivot: 'Pocket Pivots' };
        html += `<div class="grid-quadrant-section" style="border-color:var(--border-medium)">`;
        html += `<div class="grid-group-header" style="color:var(--text-secondary)">Sorted by ${sortLabels[gridSortBy]} <span class="count">${allItems.length}</span></div>`;
        html += `<div class="grid-tiles-grid" style="grid-template-columns:repeat(${gridColumns}, 260px)">`;
        for (const s of allItems) {
          const qColor = tc[QUADRANT_META[s.quadrant].colorVar];
          html += renderTile(s, qColor);
        }
        html += `</div></div>`;
      } else {
        // Default: quadrant grouped
        for (const q of QUADRANT_ORDER) {
          const items = groups[q];
          if (items.length === 0) continue;
          const meta = QUADRANT_META[q];
          const qColor = tc[meta.colorVar];
          html += `<div class="grid-quadrant-section" style="border-color:${qColor}66">`;
          html += `<div class="grid-group-header" style="color:${qColor}">\u25CF ${meta.label} <span class="count">${items.length}</span></div>`;
          html += `<div class="grid-tiles-grid" style="grid-template-columns:repeat(${gridColumns}, 260px)">`;
          for (const s of items) html += renderTile(s, qColor);
          html += `</div></div>`;
        }
      }

      container.innerHTML = html;
      container.classList.toggle('highlight-indicators', gridHighlightIndicators);

      // Lazy draw with IntersectionObserver
      const tiles = container.querySelectorAll('.grid-tile');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const tile = entry.target;
            const sym = tile.dataset.sym;
            const pi = parseInt(tile.dataset.pi);
            const d = panelDataCache[pi];
            if (d) drawGridTileCharts(tile, sym, d);
            observer.unobserve(tile);
          }
        });
      }, { root: container, rootMargin: '200px' });
      tiles.forEach(t => observer.observe(t));
    }

    function drawGridTileCharts(tile, sym, data) {
      const tc = getThemeColors();
      const prices = data.prices[sym];
      if (!prices) return;

      const rangeEnd = prices.length - 1;
      let lastIdx = rangeEnd;
      for (let i = rangeEnd; i >= 0; i--) {
        if (prices[i] != null) { lastIdx = i; break; }
      }

      const sparkStart = getRangeStartDate(gridRange, data.dates);
      const sparkIdx = findStartIndex(data.dates, sparkStart);
      const ohlcSym = data.ohlc && data.ohlc[sym];
      const volSym = data.volume && data.volume[sym];

      // Price data
      const ema8Full = [], ema21Full = [], ma50Full = [];
      let e8v = null, e21v = null;
      const k8 = 2 / 9, k21 = 2 / 22;
      for (let i = 0; i <= lastIdx; i++) {
        if (prices[i] != null) {
          e8v = e8v == null ? prices[i] : prices[i] * k8 + e8v * (1 - k8);
          e21v = e21v == null ? prices[i] : prices[i] * k21 + e21v * (1 - k21);
        }
        ema8Full[i] = e8v;
        ema21Full[i] = e21v;
        // MA50 (SMA)
        if (i >= 49) {
          let sum50 = 0, cnt50 = 0;
          for (let j = i - 49; j <= i; j++) { if (prices[j] != null) { sum50 += prices[j]; cnt50++; } }
          ma50Full[i] = cnt50 > 0 ? sum50 / cnt50 : null;
        } else {
          ma50Full[i] = null;
        }
      }
      const sparkEma8 = [], sparkEma21 = [], sparkMa50 = [];

      const sparkPrices = [];
      const sparkOhlc = [];
      const sparkVol = [];
      for (let i = sparkIdx; i <= lastIdx; i++) {
        if (prices[i] != null) {
          sparkPrices.push(prices[i]);
          sparkEma8.push(ema8Full[i]);
          sparkEma21.push(ema21Full[i]);
          sparkMa50.push(ma50Full[i]);
          sparkOhlc.push({
            o: ohlcSym && ohlcSym.o && ohlcSym.o[i] != null ? ohlcSym.o[i] : prices[i],
            h: ohlcSym && ohlcSym.h && ohlcSym.h[i] != null ? ohlcSym.h[i] : prices[i],
            l: ohlcSym && ohlcSym.l && ohlcSym.l[i] != null ? ohlcSym.l[i] : prices[i],
            c: prices[i],
          });
          sparkVol.push(volSym ? (volSym[i] || 0) : 0);
        }
      }

      // RSI
      const rsiPeriod = 14;
      const validForRsi = [];
      const validForRsiIdx = [];
      for (let i = 0; i <= rangeEnd; i++) {
        if (prices[i] != null) { validForRsi.push(prices[i]); validForRsiIdx.push(i); }
      }
      const rsiSeries = [];
      if (validForRsi.length > rsiPeriod) {
        let avgGain = 0, avgLoss = 0;
        for (let i = 1; i <= rsiPeriod; i++) {
          const change = validForRsi[i] - validForRsi[i - 1];
          if (change > 0) avgGain += change; else avgLoss -= change;
        }
        avgGain /= rsiPeriod; avgLoss /= rsiPeriod;
        for (let i = 0; i <= rsiPeriod; i++) rsiSeries.push(null);
        rsiSeries[rsiPeriod] = avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));
        for (let i = rsiPeriod + 1; i < validForRsi.length; i++) {
          const change = validForRsi[i] - validForRsi[i - 1];
          avgGain = (avgGain * (rsiPeriod - 1) + (change > 0 ? change : 0)) / rsiPeriod;
          avgLoss = (avgLoss * (rsiPeriod - 1) + (change < 0 ? -change : 0)) / rsiPeriod;
          rsiSeries[i] = avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));
        }
      }
      const sparkRsi = [];
      for (let i = 0; i < validForRsiIdx.length; i++) {
        if (validForRsiIdx[i] >= sparkIdx && rsiSeries[i] != null) sparkRsi.push(rsiSeries[i]);
      }

      // AO
      const aoMedian = [];
      for (let i = 0; i < validForRsiIdx.length; i++) {
        const oi = validForRsiIdx[i];
        if (ohlcSym && ohlcSym.h && ohlcSym.l && ohlcSym.h[oi] != null && ohlcSym.l[oi] != null) {
          aoMedian.push((ohlcSym.h[oi] + ohlcSym.l[oi]) / 2);
        } else {
          aoMedian.push(validForRsi[i]);
        }
      }
      const aoSeries = [];
      if (aoMedian.length >= 34) {
        for (let i = 0; i < aoMedian.length; i++) {
          if (i < 33) { aoSeries.push(null); continue; }
          let sum5 = 0, sum34 = 0;
          for (let j = i - 4; j <= i; j++) sum5 += aoMedian[j];
          for (let j = i - 33; j <= i; j++) sum34 += aoMedian[j];
          aoSeries.push(sum5 / 5 - sum34 / 34);
        }
      }
      const sparkAo = [];
      for (let i = 0; i < validForRsiIdx.length; i++) {
        if (validForRsiIdx[i] >= sparkIdx && aoSeries[i] != null) sparkAo.push(aoSeries[i]);
      }

      // ── Draw price canvas ──
      const canvas = tile.querySelector('.grid-spark');
      if (canvas && sparkPrices.length > 1) {
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvas.clientWidth * dpr;
        canvas.height = canvas.clientHeight * dpr;
        ctx.scale(dpr, dpr);
        const w = canvas.clientWidth, fullH = canvas.clientHeight;
        const volZoneH = fullH * 0.2;
        const h = fullH - volZoneH - 2; // price zone with 2px gap

        let chartMin = Infinity, chartMax = -Infinity;
        const chartPad = gridChartMode === 'candle' ? 24 : 16;
        // include price data
        if (gridChartMode === 'candle' && sparkOhlc.length > 1) {
          for (const b of sparkOhlc) { chartMin = Math.min(chartMin, b.l); chartMax = Math.max(chartMax, b.h); }
        } else {
          for (const p of sparkPrices) { chartMin = Math.min(chartMin, p); chartMax = Math.max(chartMax, p); }
        }
        // include visible EMAs in range
        if (gridShowEma8) for (const v of sparkEma8) { if (v != null) { chartMin = Math.min(chartMin, v); chartMax = Math.max(chartMax, v); } }
        if (gridShowEma21) for (const v of sparkEma21) { if (v != null) { chartMin = Math.min(chartMin, v); chartMax = Math.max(chartMax, v); } }
        if (gridShowMa50) for (const v of sparkMa50) { if (v != null) { chartMin = Math.min(chartMin, v); chartMax = Math.max(chartMax, v); } }
        const chartRange = chartMax - chartMin || 1;
        const chartToY = v => chartPad + ((chartMax - v) / chartRange) * (h - 2 * chartPad);

        // Volume bars (separate zone below price chart)
        if (sparkVol.length > 0) {
          let maxVol = 0;
          for (const v of sparkVol) if (v > maxVol) maxVol = v;
          if (maxVol > 0) {
            // Pre-compute pocket pivot bars: up-day vol > max down-day vol of prior 10
            const ppBars = new Set();
            for (let i = 1; i < sparkVol.length; i++) {
              const isUpDay = sparkOhlc[i] ? sparkOhlc[i].c > sparkOhlc[i].o : sparkPrices[i] > sparkPrices[i-1];
              if (!isUpDay || sparkVol[i] <= 0) continue;
              let maxDownVol = 0;
              for (let j = Math.max(0, i - 10); j < i; j++) {
                const jDown = sparkOhlc[j] ? sparkOhlc[j].c < sparkOhlc[j].o : (j > 0 && sparkPrices[j] < sparkPrices[j-1]);
                if (jDown && sparkVol[j] > maxDownVol) maxDownVol = sparkVol[j];
              }
              if (maxDownVol > 0 && sparkVol[i] > maxDownVol) ppBars.add(i);
            }
            const volTop = h + 2;
            const volBase = fullH;
            const barCount = sparkVol.length;
            const vGap = w / barCount;
            const vBarW = Math.max(1, vGap * 0.7);
            for (let i = 0; i < barCount; i++) {
              if (sparkVol[i] <= 0) continue;
              const bh = (sparkVol[i] / maxVol) * volZoneH;
              const isUp = sparkOhlc[i] ? sparkOhlc[i].c >= sparkOhlc[i].o : (i > 0 ? sparkPrices[i] >= sparkPrices[i-1] : true);
              if (ppBars.has(i)) {
                ctx.fillStyle = 'rgba(42,130,218,0.7)';
              } else {
                ctx.fillStyle = isUp ? 'rgba(77,216,180,0.35)' : 'rgba(240,97,109,0.35)';
              }
              ctx.fillRect(vGap * i + vGap / 2 - vBarW / 2, volBase - bh, vBarW, bh);
            }
          }
        }

        if (gridChartMode === 'candle' && sparkOhlc.length > 1) {
          const bars = sparkOhlc;
          let allMin = Infinity, allMax = -Infinity;
          for (const b of bars) { allMin = Math.min(allMin, b.l); allMax = Math.max(allMax, b.h); }
          const range = allMax - allMin || 1;
          const pad = 36;
          const fillRatio = bars.length < 40 ? 0.85 : bars.length < 80 ? 0.78 : 0.65;
          const barW = Math.max(1, (w / bars.length) * fillRatio);
          const gap = w / bars.length;
          for (let i = 0; i < bars.length; i++) {
            const b = bars[i];
            const isUp = b.c >= b.o;
            const bodyColor = isUp ? tc.semanticBullish : tc.semanticBearish;
            const cx = gap * i + gap / 2;
            const toY = chartToY;
            const oY = toY(b.o), cY = toY(b.c);
            const bodyTop = Math.min(oY, cY);
            const bodyBot = Math.max(oY, cY);
            const bodyH = Math.max(1, bodyBot - bodyTop);
            ctx.strokeStyle = bodyColor;
            ctx.lineWidth = 1;
            // Upper wick (high to body top)
            ctx.beginPath(); ctx.moveTo(cx, toY(b.h)); ctx.lineTo(cx, bodyTop); ctx.stroke();
            // Lower wick (body bottom to low)
            ctx.beginPath(); ctx.moveTo(cx, bodyBot); ctx.lineTo(cx, toY(b.l)); ctx.stroke();
            // Body
            ctx.fillStyle = bodyColor;
            ctx.fillRect(cx - barW / 2, bodyTop, barW, bodyH);
          }
        } else {
          const sp = sparkPrices;
          const min = Math.min(...sp), max = Math.max(...sp);
          const range = max - min || 1;
          const pad = 30;
          const isUp = sp[sp.length - 1] >= sp[0];
          const color = isUp ? tc.semanticBullish : tc.semanticBearish;
          ctx.strokeStyle = color; ctx.lineWidth = 1.5;
          ctx.beginPath();
          for (let i = 0; i < sp.length; i++) {
            const x = (i / (sp.length - 1)) * w;
            const y = chartToY(sp[i]);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();
          ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
          const hex = color.replace('#', '');
          const r = parseInt(hex.slice(0, 2), 16), g = parseInt(hex.slice(2, 4), 16), b2 = parseInt(hex.slice(4, 6), 16);
          ctx.fillStyle = `rgba(${r},${g},${b2},0.15)`;
          ctx.fill();
        }

        // EMA overlays
        const n = sparkPrices.length;
        if (n > 1) {
          if (gridShowEma21) {
            ctx.strokeStyle = 'rgba(42,130,218,0.7)';
            ctx.lineWidth = 0.75;
            ctx.beginPath();
            for (let i = 0; i < n; i++) {
              const x = (i / (n - 1)) * w;
              if (sparkEma21[i] == null) continue;
              i === 0 || sparkEma21[i - 1] == null ? ctx.moveTo(x, chartToY(sparkEma21[i])) : ctx.lineTo(x, chartToY(sparkEma21[i]));
            }
            ctx.stroke();
          }
          if (gridShowEma8) {
            ctx.strokeStyle = 'rgba(180,180,180,0.6)';
            ctx.lineWidth = 0.75;
            ctx.beginPath();
            for (let i = 0; i < n; i++) {
              const x = (i / (n - 1)) * w;
              if (sparkEma8[i] == null) continue;
              i === 0 || sparkEma8[i - 1] == null ? ctx.moveTo(x, chartToY(sparkEma8[i])) : ctx.lineTo(x, chartToY(sparkEma8[i]));
            }
            ctx.stroke();
          }
          if (gridShowMa50) {
            ctx.strokeStyle = 'rgba(255,165,0,0.6)';
            ctx.lineWidth = 0.75;
            ctx.beginPath();
            for (let i = 0; i < n; i++) {
              const x = (i / (n - 1)) * w;
              if (sparkMa50[i] == null) continue;
              i === 0 || sparkMa50[i - 1] == null ? ctx.moveTo(x, chartToY(sparkMa50[i])) : ctx.lineTo(x, chartToY(sparkMa50[i]));
            }
            ctx.stroke();
          }
        }
      }

      // ── Draw RSI canvas (auto-scaled) ──
      const rsiCanvas = tile.querySelector('.grid-rsi');
      if (rsiCanvas && sparkRsi.length > 1) {
        const rCtx = rsiCanvas.getContext('2d');
        const rDpr = window.devicePixelRatio || 1;
        rsiCanvas.width = rsiCanvas.clientWidth * rDpr;
        rsiCanvas.height = rsiCanvas.clientHeight * rDpr;
        rCtx.scale(rDpr, rDpr);
        const rW = rsiCanvas.clientWidth, rH = rsiCanvas.clientHeight;
        const rPad = 3;
        // Auto-scale: find data min/max and add 10% padding, clamped to 0-100
        let rMin = Math.min(...sparkRsi), rMax = Math.max(...sparkRsi);
        const rRange = rMax - rMin || 10;
        rMin = Math.max(0, rMin - rRange * 0.15);
        rMax = Math.min(100, rMax + rRange * 0.15);
        const toY = (v) => rPad + ((rMax - v) / (rMax - rMin)) * (rH - 2 * rPad);
        // 50-line reference (only if in visible range)
        if (50 >= rMin && 50 <= rMax) {
          rCtx.strokeStyle = 'rgba(255,255,255,0.3)';
          rCtx.lineWidth = 1.5;
          rCtx.beginPath(); rCtx.moveTo(0, toY(50)); rCtx.lineTo(rW, toY(50)); rCtx.stroke();
        }
        // 30/70 overbought/oversold zones
        if (70 <= rMax && 70 >= rMin) {
          rCtx.strokeStyle = 'rgba(240,97,109,0.15)'; rCtx.lineWidth = 0.5;
          rCtx.beginPath(); rCtx.moveTo(0, toY(70)); rCtx.lineTo(rW, toY(70)); rCtx.stroke();
        }
        if (30 >= rMin && 30 <= rMax) {
          rCtx.strokeStyle = 'rgba(77,216,180,0.15)'; rCtx.lineWidth = 0.5;
          rCtx.beginPath(); rCtx.moveTo(0, toY(30)); rCtx.lineTo(rW, toY(30)); rCtx.stroke();
        }
        const lastRsi = sparkRsi[sparkRsi.length - 1];
        const rsiColor = lastRsi >= 50 ? tc.semanticBullish : tc.semanticBearish;
        rCtx.setLineDash([]);
        rCtx.strokeStyle = rsiColor; rCtx.lineWidth = 1.5;
        rCtx.beginPath();
        for (let i = 0; i < sparkRsi.length; i++) {
          const x = (i / (sparkRsi.length - 1)) * rW;
          const y = toY(sparkRsi[i]);
          i === 0 ? rCtx.moveTo(x, y) : rCtx.lineTo(x, y);
        }
        rCtx.stroke();
        // RSI value in label
        const rsiValEl = tile.querySelector('.grid-rsi-val');
        if (rsiValEl) {
          rsiValEl.textContent = Math.round(lastRsi);
          rsiValEl.style.color = rsiColor;
          rsiValEl.style.fontWeight = '700';
        }
      }

      // ── Draw AO canvas ──
      const aoCanvas = tile.querySelector('.grid-ao');
      if (aoCanvas && sparkAo.length > 1) {
        const aCtx = aoCanvas.getContext('2d');
        const aDpr = window.devicePixelRatio || 1;
        aoCanvas.width = aoCanvas.clientWidth * aDpr;
        aoCanvas.height = aoCanvas.clientHeight * aDpr;
        aCtx.scale(aDpr, aDpr);
        const aW = aoCanvas.clientWidth, aH = aoCanvas.clientHeight;
        const aPad = 3;
        const aMax = Math.max(...sparkAo.map(v => Math.abs(v))) || 1;
        const zeroY = aH / 2;
        const barW = Math.max(1, (aW / sparkAo.length) - 0.5);
        aCtx.strokeStyle = 'rgba(255,255,255,0.2)';
        aCtx.lineWidth = 0.75;
        aCtx.beginPath(); aCtx.moveTo(0, zeroY); aCtx.lineTo(aW, zeroY); aCtx.stroke();
        for (let i = 0; i < sparkAo.length; i++) {
          const x = (i / sparkAo.length) * aW;
          const val = sparkAo[i];
          const barH = (Math.abs(val) / aMax) * (aH / 2 - aPad);
          const rising = i === 0 ? val >= 0 : val >= sparkAo[i - 1];
          aCtx.fillStyle = rising ? tc.semanticBullish : tc.semanticBearish;
          if (val >= 0) { aCtx.fillRect(x, zeroY - barH, barW, barH); }
          else { aCtx.fillRect(x, zeroY, barW, barH); }
        }
      }
    }

    // EMA helper
    function emaSmooth(arr, span) {
      if (span <= 1) return arr;
      const k = 2 / (span + 1);
      const result = [];
      let prev = null;
      for (let i = 0; i < arr.length; i++) {
        if (arr[i] == null) { result.push(null); continue; }
        if (prev == null) { prev = arr[i]; result.push(arr[i]); continue; }
        prev = arr[i] * k + prev * (1 - k);
        result.push(prev);
      }
      return result;
    }

    // SMA helper: simple moving average of last N values
    function computeSMA(arr, period) {
      if (!arr || arr.length < period) return null;
      let sum = 0, count = 0;
      for (let i = arr.length - period; i < arr.length; i++) {
        if (arr[i] == null) return null;
        sum += arr[i]; count++;
      }
      return count === period ? sum / count : null;
    }

    // EMA of last value given full array (for MA signal checks)
    function computeEMALast(arr, period) {
      const smoothed = emaSmooth(arr, period);
      for (let i = smoothed.length - 1; i >= 0; i--) {
        if (smoothed[i] != null) return smoothed[i];
      }
      return null;
    }

    // Full-array SMA (returns array same length as input, null for insufficient data)
    function computeSMAArray(arr, period) {
      const result = [];
      let sum = 0, count = 0;
      for (let i = 0; i < arr.length; i++) {
        if (arr[i] != null) { sum += arr[i]; count++; }
        if (i >= period) {
          if (arr[i - period] != null) { sum -= arr[i - period]; count--; }
        }
        if (i >= period - 1 && count === period) {
          result.push(sum / period);
        } else {
          result.push(null);
        }
      }
      return result;
    }

    // Full-array RSI using Wilder smoothing
    function computeRSIArray(prices, period) {
      const result = [];
      // Collect valid prices with their indices
      const valid = [];
      for (let i = 0; i < prices.length; i++) {
        if (prices[i] != null) valid.push({ idx: i, val: prices[i] });
      }
      if (valid.length <= period) {
        return new Array(prices.length).fill(null);
      }
      // Initialize with nulls
      for (let i = 0; i < prices.length; i++) result.push(null);
      // Seed average gain/loss
      let avgGain = 0, avgLoss = 0;
      for (let i = 1; i <= period; i++) {
        const change = valid[i].val - valid[i - 1].val;
        if (change > 0) avgGain += change; else avgLoss -= change;
      }
      avgGain /= period;
      avgLoss /= period;
      result[valid[period].idx] = avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));
      for (let i = period + 1; i < valid.length; i++) {
        const change = valid[i].val - valid[i - 1].val;
        avgGain = (avgGain * (period - 1) + (change > 0 ? change : 0)) / period;
        avgLoss = (avgLoss * (period - 1) + (change < 0 ? -change : 0)) / period;
        result[valid[i].idx] = avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));
      }
      return result;
    }

    // Full-array Awesome Oscillator: SMA(5, median) - SMA(34, median)
    // Uses (H+L)/2 if OHLC available, otherwise falls back to close
    function computeAOArray(highs, lows, closes) {
      const len = closes.length;
      const median = [];
      for (let i = 0; i < len; i++) {
        if (highs && lows && highs[i] != null && lows[i] != null) {
          median.push((highs[i] + lows[i]) / 2);
        } else if (closes[i] != null) {
          median.push(closes[i]);
        } else {
          median.push(null);
        }
      }
      const sma5 = computeSMAArray(median, 5);
      const sma34 = computeSMAArray(median, 34);
      const result = [];
      for (let i = 0; i < len; i++) {
        if (sma5[i] != null && sma34[i] != null) {
          result.push(sma5[i] - sma34[i]);
        } else {
          result.push(null);
        }
      }
      return result;
    }

    // Sample every 5th trading day to get weekly prices
    function getWeeklyPrices(dailyPrices) {
      if (!dailyPrices) return [];
      const weekly = [];
      for (let i = 0; i < dailyPrices.length; i += 5) {
        weekly.push(dailyPrices[i]);
      }
      // Always include last price
      if (dailyPrices.length > 0 && (dailyPrices.length - 1) % 5 !== 0) {
        weekly.push(dailyPrices[dailyPrices.length - 1]);
      }
      return weekly;
    }

    // Compute MA signals: above/below EMA8, EMA21, MA50, MA200 for daily and weekly
    function computeMASignals(dailyPrices) {
      const signals = { dEma8: null, dEma21: null, dMa50: null, dMa200: null, goldenCross: null, wEma8: null, wEma21: null, wMa50: null };
      if (!dailyPrices || dailyPrices.length < 50) return signals;

      const lastPrice = dailyPrices[dailyPrices.length - 1];
      if (lastPrice == null) return signals;

      // Daily signals
      const dEma8 = computeEMALast(dailyPrices, 8);
      const dEma21 = computeEMALast(dailyPrices, 21);
      const dMa50 = computeSMA(dailyPrices, 50);
      if (dEma8 != null) signals.dEma8 = lastPrice > dEma8;
      if (dEma21 != null) signals.dEma21 = lastPrice > dEma21;
      if (dMa50 != null) signals.dMa50 = lastPrice > dMa50;

      // 200-day MA & golden cross
      if (dailyPrices.length >= 200) {
        const dMa200 = computeSMA(dailyPrices, 200);
        if (dMa200 != null) signals.dMa200 = lastPrice > dMa200;
        if (dMa50 != null && dMa200 != null) signals.goldenCross = dMa50 > dMa200;
      }

      // Weekly signals
      const weekly = getWeeklyPrices(dailyPrices);
      if (weekly.length >= 50) {
        const wEma8 = computeEMALast(weekly, 8);
        const wEma21 = computeEMALast(weekly, 21);
        const wMa50 = computeSMA(weekly, 50);
        const lastW = weekly[weekly.length - 1];
        if (wEma8 != null && lastW != null) signals.wEma8 = lastW > wEma8;
        if (wEma21 != null && lastW != null) signals.wEma21 = lastW > wEma21;
        if (wMa50 != null && lastW != null) signals.wMa50 = lastW > wMa50;
      }

      return signals;
    }

    // Category-based weighted risk signal
    function computeRiskCategories(spySignals, rspSignals, spyPcts, rspPcts) {
      function catScore(signals) {
        let bull = 0, total = 0;
        signals.forEach(s => { if (s != null) { total++; if (s) bull++; } });
        if (total === 0) return { score: null, cls: 'risk-neutral', label: '--' };
        const pct = bull / total;
        if (pct >= 0.6) return { score: pct, cls: 'risk-on', label: 'Bullish' };
        if (pct <= 0.4) return { score: pct, cls: 'risk-off', label: 'Bearish' };
        return { score: pct, cls: 'risk-mixed', label: 'Mixed' };
      }

      // Trend Structure (weight 3): regime-defining signals
      const trendSignals = [
        { label: 'SPY > W-EMA21', value: spySignals.wEma21 },
        { label: 'SPY > D-EMA21', value: spySignals.dEma21 },
        { label: 'SPY > D-MA50', value: spySignals.dMa50 },
        { label: 'SPY > D-MA200', value: spySignals.dMa200 },
      ];
      const trend = catScore(trendSignals.map(s => s.value));
      trend.signals = trendSignals;
      trend.weight = 3;

      // Breadth (weight 2): market participation
      const rspImproving = (rspPcts[2] != null && spyPcts[2] != null) ? rspPcts[2] > spyPcts[2] : null;
      const breadthSignals = [
        { label: 'RSP > SPY (1M)', value: rspImproving },
        { label: 'RSP > D-MA50', value: rspSignals.dMa50 },
      ];
      const breadth = catScore(breadthSignals.map(s => s.value));
      breadth.signals = breadthSignals;
      breadth.weight = 2;

      // Momentum (weight 1): short-term direction
      const emaStack = (spySignals.dEma8 != null && spySignals.dEma21 != null)
        ? (computeEMALast(panelDataCache[0].prices['SPY'], 8) > computeEMALast(panelDataCache[0].prices['SPY'], 21))
        : null;
      const momentumSignals = [
        { label: 'EMA8 > EMA21', value: emaStack },
        { label: 'SPY > D-EMA8', value: spySignals.dEma8 },
      ];
      const momentum = catScore(momentumSignals.map(s => s.value));
      momentum.signals = momentumSignals;
      momentum.weight = 1;

      // Regime / Conditions: chop detection
      const spyPrices = panelDataCache[0] && panelDataCache[0].prices['SPY'];
      let regime = { score: null, cls: 'regime-unclear', label: 'Unclear', signals: [] };
      if (spyPrices && spyPrices.length >= 60) {
        // EMA21 crosses in last 20 days
        const ema21Arr = emaSmooth(spyPrices, 21);
        const lookback = 20;
        const start = Math.max(0, spyPrices.length - lookback);
        let crosses = 0;
        for (let i = start + 1; i < spyPrices.length; i++) {
          if (spyPrices[i] == null || spyPrices[i-1] == null || ema21Arr[i] == null || ema21Arr[i-1] == null) continue;
          const prevAbove = spyPrices[i-1] > ema21Arr[i-1];
          const currAbove = spyPrices[i] > ema21Arr[i];
          if (prevAbove !== currAbove) crosses++;
        }

        // MA50 slope: % change over 20 days
        const ma50Now = computeSMA(spyPrices, 50);
        const slice40 = spyPrices.slice(0, spyPrices.length - 20);
        const ma50Prev = slice40.length >= 50 ? computeSMA(slice40, 50) : null;
        let ma50Slope = null;
        let slopeFlat = null;
        if (ma50Now != null && ma50Prev != null) {
          ma50Slope = ((ma50Now - ma50Prev) / ma50Prev) * 100;
          slopeFlat = Math.abs(ma50Slope) < 1.0; // < 1% move in 20 days = flat
        }

        // 20-day range vs 60-day range
        const recent20 = spyPrices.slice(-20).filter(p => p != null);
        const recent60 = spyPrices.slice(-60).filter(p => p != null);
        let rangeCompressed = null;
        if (recent20.length >= 15 && recent60.length >= 40) {
          const range20 = Math.max(...recent20) - Math.min(...recent20);
          const range60 = Math.max(...recent60) - Math.min(...recent60);
          rangeCompressed = range60 > 0 ? (range20 / range60) < 0.4 : null;
        }

        const regimeSignals = [
          { label: 'EMA21 crosses', value: crosses <= 1, detail: `${crosses}` },
          { label: 'MA50 slope', value: slopeFlat != null ? !slopeFlat : null, detail: ma50Slope != null ? `${ma50Slope >= 0 ? '+' : ''}${ma50Slope.toFixed(1)}%` : null },
          { label: 'Range', value: rangeCompressed != null ? !rangeCompressed : null },
        ];

        // Trending: low crosses + directional slope + no compression
        // Choppy: high crosses OR (flat slope + compressed range)
        let trendingCount = 0, totalR = 0;
