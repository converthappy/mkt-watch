  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    // ── Theme Management ──
    let currentThemeColors = {};

    function getThemeColors() {
      const s = getComputedStyle(document.documentElement);
      return {
        bgPrimary: s.getPropertyValue('--bg-primary').trim(),
        bgSecondary: s.getPropertyValue('--bg-secondary').trim(),
        bgTertiary: s.getPropertyValue('--bg-tertiary').trim(),
        bgQuaternary: s.getPropertyValue('--bg-quaternary').trim(),
        textPrimary: s.getPropertyValue('--text-primary').trim(),
        textSecondary: s.getPropertyValue('--text-secondary').trim(),
        textTertiary: s.getPropertyValue('--text-tertiary').trim(),
        textQuaternary: s.getPropertyValue('--text-quaternary').trim(),
        textWhite: s.getPropertyValue('--text-white').trim(),
        borderSubtle: s.getPropertyValue('--border-subtle').trim(),
        borderMedium: s.getPropertyValue('--border-medium').trim(),
        borderEmphasis: s.getPropertyValue('--border-emphasis').trim(),
        interactiveBg: s.getPropertyValue('--interactive-bg').trim(),
        interactiveBgHover: s.getPropertyValue('--interactive-bg-hover').trim(),
        interactiveBgActive: s.getPropertyValue('--interactive-bg-active').trim(),
        semanticBullish: s.getPropertyValue('--semantic-bullish').trim(),
        semanticBearish: s.getPropertyValue('--semantic-bearish').trim(),
        semanticNeutral: s.getPropertyValue('--semantic-neutral').trim(),
        semanticWeakening: s.getPropertyValue('--semantic-weakening').trim(),
        accentPrimary: s.getPropertyValue('--accent-primary').trim(),
        accentPrimaryLight: s.getPropertyValue('--accent-primary-light').trim(),
        chartBg: s.getPropertyValue('--chart-bg').trim(),
        chartGrid: s.getPropertyValue('--chart-grid').trim(),
        chartGridStrong: s.getPropertyValue('--chart-grid-strong').trim(),
        chartCrosshair: s.getPropertyValue('--chart-crosshair').trim(),
        chartCrosshairCenter: s.getPropertyValue('--chart-crosshair-center').trim(),
        chartAxisText: s.getPropertyValue('--chart-axis-text').trim(),
        chartAxisBorder: s.getPropertyValue('--chart-axis-border').trim(),
        surfaceHover: s.getPropertyValue('--surface-hover').trim(),
        surfaceModal: s.getPropertyValue('--surface-modal').trim(),
        overlayBackdrop: s.getPropertyValue('--overlay-backdrop').trim(),
        quadrantLeading: s.getPropertyValue('--quadrant-leading').trim(),
        quadrantImproving: s.getPropertyValue('--quadrant-improving').trim(),
        quadrantLagging: s.getPropertyValue('--quadrant-lagging').trim(),
        quadrantWeakening: s.getPropertyValue('--quadrant-weakening').trim(),
        canvasLabelBg: s.getPropertyValue('--canvas-label-bg').trim(),
        legendBg: s.getPropertyValue('--legend-bg').trim(),
        drilldownBg: s.getPropertyValue('--drilldown-bg').trim(),
        drilldownBorderRow: s.getPropertyValue('--drilldown-border-row').trim(),
      };
    }

    function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'dark'); // default dark
      if (theme === 'light') {
        document.documentElement.classList.add('light');
      }
      currentThemeColors = getThemeColors();
      updateThemeToggleIcon();
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('light');
      const isLight = document.documentElement.classList.contains('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      currentThemeColors = getThemeColors();
      updateThemeToggleIcon();
      refreshAllVisuals();
    }

    function updateThemeToggleIcon() {
      const btn = document.getElementById('theme-toggle');
      if (!btn) return;
      const isLight = document.documentElement.classList.contains('light');
      btn.innerHTML = isLight ? '&#9728;' : '&#9790;';
      btn.title = isLight ? 'Switch to dark theme' : 'Switch to light theme';
    }

    function refreshAllVisuals() {
      // Re-render all panel charts
      for (let i = 0; i < PANEL_COUNT; i++) {
        if (panelDataCache[i]) loadPanel(i);
      }
      // Redraw canvas views
      if (currentView === 'rrg') drawRRG();
      if (currentView === 'stockrrg') drawStockRRG();
      // Rebuild table views
      if (currentView === 'sectors') buildSectorsView();
      if (currentView === 'stocks') buildStocksView();
      if (currentView === 'swing') buildSwingView();
      if (currentView === 'grid') buildGridView();
      // Rebuild modal if open
      if (document.getElementById('modal').classList.contains('visible')) {
        buildModalChart();
      }
      // Re-render TV chart modal if open
      if (tvChartSymbol && document.getElementById('tv-chart-modal').classList.contains('visible')) {
        const sym = tvChartSymbol;
        if (tvChartInstances) {
          try { tvChartInstances.main.remove(); } catch(e) {}
          try { tvChartInstances.rsi.remove(); } catch(e) {}
          try { tvChartInstances.ao.remove(); } catch(e) {}
          tvChartInstances = null;
        }
        document.getElementById('tv-chart-container').innerHTML = '';
        // Re-open with updated theme colors (currentThemeColors already refreshed)
        openTVChartModal(sym);
      }
    }

    // Initialize theme before any rendering
    initTheme();

    // ── Panel metadata (titles, symbols, counts) ──
    const PANEL_COUNT = 16;
    const STAGGER_DELAY = 100;

    // Store loaded panel data, chart instances, and stock names
    const panelDataCache = {};
    const panelCharts = {};
    let tvChartInstances = null; // { main, rsi, ao } Lightweight Charts for TV modal
    let tvChartSymbol = null;    // currently displayed symbol in TV modal
    let infoPanelChartMode = 'line'; // 'line' | 'candle' for info panel sparkline
    let gridColumns = 4;
    let gridChartMode = 'candle'; // 'line' | 'candle'
    let gridSectorFilter = 'all';
    let gridRange = '3M'; // '1M' | '3M' | '6M'
    let gridFilterQuadrant = 'all'; // 'all' | 'leading' | 'improving' | 'weakening' | 'lagging'
    let gridFilterMomentum = 'all'; // 'all' | 'bullish' | 'bearish' | 'crossing' | 'nearEma8' | 'nearEma21'
    let gridFavorites = new Set(JSON.parse(localStorage.getItem('gridFavorites') || '[]'));
    let gridShowFavorites = false;
    let gridShowEma8 = false;
    let gridShowEma21 = true;
    let gridShowMa50 = false;
    let gridHighlightIndicators = false;
    let rotationBenchmark = 'sector'; // 'sector' | 'spy' | 'absolute'
    let gridSortBy = 'rsRating'; // 'default' | 'rsRating' | 'swingScore' | 'ret1d' | 'rsiDelta' | 'ma50Dist'
    let stockNamesMap = {};
    fetch('data/stock_names.json').then(r => r.json()).then(d => { stockNamesMap = d; }).catch(() => {});
    let currentRange = '3M';
    let spaghettiMode = 'absolute';
    let rsRatingCache = null;
    let staggerTimers = [];
    let highlightedSymbol = null;
    const panelSeriesMap = {};
    let divergenceCache = {};
    let rsLineEnabled = false;
    let spaghettiLineMode = 'raw'; // 'raw' | 'smooth' | 'rebased'

    // Swing scoring time windows (trading days)
    const SWING_WINDOWS = { short: 10, mid: 20, long: 40 };

    // Rotation stage definitions
    const ROTATION_STAGES = {
      1: { label: 'Accumulation', color: '#4dd8b4' },
      2: { label: 'Markup',       color: '#6ba3d6' },
      3: { label: 'Distribution', color: '#e07c5a' },
      4: { label: 'Decline',      color: '#f0616d' },
    };

    let swingScoreCache = {};
    let swingPanelVisible = false;
    let swingSortCol = 'total';
    let swingSortAsc = false;
    let swingFilterSector = -1;
    let swingFilterSignal = 'all';

    // One muted color per sector panel
    const ISOLATED_PALETTE = [
      '#6ba3d6', // steel blue
      '#e07c5a', // salmon
      '#7bc87f', // sage green
      '#c4a24d', // gold
      '#a87cc4', // lavender
      '#5bc4c4', // teal
      '#d67ba0', // rose
      '#8aa864', // olive
    ];

    const SECTOR_COLORS = [
      '#5b86b8', // 1. Market ETFs
      '#8b6cb8', // 2. Tech Software
      '#5898c0', // 3. Tech Hardware
      '#4ea89a', // 4. Financials
      '#c08060', // 5. Producer Mfg
      '#988070', // 6. Non-Energy Minerals
      '#b86868', // 7. Consumer Services
      '#5a90b8', // 8. Retail Trade
      '#609878', // 9. Commercial Services
      '#98a050', // 10. Consumer Staples
      '#c89048', // 11. Industrial Services
      '#4898a8', // 12. Transportation
      '#886888', // 13. Process Industries
      '#c07048', // 14. Energy
      '#70a060', // 15. Consumer Durables
      '#a06080', // 16. Comms/Utilities
    ];

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    // ── Range → start date calculation ──
    function getRangeStartDate(range, dates) {
      const lastDateStr = dates[dates.length - 1];
      const last = new Date(lastDateStr + 'T00:00:00');
      let start;
      switch (range) {
        case '1D':  start = new Date(last); start.setDate(start.getDate() - 1); break;
        case '5D':  start = new Date(last); start.setDate(start.getDate() - 5); break;
        case '10D': start = new Date(last); start.setDate(start.getDate() - 14); break;
        case '1M':  start = new Date(last); start.setMonth(start.getMonth() - 1); break;
        case '2M':  start = new Date(last); start.setMonth(start.getMonth() - 2); break;
        case '3M':  start = new Date(last); start.setMonth(start.getMonth() - 3); break;
        case '6M':  start = new Date(last); start.setMonth(start.getMonth() - 6); break;
        case 'YTD': start = new Date(last.getFullYear(), 0, 1); break;
        case '1Y':  start = new Date(last); start.setFullYear(start.getFullYear() - 1); break;
        case '12M': start = new Date(last); start.setFullYear(start.getFullYear() - 1); break;
        case '60M': start = new Date(last); start.setFullYear(start.getFullYear() - 5); break;
        default:    start = new Date(last); start.setMonth(start.getMonth() - 3); break;
      }
      return start;
    }

    // Find the index in the dates array that is >= the start date
    function findStartIndex(dates, startDate) {
      const startStr = startDate.toISOString().slice(0, 10);
      for (let i = 0; i < dates.length; i++) {
        if (dates[i] >= startStr) return i;
      }
      return 0;
    }

    // Normalize prices to % change from a given start index
    function normalizeToPercent(prices, startIdx) {
      const basePrice = prices[startIdx];
      if (!basePrice || basePrice === 0) return prices.map(() => null);
      return prices.map((p, i) => {
        if (i < startIdx || p == null) return null;
        return ((p - basePrice) / basePrice) * 100;
      });
    }

    // ── Get benchmark prices for a panel based on spaghetti mode ──
    function getBenchmarkPrices(panelIndex, data) {
      switch (spaghettiMode) {
        case 'absolute':
          return null;
        case 'sector': {
          if (panelIndex === 0) {
            // Panel 0 (Market ETFs): benchmark is SPY
            const p0 = panelDataCache[0];
            return p0 ? p0.prices['SPY'] : null;
          }
          // Panels 1+: benchmark is the sector's base ETF
          return data.prices[data.baseSymbol] || null;
        }
        case 'equalweight': {
          if (panelIndex === 0) {
            // Panel 0: benchmark is RSP
            const p0 = panelDataCache[0];
            return p0 ? p0.prices['RSP'] : null;
          }
          // Panels 1+: EW ETF from CAP_TO_EQUAL, fallback to baseSymbol
          const ewSym = CAP_TO_EQUAL[data.baseSymbol];
          if (ewSym && ewSym !== data.baseSymbol) {
            // Try to find EW ETF prices: first in this panel's data, then in panel 0
            if (data.prices[ewSym]) return data.prices[ewSym];
            const p0 = panelDataCache[0];
            if (p0 && p0.prices[ewSym]) return p0.prices[ewSym];
          }
          // Fallback to base ETF
          return data.prices[data.baseSymbol] || null;
        }
        case 'vsSpy': {
          const p0 = panelDataCache[0];
          return p0 ? p0.prices['SPY'] : null;
        }
        case 'vsRsp': {
          const p0 = panelDataCache[0];
          return p0 ? p0.prices['RSP'] : null;
        }
        case 'rsRating':
          return null; // RS Rating uses special handling
        default:
          return null;
      }
    }

    // ── Compute RS Ratings for all symbols across all panels ──
    function computeAllRSRatings(range) {
      // Lookback periods in trading days (approx)
      const LOOKBACKS = [
        { days: 21, weight: 0.4 },   // ~1 month
        { days: 63, weight: 0.3 },   // ~3 months
        { days: 126, weight: 0.2 },  // ~6 months
        { days: 252, weight: 0.1 },  // ~12 months
      ];

      // Collect all symbols and their prices across all panels
      const allSymbols = [];
      const seenSyms = new Set();
      for (let pi = 0; pi < PANEL_COUNT; pi++) {
        const pData = panelDataCache[pi];
        if (!pData) continue;
        pData.symbols.forEach(sym => {
          if (!seenSyms.has(sym)) {
            seenSyms.add(sym);
            allSymbols.push({ sym, prices: pData.prices[sym], dates: pData.dates });
          }
        });
      }

      if (allSymbols.length === 0) { rsRatingCache = {}; return; }

      // Use the dates from panel 0 as the master timeline
      const masterDates = panelDataCache[0] ? panelDataCache[0].dates : allSymbols[0].dates;
      const startDate = getRangeStartDate(range, masterDates);
      const startIdx = findStartIndex(masterDates, startDate);

      // Build direct index-based price arrays (all panels share the same dates)
      const priceArrays = {};
      allSymbols.forEach(({ sym, prices }) => {
        priceArrays[sym] = prices || [];
      });

      // For each date in the visible range, compute weighted performance for each symbol, then rank
      const cache = {};
      allSymbols.forEach(({ sym }) => {
        cache[sym] = new Array(masterDates.length).fill(null);
      });

      for (let d = startIdx; d < masterDates.length; d++) {
        const scores = []; // { sym, score }

        allSymbols.forEach(({ sym }) => {
          const prices = priceArrays[sym];
          const currentPrice = prices[d];
          if (currentPrice == null) return;

          let weightedScore = 0;
          let totalWeight = 0;

          LOOKBACKS.forEach(({ days, weight }) => {
            const lookbackIdx = d - days;
            const pastIdx = lookbackIdx < 0 ? 0 : lookbackIdx;
            if (pastIdx >= d) return; // no lookback available
            const pastPrice = prices[pastIdx];
            if (pastPrice != null && pastPrice !== 0) {
              weightedScore += ((currentPrice / pastPrice - 1) * 100) * weight;
              totalWeight += weight;
            }
          });

          if (totalWeight > 0) {
            scores.push({ sym, score: weightedScore / totalWeight });
          }
        });

        if (scores.length === 0) continue;

        // Sort by score ascending, then assign percentile rank
        scores.sort((a, b) => a.score - b.score);
        const n = scores.length;
        scores.forEach((entry, rank) => {
          // Percentile: 0 = worst, 100 = best
          cache[entry.sym][d] = (rank / (n - 1)) * 100;
        });

        // Handle edge case: only 1 symbol
        if (n === 1) cache[scores[0].sym][d] = 50;
      }

      rsRatingCache = cache;
    }

    // ── Build chart for a panel ──
    function buildPanelChart(panelIndex, container, legendEl, data, range, isModal) {
      const tc = currentThemeColors;
      const chart = LightweightCharts.createChart(container, {
        layout: {
          background: { type: 'solid', color: tc.chartBg },
          textColor: tc.textQuaternary,
          fontSize: isModal ? 11 : 9,
        },
        grid: {
          vertLines: { color: tc.chartGrid },
          horzLines: { color: tc.chartGrid },
        },
        crosshair: {
          mode: LightweightCharts.CrosshairMode.Normal,
          vertLine: { color: tc.chartCrosshair, width: 1, style: 0 },
          horzLine: { color: tc.chartCrosshair, width: 1, style: 0 },
        },
        rightPriceScale: {
          borderColor: tc.chartAxisBorder,
          scaleMargins: { top: 0.1, bottom: 0.1 },
        },
        timeScale: {
          borderColor: tc.chartAxisBorder,
          timeVisible: false,
          rightOffset: 5,
        },
        handleScale: { axisPressedMouseMove: true },
        handleScroll: { vertTouchDrag: false },
      });

      const startDate = getRangeStartDate(range, data.dates);
      const startIdx = findStartIndex(data.dates, startDate);

      const isRsRating = spaghettiMode === 'rsRating';
      const benchmarkPrices = getBenchmarkPrices(panelIndex, data);
      const benchNorm = benchmarkPrices ? normalizeToPercent(benchmarkPrices, startIdx) : null;

      // For RS Rating, ensure cache is computed
      if (isRsRating && !rsRatingCache) {
        computeAllRSRatings(range);
      }

      const seriesList = [];
      const symbolColors = {};

      // Determine which symbol should be the bold "base" line based on mode
      const ewModeSwap = spaghettiMode === 'equalweight' && panelIndex > 0;
      const ewBaseSym = ewModeSwap ? CAP_TO_EQUAL[data.baseSymbol] : null;
      const benchSym = spaghettiMode === 'vsSpy' ? 'SPY'
                     : spaghettiMode === 'vsRsp' ? 'RSP'
                     : spaghettiMode === 'equalweight' && panelIndex === 0 ? 'RSP'
                     : ewModeSwap ? ewBaseSym
                     : null;

      data.symbols.forEach((sym, si) => {
        const isOrigBase = sym === data.baseSymbol;
        // In benchmark modes: promote the benchmark symbol to base
        const isBase = benchSym ? (sym === benchSym) : isOrigBase;
        const sectorColor = SECTOR_COLORS[panelIndex % SECTOR_COLORS.length];
        const color = isBase ? sectorColor : hexToRgba(sectorColor, 0.35);
        symbolColors[sym] = sectorColor;

        let lineData = [];

        if (isRsRating) {
          // RS Rating mode: use precomputed percentile data
          const ratings = rsRatingCache ? rsRatingCache[sym] : null;
          if (!ratings) return;
          for (let i = startIdx; i < data.dates.length; i++) {
            if (ratings[i] != null) {
              lineData.push({ time: data.dates[i], value: ratings[i] });
            }
          }
        } else {
          const rawPrices = data.prices[sym];
          if (!rawPrices) return;

          if (spaghettiLineMode === 'rebased' && benchmarkPrices) {
            // Rebased ratio: (stock/bench) / (stock[start]/bench[start]) - 1
            const startRatio = rawPrices[startIdx] / benchmarkPrices[startIdx];
            if (!startRatio || !isFinite(startRatio)) return;
            for (let i = startIdx; i < data.dates.length; i++) {
              if (rawPrices[i] != null && benchmarkPrices[i] != null && benchmarkPrices[i] !== 0) {
                const ratio = rawPrices[i] / benchmarkPrices[i];
                lineData.push({ time: data.dates[i], value: (ratio / startRatio - 1) * 100 });
              }
            }
          } else {
            const normalized = normalizeToPercent(rawPrices, startIdx);

            if (benchNorm) {
              // Subtraction mode: symbol% - benchmark%
              for (let i = startIdx; i < data.dates.length; i++) {
                if (normalized[i] != null && benchNorm[i] != null) {
                  lineData.push({ time: data.dates[i], value: normalized[i] - benchNorm[i] });
                }
              }
            } else {
              // Absolute mode
              for (let i = startIdx; i < data.dates.length; i++) {
                if (normalized[i] != null) {
                  lineData.push({ time: data.dates[i], value: normalized[i] });
                }
              }
            }
          }
        }

        if (lineData.length === 0) return;

        // Apply 3-day EMA smoothing if enabled (display only)
        if (spaghettiLineMode === 'smooth' && lineData.length >= 2) {
          lineData = ema3(lineData);
        }

        const series = chart.addLineSeries({
          color: color,
          lineWidth: isBase ? 2 : 1,
          priceLineVisible: false,
          lastValueVisible: false,
          crosshairMarkerVisible: isModal,
        });
        series.setData(lineData);
        seriesList.push({ sym, series, color, isBase });
      });

      // Add benchmark symbol as a bold flat-zero line if it's not already in the panel
      if (benchSym && benchSym !== data.baseSymbol && !data.symbols.includes(benchSym) && seriesList.length > 0) {
        const sectorColor = SECTOR_COLORS[panelIndex % SECTOR_COLORS.length];
        const zeroLineData = [];
        for (let i = startIdx; i < data.dates.length; i++) {
          if (benchNorm && benchNorm[i] != null) {
            zeroLineData.push({ time: data.dates[i], value: 0 });
          }
        }
        if (zeroLineData.length > 0) {
          const bSeries = chart.addLineSeries({
            color: sectorColor,
            lineWidth: 2,
            priceLineVisible: false,
            lastValueVisible: false,
            crosshairMarkerVisible: isModal,
          });
          bSeries.setData(zeroLineData);
          seriesList.push({ sym: benchSym, series: bSeries, color: sectorColor, isBase: true, lastValue: 0 });
        }
      }
      // Also handle vsSpy/vsRsp where benchmark IS the baseSymbol (panel 0)
      if (benchSym && benchSym === data.baseSymbol && data.symbols.includes(benchSym)) {
        // Already drawn in the loop above with isBase: true — no action needed
      }

      // ── RS Line overlay (price/benchmark ratio as % change) ──
      if (rsLineEnabled && !isRsRating && spaghettiMode !== 'absolute') {
        const p0 = panelDataCache[0];
        const spyPrices = p0 ? p0.prices['SPY'] : null;
        if (spyPrices) {
          // In panel view: RS Line for base symbol only; in modal: all symbols
          const rsSymbols = isModal ? data.symbols : [data.baseSymbol];
          rsSymbols.forEach(sym => {
            const rawPrices = data.prices[sym];
            if (!rawPrices) return;
            const rsLineData = [];
            const baseRatio = (rawPrices[startIdx] && spyPrices[startIdx]) ? rawPrices[startIdx] / spyPrices[startIdx] : null;
            if (!baseRatio) return;
            for (let i = startIdx; i < data.dates.length; i++) {
              if (rawPrices[i] != null && spyPrices[i] != null && spyPrices[i] !== 0) {
                const ratio = rawPrices[i] / spyPrices[i];
                rsLineData.push({ time: data.dates[i], value: ((ratio - baseRatio) / baseRatio) * 100 });
              }
            }
            if (rsLineData.length === 0) return;
            const sectorColor = SECTOR_COLORS[panelIndex % SECTOR_COLORS.length];
            const existingEntry = seriesList.find(e => e.sym === sym && !e.isRsLine);
            const rsColor = existingEntry ? hexToRgba(sectorColor, 0.55) : hexToRgba(sectorColor, 0.4);
            const rsSeries = chart.addLineSeries({
              color: rsColor,
              lineWidth: 1,
              lineStyle: 1, // dashed
              priceLineVisible: false,
              lastValueVisible: false,
              crosshairMarkerVisible: false,
            });
            rsSeries.setData(rsLineData);
            seriesList.push({ sym: sym + ' (RS)', series: rsSeries, color: rsColor, isBase: false, isRsLine: true });
          });
        }
      }

      chart.timeScale().fitContent();

      // Reference lines
      if (seriesList.length > 0) {
        if (isRsRating) {
          // RS Rating: add reference line at 50
          [50].forEach(level => {
            const refSeries = chart.addLineSeries({
              color: 'rgba(100, 100, 100, 0.4)',
              lineWidth: 1,
              lineStyle: 2,
              priceLineVisible: false,
              lastValueVisible: false,
              crosshairMarkerVisible: false,
            });
            const refData = [];
            for (let i = startIdx; i < data.dates.length; i++) {
              refData.push({ time: data.dates[i], value: level });
            }
            refSeries.setData(refData);
          });
        } else {
          // Zero line for absolute and subtraction modes
          const zeroSeries = chart.addLineSeries({
            color: 'rgba(100, 100, 100, 0.4)',
            lineWidth: 1,
            lineStyle: 2,
            priceLineVisible: false,
            lastValueVisible: false,
            crosshairMarkerVisible: false,
          });
          const zeroData = [];
          for (let i = startIdx; i < data.dates.length; i++) {
            zeroData.push({ time: data.dates[i], value: 0 });
          }
          zeroSeries.setData(zeroData);
        }
      }

      // Store last value for each series (mode-aware) — must be before legend
      seriesList.forEach(entry => {
        if (isRsRating) {
          const ratings = rsRatingCache ? rsRatingCache[entry.sym] : null;
          if (ratings) {
            for (let i = ratings.length - 1; i >= startIdx; i--) {
              if (ratings[i] != null) { entry.lastValue = ratings[i]; break; }
            }
          }
        } else {
          const rawPrices = data.prices[entry.sym];
          if (rawPrices) {
            const normalized = normalizeToPercent(rawPrices, startIdx);
            if (benchNorm) {
              for (let i = normalized.length - 1; i >= startIdx; i--) {
                if (normalized[i] != null && benchNorm[i] != null) {
                  entry.lastValue = normalized[i] - benchNorm[i]; break;
                }
              }
            } else {
              for (let i = normalized.length - 1; i >= startIdx; i--) {
                if (normalized[i] != null) { entry.lastValue = normalized[i]; break; }
              }
            }
          }
        }
      });

      // Crosshair legend + dynamic stats
      chart.subscribeCrosshairMove(param => {
        if (!param.time || !legendEl) {
          // Show default legend (latest values)
          updateLegend(legendEl, seriesList, null, data, startIdx, isModal);
          if (isModal) { modalCrosshairDateIdx = null; updateModalStatsForCrosshair(); }
          return;
        }
        updateLegend(legendEl, seriesList, param, data, startIdx, isModal);
        if (isModal && modalHiddenSymbols.size > 0) {
          // Find the date index for the hovered time
          const timeStr = typeof param.time === 'string' ? param.time
            : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
          const idx = data.dates.indexOf(timeStr);
          if (idx !== modalCrosshairDateIdx) {
            modalCrosshairDateIdx = idx >= 0 ? idx : null;
            updateModalStatsForCrosshair();
          }
        }
      });

      // Show default legend
      updateLegend(legendEl, seriesList, null, data, startIdx, isModal);

      // ── Endpoint labels on the right side ──
      const labelsEl = document.createElement('div');
      labelsEl.className = 'endpoint-labels';
      container.parentElement.appendChild(labelsEl);

      function updateEndpoints() {
        labelsEl.innerHTML = '';
        const hasIsolation = isModal && modalHiddenSymbols.size > 0;
        seriesList.forEach(({ sym, series, color, isBase, lastValue, isRsLine }) => {
          if (isRsLine) return; // skip RS Line overlay in endpoints
          if (lastValue == null) return;
          // Hide endpoint labels for hidden symbols in modal
          if (isModal && modalHiddenSymbols.has(sym)) return;
          const y = series.priceToCoordinate(lastValue);
          if (y == null || y < 0) return;
          const label = document.createElement('div');
          label.className = 'endpoint-label';
          label.style.top = y + 'px';
          // Use palette color when isolation active
          if (hasIsolation && modalSymbolColorMap[sym]) {
            label.style.color = modalSymbolColorMap[sym];
          } else {
            label.style.color = currentThemeColors.textPrimary;
          }
          if (isBase) label.style.fontWeight = '500';
          let text = '';
          if (isRsRating) {
            text = `${sym} ${lastValue.toFixed(0)}`;
          } else {
            const sign = lastValue >= 0 ? '+' : '';
            text = `${sym} ${sign}${lastValue.toFixed(1)}%`;
          }
          const div = divergenceCache[sym];
          if (div === 'bullish') text += ' \u25B2';
          else if (div === 'bearish') text += ' \u25BC';
          label.textContent = text;
          if (div) label.title = div === 'bullish' ? 'Bullish divergence: price making new lows but RS improving' : 'Bearish divergence: price making new highs but RS weakening';
          labelsEl.appendChild(label);
        });
      }

      setTimeout(updateEndpoints, 100);
      chart.timeScale().subscribeVisibleLogicalRangeChange(() => {
        requestAnimationFrame(updateEndpoints);
      });

      return { chart, seriesList };
    }

    function updateLegend(legendEl, seriesList, param, data, startIdx, isModal) {
      if (!legendEl) return;
      const isRsMode = spaghettiMode === 'rsRating';

      const items = [];
      seriesList.forEach(({ sym, series, color, isBase, isRsLine }) => {
        if (isRsLine) return; // skip RS Line overlay in legend
        let val = null;
        if (param && param.seriesData) {
          const d = param.seriesData.get(series);
          if (d && d.value !== undefined) val = d.value;
        } else {
          const entry = seriesList.find(e => e.sym === sym && !e.isRsLine);
          if (entry && entry.lastValue != null) val = entry.lastValue;
        }
        if (val != null) {
          items.push({ sym, color, val, isBase });
        }
      });

      // Sort by value descending
      items.sort((a, b) => b.val - a.val);

      // Modal: show all; panels: top 10
      const maxItems = isModal ? items.length : 10;
      let shown = items.slice(0, maxItems);
      const baseItem = items.find(i => i.isBase);
      if (baseItem && !shown.includes(baseItem)) {
        shown.push(baseItem);
      }

      legendEl.innerHTML = shown.map(item => {
        const weight = item.isBase ? 'font-weight:700;' : '';
        const hlClass = highlightedSymbol === item.sym ? ' highlighted' : '';
        const divBadge = divergenceCache[item.sym] === 'bullish'
          ? '<span class="div-badge div-bullish" title="Bullish divergence: price new lows but RS improving">&#9650;</span>'
          : divergenceCache[item.sym] === 'bearish'
          ? '<span class="div-badge div-bearish" title="Bearish divergence: price new highs but RS weakening">&#9660;</span>'
          : '';
        if (isRsMode) {
          const valColor = item.val >= 50 ? currentThemeColors.semanticBullish : currentThemeColors.semanticBearish;
          return `<div class="chart-legend-item clickable${hlClass}" data-sym="${item.sym}" style="${weight}">
            <span class="chart-legend-dot" style="background:${item.color}"></span>
            <span class="chart-legend-sym">${item.sym}</span>
            <span class="chart-legend-val" style="color:${valColor}">${item.val.toFixed(0)}</span>${divBadge}
          </div>`;
        }
        const sign = item.val >= 0 ? '+' : '';
        const valColor = item.val >= 0 ? currentThemeColors.semanticBullish : currentThemeColors.semanticBearish;
        return `<div class="chart-legend-item clickable${hlClass}" data-sym="${item.sym}" style="${weight}">
          <span class="chart-legend-dot" style="background:${item.color}"></span>
          <span class="chart-legend-sym">${item.sym}${item.isBase && spaghettiMode !== 'absolute' ? ' (Baseline)' : ''}</span>
          <span class="chart-legend-val" style="color:${valColor}">${sign}${item.val.toFixed(1)}%</span>${divBadge}
        </div>`;
      }).join('');

      // For modal: reapply legend-hidden class and palette dot colors
      if (isModal && modalHiddenSymbols.size > 0) {
        legendEl.querySelectorAll('.chart-legend-item[data-sym]').forEach(el => {
          el.classList.toggle('legend-hidden', modalHiddenSymbols.has(el.dataset.sym));
          if (modalSymbolColorMap[el.dataset.sym]) {
            const dot = el.querySelector('.chart-legend-dot');
            if (dot) dot.style.background = modalSymbolColorMap[el.dataset.sym];
          }
        });
      }
    }

    // ── Cross-panel symbol highlighting ──
    function applyHighlight(symbol) {
      highlightedSymbol = symbol;
      Object.keys(panelSeriesMap).forEach(key => {
        const seriesList = panelSeriesMap[key];
        if (!seriesList) return;
        seriesList.forEach(entry => {
          // For RS Line entries, match against the base symbol
          const baseSym = entry.isRsLine ? entry.sym.replace(' (RS)', '') : entry.sym;
          // Skip modal series that are hidden (visibility takes precedence)
          if (key === 'modal' && modalHiddenSymbols.has(baseSym)) return;
          if (symbol === null) {
            // Restore original colors
            const panelIdx = key === 'modal' ? modalPanelIndex : parseInt(key);
            const sectorColor = SECTOR_COLORS[panelIdx % SECTOR_COLORS.length];
            const restoreColor = entry.isBase ? sectorColor : (entry.isRsLine ? hexToRgba(sectorColor, 0.55) : hexToRgba(sectorColor, 0.35));
            entry.series.applyOptions({ color: restoreColor, lineWidth: entry.isBase ? 2 : 1 });
          } else if (baseSym === symbol) {
            const panelIdx = key === 'modal' ? modalPanelIndex : parseInt(key);
            const sectorColor = SECTOR_COLORS[panelIdx % SECTOR_COLORS.length];
            entry.series.applyOptions({ color: sectorColor, lineWidth: 3 });
          } else {
            const panelIdx = key === 'modal' ? modalPanelIndex : parseInt(key);
            const sectorColor = SECTOR_COLORS[panelIdx % SECTOR_COLORS.length];
            entry.series.applyOptions({ color: hexToRgba(sectorColor, 0.08), lineWidth: 1 });
          }
        });
      });
      // If restoring and modal has isolation active, re-apply isolated colors
      if (symbol === null && modalHiddenSymbols.size > 0) {
        applyModalVisibility();
      }
      // Update highlighted class on legend items
      document.querySelectorAll('.chart-legend-item[data-sym]').forEach(el => {
        el.classList.toggle('highlighted', el.dataset.sym === symbol);
      });
    }

    // ── Compute momentum divergences ──
    function computeDivergences(range) {
      divergenceCache = {};
      // Need RS Rating cache
      if (!rsRatingCache) {
        // Check if we have enough panel data
        let hasPanelData = false;
        for (let i = 0; i < PANEL_COUNT; i++) {
          if (panelDataCache[i]) { hasPanelData = true; break; }
        }
        if (!hasPanelData) return;
        computeAllRSRatings(range);
      }
      if (!rsRatingCache) return;

      const masterDates = panelDataCache[0] ? panelDataCache[0].dates : null;
      if (!masterDates || masterDates.length === 0) return;

      const startDate = getRangeStartDate(range, masterDates);
      const startIdx = findStartIndex(masterDates, startDate);
      const totalBars = masterDates.length - startIdx;

      // Recent window: last 1/3 of range, clamped to [10, 63]
      const recentLen = Math.max(10, Math.min(63, Math.floor(totalBars / 3)));
      if (totalBars < 15) return; // too few data points

      const recentStart = masterDates.length - recentLen;
      const earlyEnd = recentStart;

      // Collect all unique symbols across panels
      const seenSyms = new Set();
      for (let pi = 0; pi < PANEL_COUNT; pi++) {
        const pData = panelDataCache[pi];
        if (!pData) continue;
        pData.symbols.forEach(sym => {
          if (seenSyms.has(sym)) return;
          seenSyms.add(sym);

          const prices = pData.prices[sym];
          const ratings = rsRatingCache[sym];
          if (!prices || !ratings) return;

          // Need at least 5 data points in recent window
          let recentCount = 0;
          for (let i = recentStart; i < masterDates.length; i++) {
            if (prices[i] != null && ratings[i] != null) recentCount++;
          }
          if (recentCount < 5) return;

          // Price: early high/low and recent high/low
          let earlyHigh = -Infinity, earlyLow = Infinity;
          for (let i = startIdx; i < earlyEnd; i++) {
            if (prices[i] != null) {
              if (prices[i] > earlyHigh) earlyHigh = prices[i];
              if (prices[i] < earlyLow) earlyLow = prices[i];
            }
          }
          let recentHigh = -Infinity, recentLow = Infinity;
          for (let i = recentStart; i < masterDates.length; i++) {
            if (prices[i] != null) {
              if (prices[i] > recentHigh) recentHigh = prices[i];
              if (prices[i] < recentLow) recentLow = prices[i];
            }
          }

          if (earlyHigh === -Infinity || recentHigh === -Infinity) return;

          const priceNewHigh = recentHigh >= earlyHigh;
          const priceNewLow = recentLow <= earlyLow;

          // RS Rating slope via linear regression over recent window
          let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, n = 0;
          for (let i = recentStart; i < masterDates.length; i++) {
            if (ratings[i] != null) {
              const x = i - recentStart;
              sumX += x; sumY += ratings[i]; sumXY += x * ratings[i]; sumX2 += x * x;
              n++;
            }
          }
          if (n < 3) return;
          const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);

          // Bearish: price new high + RS slope falling
          if (priceNewHigh && slope < -0.1) {
            divergenceCache[sym] = 'bearish';
          }
          // Bullish: price new low + RS slope rising
          else if (priceNewLow && slope > 0.1) {
            divergenceCache[sym] = 'bullish';
          }
        });
      }

      // Refresh legends to show badges
      Object.keys(panelSeriesMap).forEach(key => {
        const pi = key === 'modal' ? modalPanelIndex : parseInt(key);
        const pData = panelDataCache[pi];
        if (!pData) return;
        const panelDiv = key === 'modal' ? document.getElementById('modal-chart') : document.getElementById('panel-' + pi);
        if (!panelDiv) return;
        const legendEl = panelDiv.querySelector('.chart-legend, .modal-legend');
        if (!legendEl || !panelSeriesMap[key]) return;
        const startDate = getRangeStartDate(key === 'modal' ? modalRange : currentRange, pData.dates);
        const sIdx = findStartIndex(pData.dates, startDate);
        updateLegend(legendEl, panelSeriesMap[key], null, pData, sIdx, key === 'modal');
      });
    }

    // ── RS Line toggle ──
    function toggleRSLine(btn) {
      rsLineEnabled = !rsLineEnabled;
      btn.classList.toggle('active', rsLineEnabled);
      for (let i = 0; i < PANEL_COUNT; i++) {
        if (panelDataCache[i]) loadPanel(i);
      }
      if (document.getElementById('modal').classList.contains('visible')) {
        buildModalChart();
      }
    }

    function setLineMode(mode) {
      spaghettiLineMode = mode;
      // Sync both topbar and modal buttons
      ['raw', 'smooth', 'rebased'].forEach(m => {
        document.getElementById('line-' + m + '-btn').classList.toggle('active', m === mode);
        document.getElementById('modal-line-' + m).classList.toggle('active', m === mode);
      });
      for (let i = 0; i < PANEL_COUNT; i++) {
        if (panelDataCache[i]) loadPanel(i);
      }
      if (document.getElementById('modal').classList.contains('visible')) {
        buildModalChart();
      }
    }

    // 3-day EMA for display smoothing
    function ema3(lineData) {
      if (lineData.length < 2) return lineData;
      const k = 2 / (3 + 1); // alpha for 3-period EMA
      const out = [lineData[0]];
      for (let i = 1; i < lineData.length; i++) {
        out.push({ time: lineData[i].time, value: lineData[i].value * k + out[i - 1].value * (1 - k) });
      }
      return out;
    }

    // ── Load panel data and build chart ──
    async function loadPanel(panelIndex) {
      const panelDiv = document.getElementById('panel-' + panelIndex);
      if (!panelDiv) return;

      const chartWrap = panelDiv.querySelector('.chart-wrap');

      // Check cache
      let data = panelDataCache[panelIndex];
      if (!data) {
        const filename = `data/panel_${String(panelIndex + 1).padStart(2, '0')}.json`;
        try {
          const resp = await fetch(filename, { cache: 'no-store' });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          data = await resp.json();
          panelDataCache[panelIndex] = data;
        } catch (e) {
          chartWrap.innerHTML = `<div class="chart-loading">Failed to load data</div>`;
          console.error(`Panel ${panelIndex + 1}: ${e.message}`);
          return;
        }
      }

      // Update title bar with actual data
      const titleEl = panelDiv.querySelector('.panel-title span:first-child');
      if (titleEl) titleEl.innerHTML = `${data.title} <span class="stock-count">(${data.symbols.length} symbols)</span>`;

      // Clear and create chart container
      chartWrap.innerHTML = '';
      const chartContainer = document.createElement('div');
      chartContainer.style.cssText = 'width:100%;height:100%;';
      chartWrap.appendChild(chartContainer);

      // Sector label watermark on chart area
      const sectorLabel = document.createElement('div');
      sectorLabel.className = 'chart-sector-label';
      sectorLabel.textContent = data.title;
      chartWrap.appendChild(sectorLabel);

      // Mode subtitle watermark
      if (spaghettiMode !== 'absolute') {
        const modeNames = { sector: 'vs Sector ETF', equalweight: 'Equal Weight', vsSpy: 'vs SPY', vsRsp: 'vs RSP', rsRating: 'RS Rating' };
        const modeLabel = document.createElement('div');
        modeLabel.className = 'chart-mode-label';
        modeLabel.textContent = modeNames[spaghettiMode] || '';
        chartWrap.appendChild(modeLabel);
      }

      const legendEl = document.createElement('div');
      legendEl.className = 'chart-legend';
      chartWrap.appendChild(legendEl);

      // Destroy old chart if exists
      if (panelCharts[panelIndex]) {
        try { panelCharts[panelIndex].remove(); } catch (e) {}
      }

      const result = buildPanelChart(panelIndex, chartContainer, legendEl, data, currentRange, false);
      panelCharts[panelIndex] = result.chart;
      panelSeriesMap[panelIndex] = result.seriesList;

      // Legend click handler for cross-panel highlighting
      legendEl.classList.add('clickable');
      legendEl.addEventListener('click', (e) => {
        const item = e.target.closest('.chart-legend-item[data-sym]');
        if (!item) return;
        const sym = item.dataset.sym;
        if (highlightedSymbol === sym) {
          applyHighlight(null);
        } else {
          applyHighlight(sym);
        }
      });

      // Reapply highlight if one is active
      if (highlightedSymbol) applyHighlight(highlightedSymbol);

      // After panel 0 loads, refresh title to show date range
      if (panelIndex === 0) updateViewTitle();
    }

    // ── Build all panels ──
    function updateViewTitle() {
      const el = document.getElementById('view-title');
      const modeLabels = { absolute: '% Change', sector: 'vs Sector ETF', equalweight: 'Equal Weight', vsSpy: 'vs SPY', vsRsp: 'vs RSP', rsRating: 'RS Rating' };
      const viewLabels = { spaghetti: 'Spaghetti', sectors: 'Sectors Heatmap', stocks: 'Stocks Heatmap', rrg: 'Sector RRG', stockrrg: 'Stock RRG', swing: 'Swing Scores', grid: 'Grid' };

      let title = viewLabels[currentView] || currentView;

      if (currentView === 'spaghetti') {
        title += '  |  ' + (modeLabels[spaghettiMode] || spaghettiMode) + '  |  ' + currentRange;
        // Add date range
        const p0 = panelDataCache[0];
        if (p0 && p0.dates && p0.dates.length > 0) {
          const startDate = getRangeStartDate(currentRange, p0.dates);
          const startIdx = findStartIndex(p0.dates, startDate);
          title += '  [' + p0.dates[startIdx] + ' to ' + p0.dates[p0.dates.length - 1] + ']';
        }
      } else if (currentView === 'rrg') {
        const period = document.getElementById('rrg-period').value;
        const bench = document.getElementById('rrg-benchmark').value;
        const etfType = document.getElementById('rrg-etf-type').value;
        title += '  |  ' + (period === 'daily' ? 'Daily' : 'Weekly') + '  |  ' + (etfType === 'equal' ? 'Equal-Weight' : 'Cap-Weight') + '  |  Benchmark: ' + bench;
      } else if (currentView === 'stockrrg') {
        const period = document.getElementById('srrg-period').value;
        const bench = document.getElementById('srrg-benchmark');
        title += '  |  ' + (period === 'daily' ? 'Daily' : 'Weekly') + (bench ? '  |  Benchmark: ' + bench.value : '');
      }

      el.textContent = title;
      el.classList.add('visible');
    }

    function buildWidgets() {
      staggerTimers.forEach(t => clearTimeout(t));
      staggerTimers = [];

      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      for (let i = 0; i < PANEL_COUNT; i++) {
        const panelDiv = document.createElement('div');
        panelDiv.className = 'panel';
        panelDiv.id = 'panel-' + i;

        const cached = panelDataCache[i];
        const title = cached ? cached.title : `Panel ${i + 1}`;
        const count = cached ? cached.symbols.length : '...';

        panelDiv.innerHTML = `
          <div class="panel-title">
            <span>${title} <span class="stock-count">(${count} symbols)</span></span>
            <button class="expand-btn" onclick="openModal(${i})" title="Expand">&#x26F6;</button>
          </div>
          <div class="chart-wrap">
            <div class="chart-loading">Loading...</div>
          </div>
        `;
        grid.appendChild(panelDiv);

        const timer = setTimeout(() => loadPanel(i), i * STAGGER_DELAY);
        staggerTimers.push(timer);
      }
      // Schedule divergence computation after all panels load
      setTimeout(() => computeDivergences(currentRange), PANEL_COUNT * STAGGER_DELAY + 500);
    }

    // ── Range selection ──
    function setRange(range, btn) {
      currentRange = range;
      rsRatingCache = null; // invalidate RS cache on range change
      divergenceCache = {};
      document.querySelectorAll('.topbar-controls .btn[data-range]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Re-render all panels with new range (no refetch)
      for (let i = 0; i < PANEL_COUNT; i++) {
        if (panelDataCache[i]) {
          loadPanel(i);
        }
      }
      updateViewTitle();
      setTimeout(() => computeDivergences(range), PANEL_COUNT * STAGGER_DELAY + 200);
    }

    // ── Spaghetti mode selection ──
    async function setSpaghettiMode(mode) {
      spaghettiMode = mode;
      rsRatingCache = null; // invalidate RS cache on mode change
      divergenceCache = {};

      // RS Line toggle: disable for absolute and rsRating modes
      const rsBtn = document.getElementById('rs-line-toggle');
      if (mode === 'absolute' || mode === 'rsRating') {
        rsLineEnabled = false;
        if (rsBtn) { rsBtn.classList.remove('active'); rsBtn.style.opacity = '0.4'; rsBtn.style.pointerEvents = 'none'; }
      } else {
        if (rsBtn) { rsBtn.style.opacity = ''; rsBtn.style.pointerEvents = ''; }
      }

      // Sync modal dropdown
      const modalSelect = document.getElementById('modal-spaghetti-mode');
      if (modalSelect) modalSelect.value = mode;

      // For RS Rating, ensure all panels are loaded first
      if (mode === 'rsRating') {
        const loadPromises = [];
        for (let i = 0; i < PANEL_COUNT; i++) {
          if (!panelDataCache[i]) {
            const filename = `data/panel_${String(i + 1).padStart(2, '0')}.json`;
            loadPromises.push(
              fetch(filename, { cache: 'no-store' }).then(r => r.json()).then(d => { panelDataCache[i] = d; }).catch(() => {})
            );
          }
        }
        if (loadPromises.length > 0) await Promise.all(loadPromises);
      }
      for (let i = 0; i < PANEL_COUNT; i++) {
        if (panelDataCache[i]) {
          loadPanel(i);
        }
      }
      // Re-render modal if open
      if (document.getElementById('modal').classList.contains('visible')) {
        buildModalChart();
      }
      updateModalRSToggleState();
      updateViewTitle();
      setTimeout(() => computeDivergences(currentRange), PANEL_COUNT * STAGGER_DELAY + 200);
    }

    async function setModalSpaghettiMode(mode) {
      spaghettiMode = mode;
      rsRatingCache = null;
      divergenceCache = {};

      // Sync topbar dropdown
      const topbarSelect = document.getElementById('spaghetti-mode');
      if (topbarSelect) topbarSelect.value = mode;

      // RS Line toggle state
      const rsBtn = document.getElementById('rs-line-toggle');
      if (mode === 'absolute' || mode === 'rsRating') {
        rsLineEnabled = false;
        if (rsBtn) { rsBtn.classList.remove('active'); rsBtn.style.opacity = '0.4'; rsBtn.style.pointerEvents = 'none'; }
      } else {
        if (rsBtn) { rsBtn.style.opacity = ''; rsBtn.style.pointerEvents = ''; }
      }

      // For RS Rating, ensure all panels are loaded first
      if (mode === 'rsRating') {
        const loadPromises = [];
        for (let i = 0; i < PANEL_COUNT; i++) {
          if (!panelDataCache[i]) {
            const filename = `data/panel_${String(i + 1).padStart(2, '0')}.json`;
            loadPromises.push(
              fetch(filename, { cache: 'no-store' }).then(r => r.json()).then(d => { panelDataCache[i] = d; }).catch(() => {})
            );
          }
        }
        if (loadPromises.length > 0) await Promise.all(loadPromises);
      }

      // Rebuild all panels
      for (let i = 0; i < PANEL_COUNT; i++) {
        if (panelDataCache[i]) loadPanel(i);
      }

      // Rebuild modal chart (selection preserved)
      buildModalChart();
      updateModalRSToggleState();
      updateViewTitle();
      setTimeout(() => computeDivergences(currentRange), PANEL_COUNT * STAGGER_DELAY + 200);
    }

    // ── Layout selection ──
    function setLayout(cls, btn) {
      const grid = document.getElementById('grid');
      grid.className = 'grid ' + cls;
      document.querySelectorAll('.topbar-controls .btn[data-layout]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Resize charts
      Object.values(panelCharts).forEach(chart => {
        try { chart.applyOptions({}); } catch (e) {}
      });
      // Use ResizeObserver or just trigger resize after layout change
      setTimeout(() => {
        Object.entries(panelCharts).forEach(([idx, chart]) => {
          try {
            const container = document.querySelector(`#panel-${idx} .chart-wrap div`);
            if (container) {
              chart.resize(container.clientWidth, container.clientHeight);
            }
          } catch (e) {}
        });
      }, 50);
    }

    // ── Modal ──
    let modalPanelIndex = null;
    let modalRange = null;
    let modalChart = null;
    let modalHiddenSymbols = new Set();
    let modalSelectedSymbols = [];
    let modalSymbolColorMap = {};
    let modalCrosshairDateIdx = null;  // date index for dynamic stats on hover

    function openModal(panelIndex) {
      modalPanelIndex = panelIndex;
      modalRange = currentRange;
      modalHiddenSymbols.clear();
      modalSelectedSymbols = [];
      modalSymbolColorMap = {};
      modalCrosshairDateIdx = null;
      const modal = document.getElementById('modal');
      const data = panelDataCache[panelIndex];
      const title = data ? data.title : `Panel ${panelIndex + 1}`;
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-spaghetti-mode').value = spaghettiMode;
      ['raw', 'smooth', 'rebased'].forEach(m => {
        document.getElementById('modal-line-' + m).classList.toggle('active', m === spaghettiLineMode);
      });

      // Build range buttons
      const ranges = [
        ['1D', '1D'], ['5D', '5D'], ['10D', '2W'], ['1M', '1M'], ['2M', '2M'], ['3M', '3M'],
        ['6M', '6M'], ['YTD', 'YTD'], ['12M', '1Y'], ['60M', '5Y']
      ];
      const rangesContainer = document.getElementById('modal-ranges');
      rangesContainer.innerHTML = ranges.map(([val, label]) =>
        `<button class="btn${val === modalRange ? ' active' : ''}" data-modal-range="${val}" onclick="setModalRange('${val}', this)">${label}</button>`
      ).join('');

      modal.classList.add('visible');
      // Delay chart build so the modal has dimensions for Lightweight Charts
      requestAnimationFrame(() => buildModalChart());
    }

    function buildModalChart() {
      const data = panelDataCache[modalPanelIndex];
      if (!data) return;

      const chartContainer = document.getElementById('modal-chart');
      chartContainer.innerHTML = '';

      const chartDiv = document.createElement('div');
      chartDiv.style.cssText = 'width:100%;height:100%;';
      chartContainer.appendChild(chartDiv);

      // Sector label watermark in modal
      const sectorLabel = document.createElement('div');
      sectorLabel.className = 'chart-sector-label';
      sectorLabel.style.fontSize = '18px';
      sectorLabel.style.top = '12px';
      sectorLabel.textContent = data.title;
      chartContainer.appendChild(sectorLabel);

      // Mode subtitle watermark in modal
      if (spaghettiMode !== 'absolute') {
        const modeNames = { sector: 'vs Sector ETF', equalweight: 'Equal Weight', vsSpy: 'vs SPY', vsRsp: 'vs RSP', rsRating: 'RS Rating' };
        const modeLabel = document.createElement('div');
        modeLabel.className = 'chart-mode-label';
        modeLabel.style.fontSize = '14px';
        modeLabel.style.top = '34px';
        modeLabel.textContent = modeNames[spaghettiMode] || '';
        chartContainer.appendChild(modeLabel);
      }

      const legendEl = document.createElement('div');
      legendEl.className = 'modal-legend';
      chartContainer.appendChild(legendEl);

      if (modalChart) {
        try { modalChart.remove(); } catch (e) {}
      }

      const result = buildPanelChart(modalPanelIndex, chartDiv, legendEl, data, modalRange, true);
      modalChart = result.chart;
      panelSeriesMap['modal'] = result.seriesList;

      // Legend click handler for modal visibility toggle
      legendEl.classList.add('clickable');
      legendEl.addEventListener('click', (e) => {
        const item = e.target.closest('.chart-legend-item[data-sym]');
        if (!item) return;
        handleModalLegendClick(item.dataset.sym);
      });

      // Reapply isolation state (selection survives range/mode changes)
      assignIsolatedColors();
      applyModalVisibility();
      if (modalHiddenSymbols.size > 0) showMultiStatsCards(); else hideMultiStatsCards();
      updateModalRSToggleState();

      // Reapply highlight if one is active
      if (highlightedSymbol) applyHighlight(highlightedSymbol);
    }

    function setModalRange(range, btn) {
      modalRange = range;
      document.querySelectorAll('#modal-ranges .btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildModalChart();
    }

    function closeModal(event) {
      if (event && event.target !== document.getElementById('modal')) return;
      modalHiddenSymbols.clear();
      modalSelectedSymbols = [];
      modalSymbolColorMap = {};
      modalCrosshairDateIdx = null;
      const modal = document.getElementById('modal');
      modal.classList.remove('visible');
      if (modalChart) {
        try { modalChart.remove(); } catch (e) {}
        modalChart = null;
      }
      document.getElementById('modal-chart').innerHTML = '';
    }

    // ── Modal visibility toggle ──
    function applyModalVisibility() {
      const seriesList = panelSeriesMap['modal'];
      if (!seriesList) return;
      const panelIdx = modalPanelIndex;
      const sectorColor = SECTOR_COLORS[panelIdx % SECTOR_COLORS.length];

      const hasIsolation = modalHiddenSymbols.size > 0;

      // Update modalSelectedSymbols from current series
      modalSelectedSymbols = seriesList
        .filter(e => !e.isBase && !e.isRsLine && !modalHiddenSymbols.has(e.sym))
        .map(e => e.sym);

      seriesList.forEach(entry => {
        const baseSym = entry.isRsLine ? entry.sym.replace(' (RS)', '') : entry.sym;
        const isHidden = modalHiddenSymbols.has(baseSym);
        if (isHidden) {
          entry.series.applyOptions({ color: hexToRgba(sectorColor, 0.08), lineWidth: 1, crosshairMarkerVisible: false });
        } else if (hasIsolation && !entry.isBase && !entry.isRsLine) {
          // Isolated stock: use palette color, thick line
          const isolatedColor = modalSymbolColorMap[baseSym] || sectorColor;
          entry.series.applyOptions({ color: isolatedColor, lineWidth: 3, crosshairMarkerVisible: true });
        } else if (hasIsolation && !entry.isBase && entry.isRsLine) {
          // RS line for visible stock: dimmed palette color
          const isolatedColor = modalSymbolColorMap[baseSym] || sectorColor;
          entry.series.applyOptions({ color: hexToRgba(isolatedColor, 0.55), lineWidth: 1, crosshairMarkerVisible: false });
        } else if (hasIsolation && entry.isBase && !entry.isRsLine) {
          // Base ETF during isolation: thin line, dimmed
          entry.series.applyOptions({ color: hexToRgba(sectorColor, 0.45), lineWidth: 1, crosshairMarkerVisible: true });
        } else {
          const restoreColor = entry.isBase ? sectorColor : (entry.isRsLine ? hexToRgba(sectorColor, 0.55) : hexToRgba(sectorColor, 0.35));
          entry.series.applyOptions({ color: restoreColor, lineWidth: entry.isBase ? 2 : 1, crosshairMarkerVisible: !entry.isRsLine });
        }
      });

      // Update legend-hidden class and dot colors
      const modalLegend = document.querySelector('.modal-legend');
      if (modalLegend) {
        modalLegend.querySelectorAll('.chart-legend-item[data-sym]').forEach(el => {
          el.classList.toggle('legend-hidden', modalHiddenSymbols.has(el.dataset.sym));
          const dot = el.querySelector('.chart-legend-dot');
          if (dot) {
            if (hasIsolation && modalSymbolColorMap[el.dataset.sym]) {
              dot.style.background = modalSymbolColorMap[el.dataset.sym];
            } else {
              dot.style.background = '';  // reset to original
            }
          }
        });
      }

      // Hide/color endpoint labels for hidden/visible symbols
      const chartContainer = document.getElementById('modal-chart');
      if (chartContainer) {
        chartContainer.querySelectorAll('.endpoint-label').forEach(label => {
          const text = label.textContent;
          const sym = text.split(' ')[0];
          if (sym && modalHiddenSymbols.has(sym)) {
            label.style.display = 'none';
          } else {
            label.style.display = '';
            if (hasIsolation && modalSymbolColorMap[sym]) {
              label.style.color = modalSymbolColorMap[sym];
            } else {
              label.style.color = '';  // reset to default
            }
          }
        });
      }
    }

    function resetModalVisibility() {
      modalHiddenSymbols.clear();
      modalSelectedSymbols = [];
      modalSymbolColorMap = {};
      applyModalVisibility();
      hideMultiStatsCards();
    }

    function handleModalLegendClick(sym) {
      const seriesList = panelSeriesMap['modal'];
      if (!seriesList) return;

      // Find base symbol — ignore clicks on it
      const baseEntry = seriesList.find(e => e.isBase && !e.isRsLine);
      if (baseEntry && baseEntry.sym === sym) return;

      const nonBaseSyms = seriesList.filter(e => !e.isBase && !e.isRsLine).map(e => e.sym);

      if (modalHiddenSymbols.size === 0) {
        // All visible → solo clicked symbol
        nonBaseSyms.forEach(s => { if (s !== sym) modalHiddenSymbols.add(s); });
      } else if (modalHiddenSymbols.has(sym)) {
        // Click on hidden item → show it
        modalHiddenSymbols.delete(sym);
      } else {
        // Click on visible non-base → hide it
        modalHiddenSymbols.add(sym);
      }

      // If all non-base now hidden → reset
      const allHidden = nonBaseSyms.every(s => modalHiddenSymbols.has(s));
      if (allHidden) {
        modalHiddenSymbols.clear();
        modalSelectedSymbols = [];
        modalSymbolColorMap = {};
      }

      assignIsolatedColors();
      applyModalVisibility();

      if (modalHiddenSymbols.size > 0) {
        showMultiStatsCards();
      } else {
        hideMultiStatsCards();
      }
    }

    // ── Stats card ──
    // endIdx: optional index into data.dates to compute stats up to (for crosshair hover)
    function computeSymbolStats(sym, endIdx) {
      const data = panelDataCache[modalPanelIndex];
      if (!data || !data.prices[sym]) return null;

      const startDate = getRangeStartDate(modalRange, data.dates);
      const startIdx = findStartIndex(data.dates, startDate);
      const prices = data.prices[sym];
      const rangeEnd = endIdx != null ? Math.min(endIdx, prices.length - 1) : prices.length - 1;

      // Find first and last valid prices in range
      let first = null, last = null, firstIdx = startIdx, lastIdx = startIdx;
      for (let i = startIdx; i <= rangeEnd; i++) {
        if (prices[i] != null) { first = prices[i]; firstIdx = i; break; }
      }
      for (let i = rangeEnd; i >= startIdx; i--) {
        if (prices[i] != null) { last = prices[i]; lastIdx = i; break; }
      }
      if (first == null || last == null || first === 0) return null;

      // Period Return
      const periodReturn = ((last - first) / first) * 100;

      // Max Drawdown
      let peak = first, maxDrawdown = 0;
      for (let i = firstIdx; i <= lastIdx; i++) {
        if (prices[i] == null) continue;
        if (prices[i] > peak) peak = prices[i];
        const dd = ((prices[i] - peak) / peak) * 100;
        if (dd < maxDrawdown) maxDrawdown = dd;
      }

      // Daily returns for volatility
      const dailyReturns = [];
      for (let i = firstIdx + 1; i <= lastIdx; i++) {
        if (prices[i] != null && prices[i - 1] != null && prices[i - 1] !== 0) {
          dailyReturns.push((prices[i] - prices[i - 1]) / prices[i - 1]);
        }
      }

      let annVol = null;
      if (dailyReturns.length > 1) {
        const mean = dailyReturns.reduce((a, b) => a + b, 0) / dailyReturns.length;
        const variance = dailyReturns.reduce((sum, r) => sum + (r - mean) ** 2, 0) / (dailyReturns.length - 1);
        annVol = Math.sqrt(variance) * Math.sqrt(252) * 100;
      }

      // 50-day SMA (computed up to rangeEnd)
      let sma50 = null;
      const validPrices50 = [];
      for (let i = rangeEnd; i >= 0 && validPrices50.length < 50; i--) {
        if (prices[i] != null) validPrices50.push(prices[i]);
      }
      if (validPrices50.length === 50) {
        sma50 = validPrices50.reduce((a, b) => a + b, 0) / 50;
      }
      const pctFrom50MA = sma50 && last ? ((last - sma50) / sma50) * 100 : null;

      // EMA helper (computed up to rangeEnd)
      function computeEMA(period) {
        const validPrices = [];
        for (let i = 0; i <= rangeEnd; i++) {
          if (prices[i] != null) validPrices.push(prices[i]);
        }
        if (validPrices.length < period) return null;
        const k = 2 / (period + 1);
        let ema = validPrices.slice(0, period).reduce((a, b) => a + b, 0) / period;
        for (let i = period; i < validPrices.length; i++) {
          ema = validPrices[i] * k + ema * (1 - k);
        }
        return ema;
      }

      const ema8 = computeEMA(8);
      const ema21 = computeEMA(21);
      const pctFromEma8 = ema8 && last ? ((last - ema8) / ema8) * 100 : null;
      const pctFromEma21 = ema21 && last ? ((last - ema21) / ema21) * 100 : null;

      // RS Rating (up to rangeEnd)
      const rsRating = rsRatingCache && rsRatingCache[sym] ? (() => {
        for (let i = rangeEnd; i >= startIdx; i--) {
          if (rsRatingCache[sym][i] != null) return rsRatingCache[sym][i];
        }
        return null;
      })() : null;

      // Divergence
      const divergence = divergenceCache[sym] || null;

      // Helper to compute period return for another symbol's prices
      function getReturn(priceArr) {
        if (!priceArr) return null;
        let f = null, l = null;
        const end = endIdx != null ? Math.min(endIdx, priceArr.length - 1) : priceArr.length - 1;
        for (let i = startIdx; i <= end; i++) { if (priceArr[i] != null) { f = priceArr[i]; break; } }
        for (let i = end; i >= startIdx; i--) { if (priceArr[i] != null) { l = priceArr[i]; break; } }
        return (f && l && f !== 0) ? ((l - f) / f) * 100 : null;
      }

      // vs Sector ETF (always use the panel's original base symbol, not the mode-dependent one)
      let vsSector = null;
      if (data.baseSymbol && data.prices[data.baseSymbol]) {
        const sectorReturn = getReturn(data.prices[data.baseSymbol]);
        if (sectorReturn != null) vsSector = periodReturn - sectorReturn;
      }

      // vs EW Sector ETF
      let vsEWSector = null;
      const ewSym = CAP_TO_EQUAL[data.baseSymbol];
      if (ewSym && ewSym !== data.baseSymbol && data.prices[ewSym]) {
        const ewReturn = getReturn(data.prices[ewSym]);
        if (ewReturn != null) vsEWSector = periodReturn - ewReturn;
      }

      // vs SPY
      let vsSPY = null;
      const spyData = panelDataCache[0];
      if (spyData && spyData.prices && spyData.prices['SPY']) {
        const spyReturn = getReturn(spyData.prices['SPY']);
        if (spyReturn != null) vsSPY = periodReturn - spyReturn;
      }

      return { periodReturn, maxDrawdown, annVol, pctFrom50MA, pctFromEma8, pctFromEma21, rsRating, divergence, vsSector, vsEWSector, vsSPY };
    }

    function assignIsolatedColors() {
      modalSymbolColorMap = {};
      if (modalHiddenSymbols.size === 0) return;
      const seriesList = panelSeriesMap['modal'];
      if (!seriesList) return;
      const visibleNonBase = seriesList
        .filter(e => !e.isBase && !e.isRsLine && !modalHiddenSymbols.has(e.sym))
        .map(e => e.sym);
      visibleNonBase.forEach((sym, i) => {
        modalSymbolColorMap[sym] = ISOLATED_PALETTE[i % ISOLATED_PALETTE.length];
      });
      modalSelectedSymbols = visibleNonBase;
    }

    function showMultiStatsCards() {
      hideMultiStatsCards();
      const chartContainer = document.getElementById('modal-chart');
      if (!chartContainer || modalSelectedSymbols.length === 0) return;

      const container = document.createElement('div');
      container.className = 'modal-stats-cards visible';

      // Clear link
      const clearLink = document.createElement('div');
      clearLink.className = 'modal-stats-clear';
      clearLink.textContent = 'Clear';
      clearLink.addEventListener('click', () => resetModalVisibility());
      container.appendChild(clearLink);

      const fmt = (v, decimals = 1) => {
        if (v == null) return '\u2014';
        const sign = v >= 0 ? '+' : '';
        return sign + v.toFixed(decimals) + '%';
      };
      const cls = (v) => v == null ? '' : (v >= 0 ? ' positive' : ' negative');

      // Sort by period return descending (strongest first)
      const symsWithReturns = modalSelectedSymbols.slice(0, 6).map(sym => {
        const stats = computeSymbolStats(sym);
        return { sym, stats, ret: stats ? stats.periodReturn : -Infinity };
      }).sort((a, b) => b.ret - a.ret);

      symsWithReturns.forEach(({ sym, stats }) => {
        if (!stats) return;
        const dotColor = modalSymbolColorMap[sym] || '#888';

        let rows = '';
        // Group 1 — Performance
        rows += `<div class="modal-stats-row"><span class="modal-stats-label">Return</span><span class="modal-stats-value${cls(stats.periodReturn)}">${fmt(stats.periodReturn)}</span></div>`;
        rows += `<div class="modal-stats-row"><span class="modal-stats-label">Max DD</span><span class="modal-stats-value${cls(stats.maxDrawdown)}">${fmt(stats.maxDrawdown)}</span></div>`;
        rows += `<div class="modal-stats-row"><span class="modal-stats-label">Volatility</span><span class="modal-stats-value">${stats.annVol != null ? stats.annVol.toFixed(1) + '%' : '\u2014'}</span></div>`;

        // Group 2 — Relative
        rows += `<div class="modal-stats-divider"></div>`;
        rows += `<div class="modal-stats-row"><span class="modal-stats-label">vs Sector</span><span class="modal-stats-value${cls(stats.vsSector)}">${fmt(stats.vsSector)}</span></div>`;
        rows += `<div class="modal-stats-row"><span class="modal-stats-label">vs EW Sect</span><span class="modal-stats-value${cls(stats.vsEWSector)}">${fmt(stats.vsEWSector)}</span></div>`;
        rows += `<div class="modal-stats-row"><span class="modal-stats-label">vs SPY</span><span class="modal-stats-value${cls(stats.vsSPY)}">${fmt(stats.vsSPY)}</span></div>`;

        // Group 3 — Moving Averages
        rows += `<div class="modal-stats-divider"></div>`;
        rows += `<div class="modal-stats-row"><span class="modal-stats-label">% from 50MA</span><span class="modal-stats-value${cls(stats.pctFrom50MA)}">${fmt(stats.pctFrom50MA)}</span></div>`;
        rows += `<div class="modal-stats-row"><span class="modal-stats-label">% from EMA8</span><span class="modal-stats-value${cls(stats.pctFromEma8)}">${fmt(stats.pctFromEma8)}</span></div>`;
        rows += `<div class="modal-stats-row"><span class="modal-stats-label">% from EMA21</span><span class="modal-stats-value${cls(stats.pctFromEma21)}">${fmt(stats.pctFromEma21)}</span></div>`;

        // Group 4 — Momentum
        if (stats.rsRating != null || stats.divergence) {
          rows += `<div class="modal-stats-divider"></div>`;
          if (stats.rsRating != null) {
            const rsCls = stats.rsRating >= 50 ? ' positive' : ' negative';
            rows += `<div class="modal-stats-row"><span class="modal-stats-label">RS Rating</span><span class="modal-stats-value${rsCls}">${stats.rsRating.toFixed(0)}</span></div>`;
          }
          if (stats.divergence) {
            const divText = stats.divergence === 'bullish' ? '\u25B2 Bullish' : '\u25BC Bearish';
            const divCls = stats.divergence === 'bullish' ? ' positive' : ' negative';
            rows += `<div class="modal-stats-row"><span class="modal-stats-label">Divergence</span><span class="modal-stats-value${divCls}">${divText}</span></div>`;
          }
        }

        const card = document.createElement('div');
        card.className = 'modal-stats-card';
        card.innerHTML = `<div class="modal-stats-header"><div class="modal-stats-header-left"><span class="chart-legend-dot" style="background:${dotColor};width:8px;height:8px;border-radius:50%;flex-shrink:0;"></span><span class="modal-stats-sym">${sym}</span></div><span class="modal-stats-close" data-close-sym="${sym}">&times;</span></div>${rows}`;
        container.appendChild(card);
      });

      chartContainer.appendChild(container);

      // Close button handlers
      container.querySelectorAll('.modal-stats-close[data-close-sym]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const closeSym = btn.dataset.closeSym;
          modalHiddenSymbols.add(closeSym);
          // If all non-base now hidden, reset
          const seriesList = panelSeriesMap['modal'];
          if (seriesList) {
            const nonBaseSyms = seriesList.filter(e => !e.isBase && !e.isRsLine).map(e => e.sym);
            if (nonBaseSyms.every(s => modalHiddenSymbols.has(s))) {
              resetModalVisibility();
              return;
            }
          }
          assignIsolatedColors();
          applyModalVisibility();
          if (modalHiddenSymbols.size > 0) showMultiStatsCards(); else hideMultiStatsCards();
        });
      });
    }

    function hideMultiStatsCards() {
      const container = document.querySelector('.modal-stats-cards');
      if (container) container.remove();
    }

    function updateModalStatsForCrosshair() {
      const container = document.querySelector('.modal-stats-cards');
      if (!container || modalSelectedSymbols.length === 0) return;

      const fmt = (v, decimals = 1) => {
        if (v == null) return '\u2014';
        const sign = v >= 0 ? '+' : '';
        return sign + v.toFixed(decimals) + '%';
      };
      const cls = (v) => v == null ? '' : (v >= 0 ? ' positive' : ' negative');

      const cards = container.querySelectorAll('.modal-stats-card');
      cards.forEach(card => {
        const symEl = card.querySelector('.modal-stats-sym');
        if (!symEl) return;
        const sym = symEl.textContent;
        const stats = computeSymbolStats(sym, modalCrosshairDateIdx);
        if (!stats) return;

        const rows = card.querySelectorAll('.modal-stats-row');
        const vals = [
          // Group 1 — Performance
          fmt(stats.periodReturn), fmt(stats.maxDrawdown),
          stats.annVol != null ? stats.annVol.toFixed(1) + '%' : '\u2014',
          // Group 2 — Relative
          fmt(stats.vsSector), fmt(stats.vsEWSector), fmt(stats.vsSPY),
          // Group 3 — Moving Averages
          fmt(stats.pctFrom50MA), fmt(stats.pctFromEma8), fmt(stats.pctFromEma21),
        ];
        const classes = [
          cls(stats.periodReturn), cls(stats.maxDrawdown), '',
          cls(stats.vsSector), cls(stats.vsEWSector), cls(stats.vsSPY),
          cls(stats.pctFrom50MA), cls(stats.pctFromEma8), cls(stats.pctFromEma21),
        ];
        // Update first 9 value rows
        for (let i = 0; i < Math.min(rows.length, 9); i++) {
          const valEl = rows[i].querySelector('.modal-stats-value');
          if (valEl) {
            valEl.textContent = vals[i];
            valEl.className = 'modal-stats-value' + classes[i];
          }
        }
        // Group 4 — Momentum (rows after index 8)
        if (rows.length > 9) {
          const rsEl = rows[9].querySelector('.modal-stats-value');
          if (rsEl && stats.rsRating != null) {
            rsEl.textContent = stats.rsRating.toFixed(0);
            rsEl.className = 'modal-stats-value' + (stats.rsRating >= 50 ? ' positive' : ' negative');
          }
        }
      });
    }

    // ── View toggle ──
    let currentView = 'spaghetti';

    function setView(view, btn) {

      localStorage.setItem('currentView', view);
      document.querySelectorAll('.topbar-controls .btn[data-view]').forEach(b => b.classList.remove('active'));
