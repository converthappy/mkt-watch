        regimeSignals.forEach(s => { if (s.value != null) { totalR++; if (s.value) trendingCount++; } });

        if (totalR > 0) {
          const rPct = trendingCount / totalR;
          if (rPct >= 0.6) regime = { score: rPct, cls: 'regime-trending', label: 'Trending', signals: regimeSignals };
          else if (rPct <= 0.3) regime = { score: rPct, cls: 'regime-choppy', label: 'Choppy', signals: regimeSignals };
          else regime = { score: rPct, cls: 'regime-unclear', label: 'Unclear', signals: regimeSignals };
        } else {
          regime.signals = regimeSignals;
        }
      }

      // Weighted composite (regime excluded — it's informational, not directional)
      const cats = [trend, breadth, momentum];
      let weightedBull = 0, weightedTotal = 0;
      cats.forEach(c => {
        if (c.score != null) {
          weightedBull += c.score * c.weight;
          weightedTotal += c.weight;
        }
      });
      let overall;
      if (weightedTotal === 0) {
        overall = { label: '--', cls: 'risk-neutral' };
      } else {
        const pct = weightedBull / weightedTotal;
        if (pct >= 0.6) overall = { label: 'RISK ON', cls: 'risk-on' };
        else if (pct <= 0.35) overall = { label: 'RISK OFF', cls: 'risk-off' };
        else overall = { label: 'MIXED', cls: 'risk-mixed' };
      }

      return { overall, trend, breadth, momentum, regime };
    }

    // Standard RRG method:
    // 1. RS Line = sector price / benchmark price (a ratio at each point in time)
    // 2. RS-Ratio = RS Line / SMA(RS Line) * 100 — where the sector IS right now vs its own average
    // 3. RS-Momentum = RS-Ratio / prior RS-Ratio * 100 — whether RS-Ratio is rising or falling
    //
    // This means the current dot position is always the same regardless of settings.
    // Period (daily/weekly) = granularity. Smooth = noise reduction. Tail = trail length.
    function computeRRGData() {
      const benchmark = document.getElementById('rrg-benchmark').value;
      const tailLen = parseInt(document.getElementById('rrg-tail').value);
      const smoothLen = parseInt(document.getElementById('rrg-window').value);
      const period = document.getElementById('rrg-period').value;
      const etfType = document.getElementById('rrg-etf-type').value;

      const benchData = panelDataCache[0];
      if (!benchData || !benchData.prices[benchmark]) return [];

      const benchPrices = benchData.prices[benchmark];
      const dates = benchData.dates;

      // Sample: daily = every day, weekly = every 5 trading days
      const sampleIndices = [];
      const step = period === 'daily' ? 1 : 5;
      for (let i = 0; i < dates.length; i += step) {
        sampleIndices.push(i);
      }
      if (sampleIndices[sampleIndices.length - 1] !== dates.length - 1) {
        sampleIndices.push(dates.length - 1);
      }

      const results = [];

      // Build sector list, applying ETF type swap — deduplicate by symbol
      const sectors = [];
      const seenSyms = new Set();
      for (let pi = 1; pi < PANEL_COUNT; pi++) {
        const data = panelDataCache[pi];
        if (!data) continue;
        let sym = data.baseSymbol;
        if (etfType === 'equal' && CAP_TO_EQUAL[sym]) {
          sym = CAP_TO_EQUAL[sym];
        }
        if (seenSyms.has(sym)) continue;
        seenSyms.add(sym);
        sectors.push({ panelIndex: pi, sym, baseSym: data.baseSymbol, title: data.title });
      }

      // SMA window for normalizing RS Line — fixed internally
      // Daily: 50-day SMA (~10 weeks), Weekly: 10-week SMA (~2.5 months)
      const smaWindow = period === 'daily' ? 50 : 10;

      sectors.forEach(sector => {
        let sectorPrices = null;
        for (let pi = 0; pi < PANEL_COUNT; pi++) {
          const data = panelDataCache[pi];
          if (data && data.prices[sector.sym]) {
            sectorPrices = data.prices[sector.sym];
            break;
          }
        }
        if (!sectorPrices) return;

        // Step 1: RS Line = sector / benchmark at each sample point
        const rsLine = sampleIndices.map(idx => {
          const sp = sectorPrices[idx];
          const bp = benchPrices[idx];
          if (sp == null || bp == null || bp === 0) return null;
          return sp / bp;
        });

        // Step 2: RS-Ratio = (RS Line / SMA(RS Line, smaWindow)) * 100
        const rawRsRatio = [];
        for (let i = 0; i < rsLine.length; i++) {
          if (i < smaWindow - 1 || rsLine[i] == null) { rawRsRatio.push(null); continue; }
          let sum = 0, count = 0;
          for (let j = i - smaWindow + 1; j <= i; j++) {
            if (rsLine[j] != null) { sum += rsLine[j]; count++; }
          }
          if (count === 0) { rawRsRatio.push(null); continue; }
          rawRsRatio.push((rsLine[i] / (sum / count)) * 100);
        }

        // Smooth RS-Ratio
        const rsRatio = emaSmooth(rawRsRatio, smoothLen);

        // Step 3: RS-Momentum = (RS-Ratio / SMA(RS-Ratio, momWindow)) * 100
        // Same technique as RS-Ratio itself — normalize against its own moving average
        // This measures whether RS-Ratio is above or below its recent trend
        const momWindow = period === 'daily' ? 10 : 5;
        const rawMomentum = [];
        for (let i = 0; i < rsRatio.length; i++) {
          if (i < momWindow - 1 || rsRatio[i] == null) { rawMomentum.push(null); continue; }
          let sum = 0, count = 0;
          for (let j = i - momWindow + 1; j <= i; j++) {
            if (rsRatio[j] != null) { sum += rsRatio[j]; count++; }
          }
          if (count === 0) { rawMomentum.push(null); continue; }
          rawMomentum.push((rsRatio[i] / (sum / count)) * 100);
        }

        // Smooth momentum
        const rsMomentum = emaSmooth(rawMomentum, smoothLen);

        // Extract trail
        const trail = [];
        let added = 0;
        for (let i = rsRatio.length - 1; i >= 0 && added < tailLen; i--) {
          if (rsRatio[i] != null && rsMomentum[i] != null) {
            trail.unshift({ x: rsRatio[i], y: rsMomentum[i] });
            added++;
          }
        }

        if (trail.length > 0) {
          results.push({
            sym: sector.sym,
            title: sector.title,
            panelIndex: sector.panelIndex,
            color: SECTOR_COLORS[sector.panelIndex % SECTOR_COLORS.length],
            trail,
          });
        }
      });

      return results;
    }

    let rrg_hoveredSector = null;

    function drawRRG() {
      const canvas = document.getElementById('rrg-canvas');
      if (!canvas) return;
      const tc = currentThemeColors;
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;

      // Size canvas to container
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.scale(dpr, dpr);

      const W = rect.width;
      const H = rect.height;

      // Compute RRG data
      const sectors = computeRRGData();
      if (sectors.length === 0) {
        ctx.fillStyle = tc.textQuaternary;
        ctx.font = '14px ' + getComputedStyle(document.body).fontFamily;
        ctx.textAlign = 'center';
        ctx.fillText('Loading data...', W / 2, H / 2);
        return;
      }

      // Find data bounds
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      sectors.forEach(s => {
        s.trail.forEach(p => {
          minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
          minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
        });
      });

      // Pad and center around 100
      const rangeX = Math.max(maxX - 100, 100 - minX, 1) * 1.3;
      const rangeY = Math.max(maxY - 100, 100 - minY, 1) * 1.3;
      const range = Math.max(rangeX, rangeY); // make it square
      minX = 100 - range; maxX = 100 + range;
      minY = 100 - range; maxY = 100 + range;

      // Margins
      const margin = { top: 50, right: 30, bottom: 30, left: 50 };
      const plotW = W - margin.left - margin.right;
      const plotH = H - margin.top - margin.bottom;

      function toScreenX(v) { return margin.left + ((v - minX) / (maxX - minX)) * plotW; }
      function toScreenY(v) { return margin.top + ((maxY - v) / (maxY - minY)) * plotH; }

      // Clear
      ctx.fillStyle = tc.bgPrimary;
      ctx.fillRect(0, 0, W, H);

      // Draw quadrant backgrounds
      const cx = toScreenX(100), cy = toScreenY(100);

      ctx.fillStyle = tc.quadrantLeading;
      ctx.fillRect(cx, margin.top, margin.left + plotW - cx, cy - margin.top);
      ctx.fillStyle = tc.quadrantImproving;
      ctx.fillRect(margin.left, margin.top, cx - margin.left, cy - margin.top);
      ctx.fillStyle = tc.quadrantLagging;
      ctx.fillRect(margin.left, cy, cx - margin.left, margin.top + plotH - cy);
      ctx.fillStyle = tc.quadrantWeakening;
      ctx.fillRect(cx, cy, margin.left + plotW - cx, margin.top + plotH - cy);

      // Grid lines
      ctx.strokeStyle = tc.chartGridStrong;
      ctx.lineWidth = 0.5;
      const gridStep = range > 3 ? 1 : 0.5;
      for (let v = Math.ceil(minX); v <= maxX; v += gridStep) {
        const x = toScreenX(v);
        ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, margin.top + plotH); ctx.stroke();
      }
      for (let v = Math.ceil(minY); v <= maxY; v += gridStep) {
        const y = toScreenY(v);
        ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(margin.left + plotW, y); ctx.stroke();
      }

      // Center crosshair (100, 100)
      ctx.strokeStyle = tc.chartCrosshairCenter;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(cx, margin.top); ctx.lineTo(cx, margin.top + plotH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(margin.left, cy); ctx.lineTo(margin.left + plotW, cy); ctx.stroke();
      ctx.setLineDash([]);

      // Period label in top center
      const period = document.getElementById('rrg-period').value;
      const etfType = document.getElementById('rrg-etf-type').value;
      const periodLabel = period === 'daily' ? 'Daily' : 'Weekly';
      const etfLabel = etfType === 'equal' ? 'Equal-Weight ETFs' : 'Cap-Weight ETFs';
      ctx.fillStyle = tc.textQuaternary;
      ctx.font = 'bold 13px ' + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = 'center';
      ctx.fillText(`${periodLabel}  \u00b7  ${etfLabel}`, W / 2, margin.top - 12);

      // Axis labels
      ctx.fillStyle = tc.chartAxisText;
      ctx.font = 'bold 11px ' + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = 'center';
      ctx.fillText('RS-Ratio \u2192', W / 2, H - 8);
      ctx.save();
      ctx.translate(14, H / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText('RS-Momentum \u2192', 0, 0);
      ctx.restore();

      // Axis tick labels
      ctx.font = '9px ' + getComputedStyle(document.body).fontFamily;
      ctx.fillStyle = tc.chartAxisText;
      ctx.textAlign = 'center';
      for (let v = Math.ceil(minX); v <= maxX; v += gridStep) {
        if (Math.abs(v - 100) < 0.01) continue; // skip center
        ctx.fillText(v.toFixed(v % 1 === 0 ? 0 : 1), toScreenX(v), margin.top + plotH + 14);
      }
      ctx.textAlign = 'right';
      for (let v = Math.ceil(minY); v <= maxY; v += gridStep) {
        if (Math.abs(v - 100) < 0.01) continue;
        ctx.fillText(v.toFixed(v % 1 === 0 ? 0 : 1), margin.left - 6, toScreenY(v) + 3);
      }

      // "100" labels at center
      ctx.fillStyle = tc.textSecondary;
      ctx.font = 'bold 11px ' + getComputedStyle(document.body).fontFamily;
      ctx.textAlign = 'center';
      ctx.fillText('100', cx, margin.top + plotH + 14);
      ctx.textAlign = 'right';
      ctx.fillText('100', margin.left - 6, cy + 3);

      // Store sector positions for hover detection
      const sectorPositions = [];

      // Draw trails and dots
      sectors.forEach(s => {
        const isHovered = rrg_hoveredSector === s.sym;
        const alpha = rrg_hoveredSector && !isHovered ? 0.08 : 1;

        // Draw trail
        if (s.trail.length > 1) {
          for (let i = 1; i < s.trail.length; i++) {
            const t = i / s.trail.length; // older=thin/faint, newer=thick/bright
            ctx.strokeStyle = hexToRgba(s.color, (0.6 + t * 0.4) * alpha);
            ctx.lineWidth = 2 + t * 2.5;
            ctx.beginPath();
            ctx.moveTo(toScreenX(s.trail[i - 1].x), toScreenY(s.trail[i - 1].y));
            ctx.lineTo(toScreenX(s.trail[i].x), toScreenY(s.trail[i].y));
            ctx.stroke();
          }

          // Small dots along trail
          for (let i = 0; i < s.trail.length - 1; i++) {
            const t = i / s.trail.length;
            ctx.fillStyle = hexToRgba(s.color, (0.7 + t * 0.3) * alpha);
            ctx.beginPath();
            ctx.arc(toScreenX(s.trail[i].x), toScreenY(s.trail[i].y), 3.5, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Current position (last point) - big dot
        const last = s.trail[s.trail.length - 1];
        const sx = toScreenX(last.x);
        const sy = toScreenY(last.y);

        ctx.fillStyle = hexToRgba(s.color, alpha);
        ctx.beginPath();
        ctx.arc(sx, sy, isHovered ? 9 : 6, 0, Math.PI * 2);
        ctx.fill();

        // White border on dot
        ctx.strokeStyle = hexToRgba(tc.textWhite, 0.7 * alpha);
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Label with background for readability
        const labelText = s.sym;
        const fontFamily = getComputedStyle(document.body).fontFamily;
        ctx.font = isHovered ? 'bold 13px ' + fontFamily : 'bold 11px ' + fontFamily;
        ctx.textAlign = 'left';
        const labelW = ctx.measureText(labelText).width;
        ctx.fillStyle = tc.canvasLabelBg;
        ctx.fillRect(sx + 8, sy - 7, labelW + 6, 16);
        ctx.fillStyle = hexToRgba(tc.textWhite, alpha);
        ctx.fillText(labelText, sx + 11, sy + 5);

        sectorPositions.push({ sym: s.sym, title: s.title, x: sx, y: sy, color: s.color, last });
      });

      // Store for mouse events
      canvas._sectorPositions = sectorPositions;

      // Build legend (skip if just redrawing chart for hover)
      if (!drawRRG._skipLegend) buildRRGSidebar(sectors);
      drawRRG._skipLegend = false;
    }

    function getQuadrant(x, y) {
      if (x >= 100 && y >= 100) return 'leading';
      if (x < 100 && y >= 100) return 'improving';
      if (x >= 100 && y < 100) return 'weakening';
      return 'lagging';
    }

    function rrgHeading(trail) {
      if (trail.length < 2) return { arrow: '', signal: 'neutral' };
      const prev = trail[trail.length - 2];
      const curr = trail[trail.length - 1];
      const dx = curr.x - prev.x;
      const dy = curr.y - prev.y;
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      let arrow;
      if (angle > -22.5 && angle <= 22.5) arrow = '\u2192';
      else if (angle > 22.5 && angle <= 67.5) arrow = '\u2197';
      else if (angle > 67.5 && angle <= 112.5) arrow = '\u2191';
      else if (angle > 112.5 && angle <= 157.5) arrow = '\u2196';
      else if (angle > -67.5 && angle <= -22.5) arrow = '\u2198';
      else if (angle > -112.5 && angle <= -67.5) arrow = '\u2193';
      else if (angle > -157.5 && angle <= -112.5) arrow = '\u2199';
      else arrow = '\u2190';
      // Signal: bullish if heading toward Leading (right+up), bearish if toward Lagging (left+down)
      const signal = (dx > 0 && dy > 0) ? 'bullish' : (dx < 0 && dy < 0) ? 'bearish' : 'neutral';
      return { arrow, signal };
    }

    const QUADRANT_ORDER = ['leading', 'improving', 'weakening', 'lagging'];
    const QUADRANT_META = {
      leading:    { label: 'Leading',    short: 'Lead', colorVar: 'semanticBullish' },
      improving:  { label: 'Improving',  short: 'Impr', colorVar: 'semanticNeutral' },
      weakening:  { label: 'Weakening',  short: 'Weak', colorVar: 'semanticWeakening' },
      lagging:    { label: 'Lagging',    short: 'Lag',  colorVar: 'semanticBearish' },
    };

    function rrgTipsHTML(tc) {
      return `<details class="rrg-tips"><summary>How to read</summary>
        <div class="tip-row"><span style="color:${tc.semanticBullish}">\u2197</span> Green arrow = heading toward Leading (bullish)</div>
        <div class="tip-row"><span style="color:${tc.semanticBearish}">\u2199</span> Red arrow = heading toward Lagging (bearish)</div>
        <div class="tip-row"><span style="color:${tc.semanticNeutral}">\u2192</span> Grey arrow = mixed / sideways</div>
        <div class="tip-row" style="margin-top:2px"><b>Improving</b> + green arrow = early entry</div>
        <div class="tip-row"><b>Leading</b> + green arrow = hold / add</div>
        <div class="tip-row"><b>Weakening</b> + red arrow = exit warning</div>
        <div class="tip-row"><b>NEW</b> = just crossed quadrants. <b>from</b> = where it came from</div>
        <div class="tip-row">Bar = distance from center (conviction strength)</div>
      </details>`;
    }

    function buildRRGSidebar(sectors) {
      const sidebarEl = document.getElementById('rrg-sidebar');
      if (!sidebarEl) return;

      const tc = currentThemeColors;

      // Classify each sector into quadrant groups
      const groups = { leading: [], improving: [], weakening: [], lagging: [] };
      let maxDist = 0;

      sectors.forEach(s => {
        const curr = s.trail[s.trail.length - 1];
        const prev = s.trail.length >= 2 ? s.trail[s.trail.length - 2] : curr;
        const currQ = getQuadrant(curr.x, curr.y);
        const prevQ = getQuadrant(prev.x, prev.y);
        const isCrossing = currQ !== prevQ;
        const dist = Math.sqrt((curr.x - 100) ** 2 + (curr.y - 100) ** 2);
        if (dist > maxDist) maxDist = dist;
        const { arrow, signal } = rrgHeading(s.trail);
        const shortName = SECTOR_SHORT_NAMES[s.sym] || s.title.replace(/^\d+\.\s*/, '');

        groups[currQ].push({ ...s, dist, isCrossing, prevQ, arrow, signal, shortName, currQ });
      });

      // Sort within each group: crossings first, then by distance desc
      for (const q of QUADRANT_ORDER) {
        groups[q].sort((a, b) => {
          if (a.isCrossing !== b.isCrossing) return a.isCrossing ? -1 : 1;
          return b.dist - a.dist;
        });
      }

      let html = rrgTipsHTML(tc);
      for (const q of QUADRANT_ORDER) {
        const items = groups[q];
        if (items.length === 0) continue;
        const meta = QUADRANT_META[q];
        const qColor = tc[meta.colorVar];

        html += `<div class="rrg-group-header" style="color:${qColor}"><span>\u25CF ${meta.label}</span><span class="count">${items.length}</span></div>`;

        items.forEach(s => {
          const distPct = maxDist > 0 ? Math.min(100, Math.round(s.dist / maxDist * 100)) : 0;

          const arrowColor = s.signal === 'bullish' ? tc.semanticBullish : s.signal === 'bearish' ? tc.semanticBearish : tc.textQuaternary;
          const isBullishCross = s.isCrossing && (q === 'leading' || q === 'improving');
          const itemCls = 'rrg-legend-item' + (isBullishCross ? ' rrg-actionable' : '');

          html += `<div class="${itemCls}" data-sym="${s.sym}" data-panel="${s.panelIndex}">
            <span class="rrg-legend-dot" style="background:${s.color}"></span>
            <span class="rrg-legend-sym">${s.sym}</span>
            <span class="rrg-legend-name">${s.shortName}</span>
            <span class="rrg-heading" style="color:${arrowColor}">${s.arrow}</span>
            ${s.isCrossing ? `<span class="rrg-crossing" style="color:${qColor};background:${qColor}22">NEW</span><span class="rrg-from" style="color:${tc[QUADRANT_META[s.prevQ].colorVar]}">from ${QUADRANT_META[s.prevQ].short}</span>` : ''}
            <span class="rrg-distance-bar"><span class="fill" style="width:${distPct}%;background:${qColor}"></span></span>
          </div>`;
        });
      }

      sidebarEl.innerHTML = html;
    }

    // ── RRG Sector Drilldown ──
    let rrg_drilldownOpen = null;

    function openRRGDrilldown(sym, panelIndex) {
      // If clicking the same one, close it
      if (rrg_drilldownOpen === sym) { closeRRGDrilldown(); return; }
      rrg_drilldownOpen = sym;

      const data = panelDataCache[panelIndex];
      if (!data) return;

      const popup = document.getElementById('rrg-drilldown');
      const titleEl = document.getElementById('rrg-drilldown-title');
      const bodyEl = document.getElementById('rrg-drilldown-body');

      const shortName = SECTOR_SHORT_NAMES[sym] || data.title.replace(/^\d+\.\s*/, '');
      const stockCount = data.symbols.filter(s => !ETF_TICKERS.has(s)).length;
      titleEl.textContent = `${shortName} — ${stockCount} stocks`;

      // Store for re-sorting
      rrg_drilldownPanelIndex = panelIndex;
      rrg_drilldownSym = sym;

      renderDrilldownTable();
      popup.classList.add('visible');
    }

    let rrg_drilldownSortCol = 2; // default sort by 1M
    let rrg_drilldownSortAsc = false;
    let rrg_drilldownPanelIndex = null;
    let rrg_drilldownSym = null;

    function renderDrilldownTable() {
      const data = panelDataCache[rrg_drilldownPanelIndex];
      if (!data) return;

      const bodyEl = document.getElementById('rrg-drilldown-body');
      const benchmark = document.getElementById('rrg-benchmark').value;
      const benchData = panelDataCache[0];
      const benchPrices = benchData ? benchData.prices[benchmark] : null;
      const dates = data.dates;

      // Compute benchmark pcts
      const benchPcts = {};
      ['5D', '1M', '3M'].forEach(rk => {
        benchPcts[rk] = benchPrices ? computePctChange(benchPrices, dates, rk) : null;
      });

      const stocks = [];
      data.symbols.forEach(s => {
        if (ETF_TICKERS.has(s)) return;
        const prices = data.prices[s];
        if (!prices) return;

        const pct1W = computePctChange(prices, dates, '5D');
        const pct1M = computePctChange(prices, dates, '1M');
        const pct3M = computePctChange(prices, dates, '3M');

        const vs1M = (pct1M != null && benchPcts['1M'] != null) ? pct1M - benchPcts['1M'] : null;

        // Rolling cumulative excess return — 40 bars
        // Daily mode: 40 daily bars. Weekly mode: 40 weekly bars (step every 5 days)
        const rsBars = [];
        const period = document.getElementById('rrg-period').value;
        const step = period === 'daily' ? 1 : 5;
        const barsWanted = 30;
        const rsN = barsWanted * step; // how many raw data points we need
        if (benchPrices && dates.length > rsN) {
          const startI = dates.length - rsN;
          const sp0 = prices[startI], bp0 = benchPrices[startI];
          if (sp0 && bp0 && sp0 !== 0 && bp0 !== 0) {
            for (let i = startI; i < dates.length; i += step) {
              const sp = prices[i], bp = benchPrices[i];
              if (sp == null || bp == null) { rsBars.push(0); continue; }
              const stockRet = (sp - sp0) / sp0 * 100;
              const benchRet = (bp - bp0) / bp0 * 100;
              rsBars.push(stockRet - benchRet);
            }
          }
        }

        stocks.push({ sym: s, pct1W, pct1M, pct3M, vs1M, rsBars });
      });

      // RS rank for sorting: based on 1M vs benchmark
      stocks.forEach(s => { s.rsRank = s.vs1M ?? 0; });

      // Per-stock: shift bars so min=0, then scale by per-stock max for clear shape
      // This shows the *shape* of each stock's RS trajectory (rising vs falling)
      stocks.forEach(s => {
        if (s.rsBars.length === 0) return;
        const mn = Math.min(...s.rsBars);
        const shifted = s.rsBars.map(v => v - mn);
        const mx = Math.max(...shifted);
        s.rsBarsNorm = mx > 0 ? shifted.map(v => v / mx) : shifted.map(() => 0.5);
      });

      // Sort
      const cols = ['sym', 'pct1W', 'pct1M', 'pct3M', 'vs1M', 'rsRank'];
      const sortKey = cols[rrg_drilldownSortCol] || 'pct1M';
      stocks.sort((a, b) => {
        if (sortKey === 'sym') {
          return rrg_drilldownSortAsc ? a.sym.localeCompare(b.sym) : b.sym.localeCompare(a.sym);
        }
        const av = a[sortKey] ?? -Infinity;
        const bv = b[sortKey] ?? -Infinity;
        return rrg_drilldownSortAsc ? av - bv : bv - av;
      });

      const period = document.getElementById('rrg-period').value;
      const rsLabel = period === 'daily' ? 'RS 30D' : 'RS 30W';
      const colHeaders = ['Symbol', '1W', '1M', '3M', 'vs ' + benchmark + ' 1M', rsLabel];

      let html = '<table class="drilldown-table"><thead><tr>';
      colHeaders.forEach((label, ci) => {
        const sorted = ci === rrg_drilldownSortCol;
        const arrow = sorted ? (rrg_drilldownSortAsc ? '&#9650;' : '&#9660;') : '&#9660;';
        html += `<th class="${sorted ? 'dd-sorted' : ''}" onclick="sortDrilldown(${ci})">${label} <span class="dd-sort">${arrow}</span></th>`;
      });
      html += '</tr></thead><tbody>';

      stocks.forEach((stock, i) => {
        html += '<tr>';
        html += `<td>${stock.sym}</td>`;

        // 1W
        html += ddPctCell(stock.pct1W);
        // 1M
        html += ddPctCell(stock.pct1M);
        // 3M
        html += ddPctCell(stock.pct3M);
        // vs benchmark
        html += ddPctCell(stock.vs1M);

        // RS 40D — per-stock normalized bars showing RS shape
        let barsHtml = '<div class="rs-bars-wrap">';
        const norm = stock.rsBarsNorm || [];
        if (norm.length > 0) {
          norm.forEach(v => {
            const hPct = Math.max(v * 100, 3); // 0-100%, min 3% so bars are visible
            // Brighter green for taller bars (stronger RS)
            const g = Math.round(140 + v * 115); // 140..255
            const color = `rgb(34,${g},80)`;
            barsHtml += `<div class="rs-bar-fill" style="height:${hPct}%;background:${color}"></div>`;
          });
        }
        barsHtml += '</div>';
        html += `<td style="padding:4px 6px;min-width:200px;">${barsHtml}</td>`;

        html += '</tr>';
      });

      html += '</tbody></table>';
      bodyEl.innerHTML = html;
    }

    function ddPctCell(pct) {
      const color = heatmapColor(pct);
      const sign = pct != null && pct >= 0 ? '+' : '';
      const text = pct != null ? `${sign}${pct.toFixed(1)}%` : '--';
      return `<td class="heatmap-cell" style="background:${color.bg};color:${color.text}">${text}</td>`;
    }

    function sortDrilldown(colIndex) {
      if (rrg_drilldownSortCol === colIndex) rrg_drilldownSortAsc = !rrg_drilldownSortAsc;
      else { rrg_drilldownSortCol = colIndex; rrg_drilldownSortAsc = false; }
      renderDrilldownTable();
    }

    function closeRRGDrilldown() {
      rrg_drilldownOpen = null;
      document.getElementById('rrg-drilldown').classList.remove('visible');
    }

    // ── Stock RRG View ──
    let srrg_hoveredStock = null;
    let srrg_lockedStock = null;
    let srrg_legendOrder = []; // sorted sym list for arrow key navigation

    function computeStockRRGStats(sym) {
      const sectorVal = document.getElementById('srrg-sector').value;
      let data;
      if (sectorVal === 'all') {
        // Find which panel contains this symbol
        for (let pi = 1; pi < PANEL_COUNT; pi++) {
          const d = panelDataCache[pi];
          if (d && d.prices[sym]) { data = d; break; }
        }
      } else {
        data = panelDataCache[parseInt(sectorVal)];
      }
      if (!data || !data.prices[sym]) return null;

      const prices = data.prices[sym];
      const rangeEnd = prices.length - 1;

      // Last valid price
      let last = null, lastIdx = rangeEnd;
      for (let i = rangeEnd; i >= 0; i--) {
        if (prices[i] != null) { last = prices[i]; lastIdx = i; break; }
      }
      if (last == null) return null;

      // Multi-timeframe returns
      const ranges = [
        { label: '1D', range: '1D' },
        { label: '5D', range: '5D' },
        { label: '2W', range: '10D' },
        { label: '1M', range: '1M' },
        { label: '3M', range: '3M' },
      ];
      const returns = [];
      for (const r of ranges) {
        const startDate = getRangeStartDate(r.range, data.dates);
        const si = findStartIndex(data.dates, startDate);
        let startPrice = null;
        for (let i = si; i <= lastIdx; i++) {
          if (prices[i] != null) { startPrice = prices[i]; break; }
        }
        const ret = (startPrice && startPrice !== 0) ? ((last - startPrice) / startPrice) * 100 : null;
        returns.push({ label: r.label, value: ret });
      }

      // 50-day SMA
      let sma50 = null;
      const validPrices50 = [];
      for (let i = rangeEnd; i >= 0 && validPrices50.length < 50; i--) {
        if (prices[i] != null) validPrices50.push(prices[i]);
      }
      if (validPrices50.length === 50) {
        sma50 = validPrices50.reduce((a, b) => a + b, 0) / 50;
      }
      const pctFrom50MA = sma50 && last ? ((last - sma50) / sma50) * 100 : null;

      // EMAs
      function computeEMA(period) {
        const vp = [];
        for (let i = 0; i <= rangeEnd; i++) {
          if (prices[i] != null) vp.push(prices[i]);
        }
        if (vp.length < period) return null;
        const k = 2 / (period + 1);
        let ema = vp.slice(0, period).reduce((a, b) => a + b, 0) / period;
        for (let i = period; i < vp.length; i++) {
          ema = vp[i] * k + ema * (1 - k);
        }
        return ema;
      }
      const ema8 = computeEMA(8);
      const ema21 = computeEMA(21);
      const pctFromEma8 = ema8 && last ? ((last - ema8) / ema8) * 100 : null;
      const pctFromEma21 = ema21 && last ? ((last - ema21) / ema21) * 100 : null;

      // RS Rating
      const rsRating = rsRatingCache && rsRatingCache[sym] ? (() => {
        for (let i = rangeEnd; i >= 0; i--) {
          if (rsRatingCache[sym][i] != null) return rsRatingCache[sym][i];
        }
        return null;
      })() : null;

      const divergence = divergenceCache[sym] || null;

      // ADR% = (SMA(High, 14) / SMA(Low, 14) - 1) * 100
      let adrPct = null;
      const ohlcSymAdr = data.ohlc && data.ohlc[sym];
      if (ohlcSymAdr && ohlcSymAdr.h && ohlcSymAdr.l) {
        let hSum = 0, lSum = 0, adrN = 0;
        for (let i = rangeEnd; i >= 0 && adrN < 14; i--) {
          if (ohlcSymAdr.h[i] != null && ohlcSymAdr.l[i] != null) {
            hSum += ohlcSymAdr.h[i]; lSum += ohlcSymAdr.l[i]; adrN++;
          }
        }
        if (adrN > 0 && lSum > 0) adrPct = ((hSum / adrN) / (lSum / adrN) - 1) * 100;
      }

      // 3M price series for sparkline
      const sparkStart = getRangeStartDate('3M', data.dates);
      const sparkIdx = findStartIndex(data.dates, sparkStart);
      const sparkPrices = [];
      const sparkOhlc = []; // {o,h,l,c} per bar for candlestick view
      const ohlcSym2 = data.ohlc && data.ohlc[sym];
      for (let i = sparkIdx; i <= lastIdx; i++) {
        if (prices[i] != null) {
          sparkPrices.push(prices[i]);
          sparkOhlc.push({
            o: ohlcSym2 && ohlcSym2.o && ohlcSym2.o[i] != null ? ohlcSym2.o[i] : prices[i],
            h: ohlcSym2 && ohlcSym2.h && ohlcSym2.h[i] != null ? ohlcSym2.h[i] : prices[i],
            l: ohlcSym2 && ohlcSym2.l && ohlcSym2.l[i] != null ? ohlcSym2.l[i] : prices[i],
            c: prices[i],
          });
        }
      }

      // 14-day RSI — compute full series then extract 3M window
      const rsiPeriod = 14;
      let rsi = null;
      const rsiSeries = [];
      const validForRsi = [];
      const validForRsiIdx = []; // track original indices for 3M slicing
      for (let i = 0; i <= rangeEnd; i++) {
        if (prices[i] != null) { validForRsi.push(prices[i]); validForRsiIdx.push(i); }
      }
      if (validForRsi.length > rsiPeriod) {
        let avgGain = 0, avgLoss = 0;
        for (let i = 1; i <= rsiPeriod; i++) {
          const change = validForRsi[i] - validForRsi[i - 1];
          if (change > 0) avgGain += change; else avgLoss -= change;
        }
        avgGain /= rsiPeriod;
        avgLoss /= rsiPeriod;
        // First RSI value at index rsiPeriod
        for (let i = 0; i <= rsiPeriod; i++) rsiSeries.push(null);
        rsiSeries[rsiPeriod] = avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));
        for (let i = rsiPeriod + 1; i < validForRsi.length; i++) {
          const change = validForRsi[i] - validForRsi[i - 1];
          avgGain = (avgGain * (rsiPeriod - 1) + (change > 0 ? change : 0)) / rsiPeriod;
          avgLoss = (avgLoss * (rsiPeriod - 1) + (change < 0 ? -change : 0)) / rsiPeriod;
          rsiSeries[i] = avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));
        }
        rsi = rsiSeries[rsiSeries.length - 1];
      }
      // Extract 3M RSI series matching sparkline period
      const sparkRsi = [];
      for (let i = 0; i < validForRsiIdx.length; i++) {
        if (validForRsiIdx[i] >= sparkIdx && rsiSeries[i] != null) {
          sparkRsi.push(rsiSeries[i]);
        }
      }

      // Awesome Oscillator: SMA(5) - SMA(34) of median price (H+L)/2
      const ohlcSym = data.ohlc && data.ohlc[sym];
      const aoMedian = [];
      for (let i = 0; i < validForRsiIdx.length; i++) {
        const oi = validForRsiIdx[i];
        if (ohlcSym && ohlcSym.h && ohlcSym.l && ohlcSym.h[oi] != null && ohlcSym.l[oi] != null) {
          aoMedian.push((ohlcSym.h[oi] + ohlcSym.l[oi]) / 2);
        } else {
          aoMedian.push(validForRsi[i]);
        }
      }
      const aoSeries = [];
      if (aoMedian.length >= 34) {
        for (let i = 0; i < aoMedian.length; i++) {
          if (i < 33) { aoSeries.push(null); continue; }
          let sum5 = 0, sum34 = 0;
          for (let j = i - 4; j <= i; j++) sum5 += aoMedian[j];
          for (let j = i - 33; j <= i; j++) sum34 += aoMedian[j];
          aoSeries.push(sum5 / 5 - sum34 / 34);
        }
      }
      const sparkAo = [];
      for (let i = 0; i < validForRsiIdx.length; i++) {
        if (validForRsiIdx[i] >= sparkIdx && aoSeries[i] != null) {
          sparkAo.push(aoSeries[i]);
        }
      }
      const ao = sparkAo.length > 0 ? sparkAo[sparkAo.length - 1] : null;

      const sectorName = SECTOR_SHORT_NAMES[data.baseSymbol] || data.title.replace(/^\d+\.\s*/, '');
      return { returns, pctFrom50MA, pctFromEma8, pctFromEma21, rsRating, divergence, adrPct, sparkPrices, sparkOhlc, rsi, sparkRsi, ao, sparkAo, sectorName };
    }

    function showStockInfoPanel(sym) {
      const panel = document.getElementById('srrg-info-panel');
      const stats = computeStockRRGStats(sym);
      if (!stats) { hideStockInfoPanel(); return; }

      const fmt = (v, decimals = 1) => {
        if (v == null) return '\u2014';
        const sign = v >= 0 ? '+' : '';
        return sign + v.toFixed(decimals) + '%';
      };
      const cls = (v) => v == null ? '' : (v >= 0 ? ' positive' : ' negative');

      const sectionTitle = (t) => `<div class="modal-stats-divider"></div><div style="font-size:var(--fs-sm);color:var(--text-quaternary);text-transform:uppercase;letter-spacing:0.5px;padding:2px 0 1px">${t}</div>`;

      let rows = '';
      const isFav = gridFavorites.has(sym);
      rows += `<div class="modal-stats-header"><span class="modal-stats-sym">${sym}</span><button class="srrg-fav-btn${isFav ? ' active' : ''}" onclick="event.stopPropagation();toggleInfoPanelFav('${sym}',this)">${isFav ? '\u2605' : '\u2606'}</button><div style="font-size:var(--fs-sm);color:var(--text-quaternary);margin-top:1px;margin-left:auto">${stats.sectorName}</div></div>`;

      // Multi-timeframe returns
      rows += sectionTitle('Returns');
      for (const r of stats.returns) {
        rows += `<div class="modal-stats-row"><span class="modal-stats-label">${r.label}</span><span class="modal-stats-value${cls(r.value)}">${fmt(r.value)}</span></div>`;
      }

      // Moving averages
      rows += sectionTitle('Moving Avgs');
      rows += `<div class="modal-stats-row"><span class="modal-stats-label">% from EMA8</span><span class="modal-stats-value${cls(stats.pctFromEma8)}">${fmt(stats.pctFromEma8)}</span></div>`;
      rows += `<div class="modal-stats-row"><span class="modal-stats-label">% from EMA21</span><span class="modal-stats-value${cls(stats.pctFromEma21)}">${fmt(stats.pctFromEma21)}</span></div>`;
      rows += `<div class="modal-stats-row"><span class="modal-stats-label">% from 50MA</span><span class="modal-stats-value${cls(stats.pctFrom50MA)}">${fmt(stats.pctFrom50MA)}</span></div>`;

      // Momentum
      if (stats.rsRating != null || stats.divergence || stats.adrPct != null) {
        rows += sectionTitle('Momentum');
        if (stats.rsRating != null) {
          const rsCls = stats.rsRating >= 50 ? ' positive' : ' negative';
          rows += `<div class="modal-stats-row"><span class="modal-stats-label">RS Rating</span><span class="modal-stats-value${rsCls}">${stats.rsRating.toFixed(0)}</span></div>`;
        }
        if (stats.adrPct != null) {
          rows += `<div class="modal-stats-row"><span class="modal-stats-label">ADR%</span><span class="modal-stats-value">${stats.adrPct.toFixed(2)}%</span></div>`;
        }
        if (stats.divergence) {
          const divText = stats.divergence === 'bullish' ? '\u25B2 Bullish' : '\u25BC Bearish';
          const divCls = stats.divergence === 'bullish' ? ' positive' : ' negative';
          rows += `<div class="modal-stats-row"><span class="modal-stats-label">Divergence</span><span class="modal-stats-value${divCls}">${divText}</span></div>`;
        }
      }

      // Sparkline with toggle
      rows += `<div class="modal-stats-divider"></div><div style="display:flex;align-items:center;justify-content:space-between;padding:2px 0 1px"><span style="font-size:var(--fs-sm);color:var(--text-quaternary);text-transform:uppercase;letter-spacing:0.5px">Price (3M)</span><span style="display:inline-flex;gap:1px;font-size:var(--fs-xs)"><button class="srrg-spark-toggle${infoPanelChartMode==='line'?' active':''}" data-mode="line" onclick="infoPanelChartMode='line';showStockInfoPanel('${sym}')">Line</button><button class="srrg-spark-toggle${infoPanelChartMode==='candle'?' active':''}" data-mode="candle" onclick="infoPanelChartMode='candle';showStockInfoPanel('${sym}')">Candle</button></span></div>`;
      const sparkH = infoPanelChartMode === 'candle' ? 120 : 50;
      rows += `<canvas id="srrg-sparkline" width="161" height="${sparkH}" style="width:100%;height:${sparkH}px;display:block;"></canvas>`;

      // RSI chart
      if (stats.rsi != null) {
        const rsiCls = stats.rsi >= 50 ? ' positive' : ' negative';
        rows += sectionTitle(`RSI (14) <span class="modal-stats-value${rsiCls}" style="float:right;font-size:var(--fs-sm)">${stats.rsi.toFixed(1)}</span>`);
        rows += `<canvas id="srrg-rsi-chart" width="161" height="60" style="width:100%;height:60px;display:block;"></canvas>`;
      }

      // AO chart
      if (stats.ao != null) {
        const aoCls = stats.ao >= 0 ? ' positive' : ' negative';
        const aoFmt = stats.ao >= 0 ? '+' + stats.ao.toFixed(2) : stats.ao.toFixed(2);
        rows += sectionTitle(`AO <span class="modal-stats-value${aoCls}" style="float:right;font-size:var(--fs-sm)">${aoFmt}</span>`);
        rows += `<canvas id="srrg-ao-chart" width="161" height="50" style="width:100%;height:50px;display:block;"></canvas>`;
      }

      rows += `<div style="margin-top:8px"><button class="srrg-chart-btn" onclick="openTVChartModal('${sym}')">View Chart</button></div>`;
      panel.innerHTML = `<div class="modal-stats-card">${rows}</div>`;
      panel.classList.add('visible');

      // Position: right-center of parent (only if not manually dragged)
      if (!panel.dataset.dragged) {
        const parent = panel.parentElement;
        const ph = parent.clientHeight;
        const panelH = panel.offsetHeight;
        panel.style.top = Math.max(0, (ph - panelH) / 2) + 'px';
        panel.style.right = '8px';
        panel.style.left = '';
      }

      // Draw sparkline / candlestick
      const canvas = document.getElementById('srrg-sparkline');
      if (canvas && stats.sparkPrices.length > 1) {
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvas.clientWidth * dpr;
        canvas.height = canvas.clientHeight * dpr;
        ctx.scale(dpr, dpr);
        const w = canvas.clientWidth, h = canvas.clientHeight;
        const sp = stats.sparkPrices;
        const tc = getThemeColors();

        if (infoPanelChartMode === 'candle' && stats.sparkOhlc.length > 1) {
          // Candlestick mode
          const bars = stats.sparkOhlc;
          let allMin = Infinity, allMax = -Infinity;
          for (const b of bars) { allMin = Math.min(allMin, b.l); allMax = Math.max(allMax, b.h); }
          const range = allMax - allMin || 1;
          const pad = 4;
          const barW = Math.max(1, (w / bars.length) * 0.7);
          const gap = w / bars.length;
          for (let i = 0; i < bars.length; i++) {
            const b = bars[i];
            const isUp = b.c >= b.o;
            const bodyColor = isUp ? tc.semanticBullish : tc.semanticBearish;
            const cx = gap * i + gap / 2;
            const toY = v => pad + ((allMax - v) / range) * (h - 2 * pad);
            const oY = toY(b.o), cY = toY(b.c);
            const bodyTop = Math.min(oY, cY);
            const bodyBot = Math.max(oY, cY);
            const bodyH = Math.max(1, bodyBot - bodyTop);
            // Wicks (above and below body only)
            ctx.strokeStyle = bodyColor;
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(cx, toY(b.h)); ctx.lineTo(cx, bodyTop); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, bodyBot); ctx.lineTo(cx, toY(b.l)); ctx.stroke();
            // Body
            ctx.fillStyle = bodyColor;
            ctx.fillRect(cx - barW / 2, bodyTop, barW, bodyH);
          }
        } else {
          // Line mode
          const min = Math.min(...sp), max = Math.max(...sp);
          const range = max - min || 1;
          const pad = 2;
          const isUp = sp[sp.length - 1] >= sp[0];
          const color = isUp ? tc.semanticBullish : tc.semanticBearish;
          ctx.strokeStyle = color;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          for (let i = 0; i < sp.length; i++) {
            const x = (i / (sp.length - 1)) * w;
            const y = pad + ((max - sp[i]) / range) * (h - 2 * pad);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();
          ctx.lineTo(w, h);
          ctx.lineTo(0, h);
          ctx.closePath();
          const hex = color.replace('#', '');
          const r = parseInt(hex.slice(0, 2), 16), g = parseInt(hex.slice(2, 4), 16), b = parseInt(hex.slice(4, 6), 16);
          ctx.fillStyle = `rgba(${r},${g},${b},0.15)`;
          ctx.fill();
        }
      }

      // Draw RSI chart
      const rsiCanvas = document.getElementById('srrg-rsi-chart');
      const tc2 = getThemeColors();
      if (rsiCanvas && stats.sparkRsi.length > 1) {
        const rCtx = rsiCanvas.getContext('2d');
        const rDpr = window.devicePixelRatio || 1;
        rsiCanvas.width = rsiCanvas.clientWidth * rDpr;
        rsiCanvas.height = rsiCanvas.clientHeight * rDpr;
        rCtx.scale(rDpr, rDpr);
        const rW = rsiCanvas.clientWidth, rH = rsiCanvas.clientHeight;
        const rPad = 2;
        const rData = stats.sparkRsi;

        // Y scale: 0–100 fixed for RSI
        const toY = (v) => rPad + ((100 - v) / 100) * (rH - 2 * rPad);

        // 50 level line
        rCtx.strokeStyle = 'rgba(255,255,255,0.25)';
        rCtx.lineWidth = 0.75;
        rCtx.beginPath();
        const y50 = toY(50);
        rCtx.moveTo(0, y50);
        rCtx.lineTo(rW, y50);
        rCtx.stroke();

        // RSI line
        const lastRsi = rData[rData.length - 1];
        const rsiColor = lastRsi >= 50 ? tc2.semanticBullish : tc2.semanticBearish;
        rCtx.strokeStyle = rsiColor;
        rCtx.lineWidth = 1.5;
        rCtx.beginPath();
        for (let i = 0; i < rData.length; i++) {
          const x = (i / (rData.length - 1)) * rW;
          const y = toY(rData[i]);
          i === 0 ? rCtx.moveTo(x, y) : rCtx.lineTo(x, y);
        }
        rCtx.stroke();
      }

      // Draw AO chart — histogram bars colored green/red based on change
      const aoCanvas = document.getElementById('srrg-ao-chart');
      if (aoCanvas && stats.sparkAo.length > 1) {
        const aCtx = aoCanvas.getContext('2d');
        const aDpr = window.devicePixelRatio || 1;
        aoCanvas.width = aoCanvas.clientWidth * aDpr;
        aoCanvas.height = aoCanvas.clientHeight * aDpr;
        aCtx.scale(aDpr, aDpr);
        const aW = aoCanvas.clientWidth, aH = aoCanvas.clientHeight;
        const aData = stats.sparkAo;
        const aMax = Math.max(...aData.map(v => Math.abs(v))) || 1;
        const aPad = 2;
        const zeroY = aH / 2;
        const barW = Math.max(1, (aW / aData.length) - 0.5);

        // Zero line
        aCtx.strokeStyle = 'rgba(255,255,255,0.25)';
        aCtx.lineWidth = 0.75;
        aCtx.beginPath();
        aCtx.moveTo(0, zeroY);
        aCtx.lineTo(aW, zeroY);
        aCtx.stroke();

        for (let i = 0; i < aData.length; i++) {
          const x = (i / aData.length) * aW;
          const val = aData[i];
          const barH = (Math.abs(val) / aMax) * (aH / 2 - aPad);
          // Color: green if rising from prev bar, red if falling
          const rising = i === 0 ? val >= 0 : val >= aData[i - 1];
          aCtx.fillStyle = rising ? tc2.semanticBullish : tc2.semanticBearish;
          if (val >= 0) {
            aCtx.fillRect(x, zeroY - barH, barW, barH);
          } else {
            aCtx.fillRect(x, zeroY, barW, barH);
          }
        }
      }
    }

    function hideStockInfoPanel() {
      const panel = document.getElementById('srrg-info-panel');
      panel.classList.remove('visible');
      panel.innerHTML = '';
      delete panel.dataset.dragged;
    }

    function findPanelDataForSymbol(sym) {
      for (let i = 0; i < PANEL_COUNT; i++) {
        const d = panelDataCache[i];
        if (d && d.symbols.includes(sym)) return d;
      }
      return null;
    }

    function openTVChartModal(sym) {
      const modal = document.getElementById('tv-chart-modal');
      const container = document.getElementById('tv-chart-container');
      document.getElementById('tv-chart-title').textContent = sym + (stockNamesMap[sym] ? ' — ' + stockNamesMap[sym] : '');
      container.innerHTML = '';
      modal.classList.add('visible');
      tvChartSymbol = sym;

      const panelData = findPanelDataForSymbol(sym);
      if (!panelData) return;

      const tc = currentThemeColors;
      const dates = panelData.dates;
      const closes = panelData.prices[sym];
      const ohlcData = panelData.ohlc && panelData.ohlc[sym];
      const opens = ohlcData && ohlcData.o ? ohlcData.o : null;
      const highs = ohlcData && ohlcData.h ? ohlcData.h : null;
      const lows = ohlcData && ohlcData.l ? ohlcData.l : null;

      // Build candlestick data (fall back to doji if no OHLC)
      const candleData = [];
      for (let i = 0; i < dates.length; i++) {
        if (closes[i] == null) continue;
        candleData.push({
          time: dates[i],
          open: opens && opens[i] != null ? opens[i] : closes[i],
          high: highs && highs[i] != null ? highs[i] : closes[i],
          low: lows && lows[i] != null ? lows[i] : closes[i],
          close: closes[i],
        });
      }

      // Common chart options factory
      function makeChartOptions(showTimeScale) {
        return {
          layout: {
            background: { type: 'solid', color: '#fefefe' },
            textColor: '#999999',
            fontSize: 10,
          },
          grid: {
            vertLines: { visible: false },
            horzLines: { visible: false },
          },
          crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal,
            vertLine: { color: 'rgba(0,0,0,0.2)', width: 1, style: 0 },
            horzLine: { color: 'rgba(0,0,0,0.2)', width: 1, style: 0 },
          },
          rightPriceScale: {
            borderColor: '#e0e3eb',
            scaleMargins: { top: 0.05, bottom: 0.05 },
          },
          timeScale: {
            borderColor: '#e0e3eb',
            borderVisible: showTimeScale,
            timeVisible: false,
            rightOffset: 30,
            visible: showTimeScale,
          },
          handleScale: { axisPressedMouseMove: true },
          handleScroll: { vertTouchDrag: false },
        };
      }

      // Create chart containers
      const mainDiv = document.createElement('div');
      mainDiv.style.cssText = 'flex:7;min-height:0;position:relative;';
      const rsiDiv = document.createElement('div');
      rsiDiv.style.cssText = 'flex:1.5;min-height:0;position:relative;border-top:1px solid #e0e3eb;';
      const aoDiv = document.createElement('div');
      aoDiv.style.cssText = 'flex:1.5;min-height:0;position:relative;border-top:1px solid #e0e3eb;';
      container.appendChild(mainDiv);
      container.appendChild(rsiDiv);
      container.appendChild(aoDiv);

      // ── Main candlestick chart ──
      const mainChart = LightweightCharts.createChart(mainDiv, { ...makeChartOptions(false), autoSize: true });
      const candleSeries = mainChart.addCandlestickSeries({
        upColor: '#eaebea',
        downColor: '#5d606b',
        borderUpColor: '#444444',
        borderDownColor: '#444444',
        wickUpColor: '#151623',
        wickDownColor: '#151623',
      });
      candleSeries.setData(candleData);

      // EMA 8 overlay
      const ema8Arr = emaSmooth(closes, 8);
      const ema8Data = [];
      for (let i = 0; i < dates.length; i++) {
        if (ema8Arr[i] != null) ema8Data.push({ time: dates[i], value: ema8Arr[i] });
      }
      const ema8Series = mainChart.addLineSeries({ color: '#b4a0cc', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
      ema8Series.setData(ema8Data);

      // EMA 21 overlay
      const ema21Arr = emaSmooth(closes, 21);
      const ema21Data = [];
      for (let i = 0; i < dates.length; i++) {
        if (ema21Arr[i] != null) ema21Data.push({ time: dates[i], value: ema21Arr[i] });
      }
      const ema21Series = mainChart.addLineSeries({ color: '#4488cc', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
      ema21Series.setData(ema21Data);

      // SMA 50 overlay
      const sma50Arr = computeSMAArray(closes, 50);
      const sma50Data = [];
      for (let i = 0; i < dates.length; i++) {
        if (sma50Arr[i] != null) sma50Data.push({ time: dates[i], value: sma50Arr[i] });
      }
      const sma50Series = mainChart.addLineSeries({ color: '#d66b8a', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
      sma50Series.setData(sma50Data);

      // ── RSI chart ──
      const rsiChart = LightweightCharts.createChart(rsiDiv, {
        ...makeChartOptions(false),
        autoSize: true,
        rightPriceScale: { borderColor: '#e0e3eb', scaleMargins: { top: 0.05, bottom: 0.05 } },
      });
      const rsiArr = computeRSIArray(closes, 14);
      const rsiData = [];
      for (let i = 0; i < dates.length; i++) {
        if (rsiArr[i] != null) rsiData.push({ time: dates[i], value: rsiArr[i] });
      }
      const rsiSeries = rsiChart.addLineSeries({ color: '#0f0f0f', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
      rsiSeries.setData(rsiData);

      // RSI reference lines (70, 50, 30) and range anchors
      if (candleData.length >= 2) {
        const firstDate = candleData[0].time;
        const lastDate = candleData[candleData.length - 1].time;
        const rsiLineOpts = { color: 'rgba(120,123,134,0.4)', lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false };
        const lvl70 = rsiChart.addLineSeries(rsiLineOpts);
        lvl70.setData([{ time: firstDate, value: 70 }, { time: lastDate, value: 70 }]);
        const lvl50 = rsiChart.addLineSeries(rsiLineOpts);
        lvl50.setData([{ time: firstDate, value: 50 }, { time: lastDate, value: 50 }]);
        const lvl30 = rsiChart.addLineSeries(rsiLineOpts);
        lvl30.setData([{ time: firstDate, value: 30 }, { time: lastDate, value: 30 }]);
        // Invisible anchors to force 0-100 range
        const anchorLo = rsiChart.addLineSeries({ color: 'transparent', lineWidth: 0, priceLineVisible: false, lastValueVisible: false, visible: false });
        anchorLo.setData([{ time: firstDate, value: 0 }, { time: lastDate, value: 0 }]);
        const anchorHi = rsiChart.addLineSeries({ color: 'transparent', lineWidth: 0, priceLineVisible: false, lastValueVisible: false, visible: false });
        anchorHi.setData([{ time: firstDate, value: 100 }, { time: lastDate, value: 100 }]);
      }

      // ── AO chart ──
      const aoChart = LightweightCharts.createChart(aoDiv, { ...makeChartOptions(true), autoSize: true });
      const aoArr = computeAOArray(highs, lows, closes);
      const aoData = [];
      for (let i = 0; i < dates.length; i++) {
        if (aoArr[i] != null) {
          const rising = i === 0 || aoArr[i - 1] == null ? aoArr[i] >= 0 : aoArr[i] >= aoArr[i - 1];
          aoData.push({ time: dates[i], value: aoArr[i], color: rising ? '#b8b8b8' : '#0f0f0f' });
        }
      }
      const aoSeries = aoChart.addHistogramSeries({ priceLineVisible: false, lastValueVisible: false });
      aoSeries.setData(aoData);

      // ── Time scale sync (time-based to keep all panes aligned) ──
      const allCharts = [mainChart, rsiChart, aoChart];
      let syncing = false;
      allCharts.forEach((chart, idx) => {
        chart.timeScale().subscribeVisibleTimeRangeChange(range => {
          if (syncing || !range) return;
          syncing = true;
          allCharts.forEach((c, ci) => {
            if (ci !== idx) {
              try { c.timeScale().setVisibleRange(range); } catch(e) {}
            }
          });
          syncing = false;
        });
      });

      // Default view: last ~252 bars (1 year) with ~1 week left padding
      if (candleData.length > 0) {
        const fromIdx = Math.max(0, candleData.length - 252 - 5);
        const timeFrom = candleData[fromIdx].time;
        const timeTo = candleData[candleData.length - 1].time;
        mainChart.timeScale().setVisibleRange({ from: timeFrom, to: timeTo });
      }

      tvChartInstances = { main: mainChart, rsi: rsiChart, ao: aoChart };
    }

    function closeTVChartModal(event) {
      if (event && event.target !== document.getElementById('tv-chart-modal')) return;
      const modal = document.getElementById('tv-chart-modal');
      modal.classList.remove('visible');
      if (tvChartInstances) {
        try { tvChartInstances.main.remove(); } catch(e) {}
        try { tvChartInstances.rsi.remove(); } catch(e) {}
        try { tvChartInstances.ao.remove(); } catch(e) {}
        tvChartInstances = null;
      }
      tvChartSymbol = null;
      document.getElementById('tv-chart-container').innerHTML = '';
    }

    // Draggable info panel
    (function() {
      const panel = document.getElementById('srrg-info-panel');
      let dragging = false, startX, startY, startLeft, startTop;
      panel.addEventListener('mousedown', (e) => {
        if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
        dragging = true;
        panel.classList.add('dragging');
        panel.dataset.dragged = '1';
        const rect = panel.getBoundingClientRect();
        const parentRect = panel.parentElement.getBoundingClientRect();
        startLeft = rect.left - parentRect.left;
        startTop = rect.top - parentRect.top;
        panel.style.right = '';
        panel.style.left = startLeft + 'px';
        panel.style.top = startTop + 'px';
        startX = e.clientX;
        startY = e.clientY;
        e.preventDefault();
      });
      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const parentRect = panel.parentElement.getBoundingClientRect();
        let newLeft = startLeft + (e.clientX - startX);
        let newTop = startTop + (e.clientY - startY);
        // Clamp within parent
        newLeft = Math.max(0, Math.min(newLeft, parentRect.width - panel.offsetWidth));
        newTop = Math.max(0, Math.min(newTop, parentRect.height - panel.offsetHeight));
        panel.style.left = newLeft + 'px';
        panel.style.top = newTop + 'px';
      });
      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        panel.classList.remove('dragging');
      });
    })();

    function populateSectorDropdown() {
      const sel = document.getElementById('srrg-sector');
      if (sel.options.length > 1) return; // already populated
      sel.innerHTML = '';
      // "All" option
      const allOpt = document.createElement('option');
      allOpt.value = 'all';
      allOpt.textContent = 'All Sectors';
      sel.appendChild(allOpt);
      const seenSyms = new Set();
      for (let pi = 1; pi < PANEL_COUNT; pi++) {
        const data = panelDataCache[pi];
        if (!data) continue;
        const sym = data.baseSymbol;
        if (seenSyms.has(sym)) continue;
        seenSyms.add(sym);
        const name = SECTOR_SHORT_NAMES[sym] || data.title.replace(/^\d+\.\s*/, '');
        const opt = document.createElement('option');
        opt.value = pi;
        opt.textContent = `${sym} — ${name}`;
        sel.appendChild(opt);
      }
    }

    function computeStockRRGData() {
      const sectorVal = document.getElementById('srrg-sector').value;
      const isAll = sectorVal === 'all';
      const panelIndex = isAll ? 1 : parseInt(sectorVal);
      const refData = panelDataCache[panelIndex];
      if (!refData) return { stocks: [], sectorSym: '', panelIndex };

      const period = document.getElementById('srrg-period').value;
      const tailLen = parseInt(document.getElementById('srrg-tail').value);
      const smoothLen = parseInt(document.getElementById('srrg-smooth').value);
      const benchChoice = document.getElementById('srrg-benchmark').value;

      const sectorSym = isAll ? 'SPY' : refData.baseSymbol;

      // Find benchmark prices
      let benchPrices;
      if (benchChoice === 'sector' && !isAll) {
        benchPrices = refData.prices[sectorSym];
        if (!benchPrices) {
          for (let pi = 0; pi < PANEL_COUNT; pi++) {
            const d = panelDataCache[pi];
            if (d && d.prices[sectorSym]) { benchPrices = d.prices[sectorSym]; break; }
          }
        }
      } else {
        // For "All" with sector benchmark, use SPY; otherwise use selected benchmark
        const benchSym = (isAll && benchChoice === 'sector') ? 'SPY' : benchChoice;
        const p0 = panelDataCache[0];
        benchPrices = p0 ? p0.prices[benchSym] : null;
      }
      if (!benchPrices) return { stocks: [], sectorSym, panelIndex };

      const dates = refData.dates;
      const step = period === 'daily' ? 1 : 5;
      const sampleIndices = [];
      for (let i = 0; i < dates.length; i += step) sampleIndices.push(i);
      if (sampleIndices[sampleIndices.length - 1] !== dates.length - 1) sampleIndices.push(dates.length - 1);

      const smaWindow = period === 'daily' ? 50 : 10;
      const momWindow = period === 'daily' ? 10 : 5;
      const results = [];
      const stockColors = [
        '#2962ff','#26a69a','#ef5350','#ff9800','#ab47bc','#42a5f5',
        '#66bb6a','#ffa726','#ec407a','#7e57c2','#29b6f6','#d4e157',
        '#26c6da','#8d6e63','#78909c','#f06292','#4db6ac','#aed581',
        '#ffb74d','#ba68c8','#4fc3f7','#fff176','#81c784','#e57373',
      ];
      let colorIdx = 0;
      const seenStocks = new Set();

      // Collect panels to process
      const panelsToProcess = [];
      if (isAll) {
        const seenBases = new Set();
        for (let pi = 1; pi < PANEL_COUNT; pi++) {
          const d = panelDataCache[pi];
          if (!d) continue;
          if (seenBases.has(d.baseSymbol)) continue;
          seenBases.add(d.baseSymbol);
          panelsToProcess.push({ data: d, pi });
        }
      } else {
        panelsToProcess.push({ data: refData, pi: panelIndex });
      }

      for (const { data, pi: panelIdx } of panelsToProcess) {
        data.symbols.forEach(s => {
          if (ETF_TICKERS.has(s)) return;
          if (seenStocks.has(s)) return;
          seenStocks.add(s);
          const prices = data.prices[s];
          if (!prices) return;

          const rsLine = sampleIndices.map(idx => {
            const sp = prices[idx], bp = benchPrices[idx];
            if (sp == null || bp == null || bp === 0) return null;
            return sp / bp;
          });

          const rawRsRatio = [];
          for (let i = 0; i < rsLine.length; i++) {
            if (i < smaWindow - 1 || rsLine[i] == null) { rawRsRatio.push(null); continue; }
            let sum = 0, count = 0;
            for (let j = i - smaWindow + 1; j <= i; j++) {
              if (rsLine[j] != null) { sum += rsLine[j]; count++; }
            }
            if (count === 0) { rawRsRatio.push(null); continue; }
            rawRsRatio.push((rsLine[i] / (sum / count)) * 100);
          }
          const rsRatio = emaSmooth(rawRsRatio, smoothLen);

          const rawMomentum = [];
          for (let i = 0; i < rsRatio.length; i++) {
            if (i < momWindow - 1 || rsRatio[i] == null) { rawMomentum.push(null); continue; }
            let sum = 0, count = 0;
            for (let j = i - momWindow + 1; j <= i; j++) {
              if (rsRatio[j] != null) { sum += rsRatio[j]; count++; }
            }
            if (count === 0) { rawMomentum.push(null); continue; }
            rawMomentum.push((rsRatio[i] / (sum / count)) * 100);
          }
          const rsMomentum = emaSmooth(rawMomentum, smoothLen);

          const trail = [];
          let added = 0;
          for (let i = rsRatio.length - 1; i >= 0 && added < tailLen; i--) {
            if (rsRatio[i] != null && rsMomentum[i] != null) {
              trail.unshift({ x: rsRatio[i], y: rsMomentum[i] });
              added++;
            }
          }

          if (trail.length > 0) {
            // Compute EMA proximity tags
            let nearEma8 = false, nearEma21 = false;
            const len = prices.length;
            let last = null;
            for (let i = len - 1; i >= 0; i--) { if (prices[i] != null) { last = prices[i]; break; } }
            if (last != null) {
              const calcEma = (period) => {
                const k = 2 / (period + 1);
                let ema = null;
                for (let i = 0; i < len; i++) {
                  if (prices[i] == null) continue;
                  ema = ema == null ? prices[i] : prices[i] * k + ema * (1 - k);
                }
                return ema;
              };
              const e8 = calcEma(8), e21 = calcEma(21);
              if (e8 != null) { const pct = ((last - e8) / e8) * 100; nearEma8 = pct >= 0 && pct <= 3; }
              if (e21 != null) { const pct = ((last - e21) / e21) * 100; nearEma21 = pct >= 0 && pct <= 5; }
            }
            const sectorName = SECTOR_SHORT_NAMES[data.baseSymbol] || data.title.replace(/^\d+\.\s*/, '');
            const sectorColor = SECTOR_COLORS[panelIdx % SECTOR_COLORS.length];
            results.push({
              sym: s,
              color: stockColors[colorIdx % stockColors.length],
              trail,
              sectorName,
              sectorColor,
              nearEma8,
              nearEma21,
            });
            colorIdx++;
          }
        });
      }

      const benchLabel = (isAll || benchChoice !== 'sector') ? (isAll && benchChoice === 'sector' ? 'SPY' : benchChoice) : sectorSym;
      return { stocks: results, sectorSym, benchLabel, panelIndex };
    }

    function drawStockRRG() {
      const canvas = document.getElementById('stock-rrg-canvas');
      if (!canvas) return;
      const tc = currentThemeColors;
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;

      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.scale(dpr, dpr);

      const W = rect.width, H = rect.height;

      const { stocks, sectorSym, benchLabel } = computeStockRRGData();
      if (stocks.length === 0) {
        ctx.fillStyle = tc.bgPrimary; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = tc.textQuaternary; ctx.font = '14px ' + getComputedStyle(document.body).fontFamily;
        ctx.textAlign = 'center'; ctx.fillText('Loading data...', W / 2, H / 2);
        return;
      }

      // Bounds
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      stocks.forEach(s => s.trail.forEach(p => {
        minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
        minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
      }));

      const rangeX = Math.max(maxX - 100, 100 - minX, 1) * 1.3;
      const rangeY = Math.max(maxY - 100, 100 - minY, 1) * 1.3;
      const range = Math.max(rangeX, rangeY);
      minX = 100 - range; maxX = 100 + range;
      minY = 100 - range; maxY = 100 + range;

      const margin = { top: 50, right: 30, bottom: 30, left: 50 };
      const plotW = W - margin.left - margin.right;
      const plotH = H - margin.top - margin.bottom;

      function toScreenX(v) { return margin.left + ((v - minX) / (maxX - minX)) * plotW; }
      function toScreenY(v) { return margin.top + ((maxY - v) / (maxY - minY)) * plotH; }

      // Clear
      ctx.fillStyle = tc.bgPrimary; ctx.fillRect(0, 0, W, H);

      // Quadrant backgrounds
      const cx = toScreenX(100), cy = toScreenY(100);
      ctx.fillStyle = tc.quadrantLeading;
      ctx.fillRect(cx, margin.top, margin.left + plotW - cx, cy - margin.top);
      ctx.fillStyle = tc.quadrantImproving;
      ctx.fillRect(margin.left, margin.top, cx - margin.left, cy - margin.top);
      ctx.fillStyle = tc.quadrantLagging;
      ctx.fillRect(margin.left, cy, cx - margin.left, margin.top + plotH - cy);
      ctx.fillStyle = tc.quadrantWeakening;
      ctx.fillRect(cx, cy, margin.left + plotW - cx, margin.top + plotH - cy);

      // Grid
      ctx.strokeStyle = tc.chartGridStrong; ctx.lineWidth = 0.5;
      const gridStep = range > 3 ? 1 : 0.5;
      for (let v = Math.ceil(minX); v <= maxX; v += gridStep) {
        const x = toScreenX(v);
        ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, margin.top + plotH); ctx.stroke();
      }
      for (let v = Math.ceil(minY); v <= maxY; v += gridStep) {
        const y = toScreenY(v);
        ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(margin.left + plotW, y); ctx.stroke();
      }

      // Center crosshair
      ctx.strokeStyle = tc.chartCrosshairCenter; ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(cx, margin.top); ctx.lineTo(cx, margin.top + plotH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(margin.left, cy); ctx.lineTo(margin.left + plotW, cy); ctx.stroke();
      ctx.setLineDash([]);

      // Title
      const period = document.getElementById('srrg-period').value;
      const periodLabel = period === 'daily' ? 'Daily' : 'Weekly';
      const shortName = SECTOR_SHORT_NAMES[sectorSym] || sectorSym;
      const fontFamily = getComputedStyle(document.body).fontFamily;
      ctx.fillStyle = tc.textQuaternary;
      ctx.font = 'bold 13px ' + fontFamily;
      ctx.textAlign = 'center';
      ctx.fillText(`${shortName} Stocks  \u00b7  ${periodLabel}  \u00b7  vs ${benchLabel}`, W / 2, margin.top - 12);

      // Axis labels
      ctx.fillStyle = tc.chartAxisText; ctx.font = 'bold 11px ' + fontFamily;
      ctx.textAlign = 'center';
      ctx.fillText('RS-Ratio \u2192', W / 2, H - 8);
      ctx.save(); ctx.translate(14, H / 2); ctx.rotate(-Math.PI / 2);
      ctx.fillText('RS-Momentum \u2192', 0, 0); ctx.restore();

      // Axis tick labels
      ctx.font = '9px ' + fontFamily; ctx.fillStyle = tc.chartAxisText;
      ctx.textAlign = 'center';
      for (let v = Math.ceil(minX); v <= maxX; v += gridStep) {
        if (Math.abs(v - 100) < 0.01) continue;
        ctx.fillText(v.toFixed(v % 1 === 0 ? 0 : 1), toScreenX(v), margin.top + plotH + 14);
      }
      ctx.textAlign = 'right';
      for (let v = Math.ceil(minY); v <= maxY; v += gridStep) {
        if (Math.abs(v - 100) < 0.01) continue;
        ctx.fillText(v.toFixed(v % 1 === 0 ? 0 : 1), margin.left - 6, toScreenY(v) + 3);
      }
      ctx.fillStyle = tc.textSecondary; ctx.font = 'bold 11px ' + fontFamily;
      ctx.textAlign = 'center'; ctx.fillText('100', cx, margin.top + plotH + 14);
      ctx.textAlign = 'right'; ctx.fillText('100', margin.left - 6, cy + 3);

      // Store positions for hover
      const stockPositions = [];

      // Draw trails and dots
      const activeSym = srrg_lockedStock || srrg_hoveredStock;
      stocks.forEach(s => {
        const isActive = activeSym === s.sym;
        const alpha = activeSym && !isActive ? 0 : 1;
        if (alpha === 0) return;

        if (s.trail.length > 1) {
          for (let i = 1; i < s.trail.length; i++) {
            const t = i / s.trail.length;
            ctx.strokeStyle = hexToRgba(s.color, (0.4 + t * 0.6) * alpha);
            ctx.lineWidth = 1.5 + t * 2;
            ctx.beginPath();
            ctx.moveTo(toScreenX(s.trail[i - 1].x), toScreenY(s.trail[i - 1].y));
            ctx.lineTo(toScreenX(s.trail[i].x), toScreenY(s.trail[i].y));
            ctx.stroke();
          }
          for (let i = 0; i < s.trail.length - 1; i++) {
            const t = i / s.trail.length;
            ctx.fillStyle = hexToRgba(s.color, (0.5 + t * 0.5) * alpha);
            ctx.beginPath();
            ctx.arc(toScreenX(s.trail[i].x), toScreenY(s.trail[i].y), 2.5, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Current dot
        const last = s.trail[s.trail.length - 1];
        const sx = toScreenX(last.x), sy = toScreenY(last.y);
        ctx.fillStyle = hexToRgba(s.color, alpha);
        ctx.beginPath();
        ctx.arc(sx, sy, isActive ? 8 : 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = hexToRgba(tc.textWhite, 0.6 * alpha);
        ctx.lineWidth = 1.5; ctx.stroke();

        // Label — show when active, or always if few stocks
        if (isActive || stocks.length <= 25) {
          const labelText = s.sym;
          const fontFamily = getComputedStyle(document.body).fontFamily;
          ctx.font = isActive ? 'bold 12px ' + fontFamily : 'bold 10px ' + fontFamily;
          ctx.textAlign = 'left';
          const lw = ctx.measureText(labelText).width;
          ctx.fillStyle = tc.canvasLabelBg;
          ctx.fillRect(sx + 7, sy - 7, lw + 6, 14);
          ctx.fillStyle = hexToRgba(tc.textWhite, alpha);
          ctx.fillText(labelText, sx + 10, sy + 4);
        }

        stockPositions.push({ sym: s.sym, x: sx, y: sy, color: s.color, last });
      });

      canvas._stockPositions = stockPositions;

      // Build legend
      if (!drawStockRRG._skipLegend) buildStockRRGSidebar(stocks);
      drawStockRRG._skipLegend = false;
    }

    function buildStockRRGSidebar(stocks) {
      const sidebarEl = document.getElementById('stock-rrg-sidebar');
      if (!sidebarEl) return;

      const tc = currentThemeColors;
      const activeSym = srrg_lockedStock || srrg_hoveredStock;

      // Classify each stock into quadrant groups
      const groups = { leading: [], improving: [], weakening: [], lagging: [] };
      let maxDist = 0;

      stocks.forEach(s => {
        const curr = s.trail[s.trail.length - 1];
        const prev = s.trail.length >= 2 ? s.trail[s.trail.length - 2] : curr;
        const currQ = getQuadrant(curr.x, curr.y);
        const prevQ = getQuadrant(prev.x, prev.y);
        const isCrossing = currQ !== prevQ;
        const dist = Math.sqrt((curr.x - 100) ** 2 + (curr.y - 100) ** 2);
        if (dist > maxDist) maxDist = dist;
        const { arrow, signal } = rrgHeading(s.trail);

        groups[currQ].push({ ...s, dist, isCrossing, prevQ, arrow, signal, currQ });
      });

      // Sort within each group for trade-finding:
      // Leading: momentum (y) desc — accelerating leaders first, fading ones last
      // Improving: RS-Ratio (x) desc — closest to crossing into Leading first
      // Weakening: momentum (y) asc — most urgent sells first
      // Lagging: momentum (y) desc — potential bottoms/turnarounds first
      for (const q of QUADRANT_ORDER) {
        groups[q].sort((a, b) => {
          const aCurr = a.trail[a.trail.length - 1];
          const bCurr = b.trail[b.trail.length - 1];
          if (q === 'improving') return bCurr.x - aCurr.x;
          if (q === 'weakening') return aCurr.y - bCurr.y;
          return bCurr.y - aCurr.y;
        });
      }

      // Rebuild legend order for arrow key navigation
      srrg_legendOrder = [];
      for (const q of QUADRANT_ORDER) {
        groups[q].forEach(s => srrg_legendOrder.push(s.sym));
      }

      // Build nav buttons
      const navEl = document.getElementById('srrg-quad-nav');
      let navHtml = '';
      for (const q of QUADRANT_ORDER) {
        const meta = QUADRANT_META[q];
        const qColor = tc[meta.colorVar];
        const count = groups[q].length;
        navHtml += `<button class="srrg-quad-btn" style="color:${qColor};border-color:${qColor}40" data-quad="${q}">${meta.short} <span class="count">${count}</span></button>`;
      }
      navEl.innerHTML = navHtml;

      // Build list content
      const listEl = document.getElementById('srrg-sidebar-list');
      const isAllSectors = document.getElementById('srrg-sector').value === 'all';
      const sidebar = document.getElementById('stock-rrg-sidebar');
      const secActive = sidebar.classList.contains('show-sectors');
      if (!isAllSectors) sidebar.classList.remove('show-sectors');
      let html = rrgTipsHTML(tc);
      if (isAllSectors) {
        html += `<div style="display:flex;justify-content:flex-end;padding:4px 8px 0"><button class="srrg-toggle-sec" id="srrg-toggle-sec">${secActive ? 'Hide Sectors' : 'Show Sectors'}</button></div>`;
      }
      for (const q of QUADRANT_ORDER) {
        const items = groups[q];
        if (items.length === 0) continue;
        const meta = QUADRANT_META[q];
        const qColor = tc[meta.colorVar];

        html += `<div id="srrg-q-${q}"></div>`;
        html += `<div class="rrg-group-header" style="color:${qColor}"><span>\u25CF ${meta.label}</span><span class="count">${items.length}</span></div>`;

        items.forEach(s => {
          const distPct = maxDist > 0 ? Math.min(100, Math.round(s.dist / maxDist * 100)) : 0;

          const arrowColor = s.signal === 'bullish' ? tc.semanticBullish : s.signal === 'bearish' ? tc.semanticBearish : tc.textQuaternary;
          const isBullishCross = s.isCrossing && (q === 'leading' || q === 'improving');
          const isActive = activeSym === s.sym;
          const itemCls = 'rrg-legend-item' + (isBullishCross ? ' rrg-actionable' : '') + (isActive ? ' rrg-active' : '');

          const sFav = gridFavorites.has(s.sym);
          html += `<div class="${itemCls}" data-sym="${s.sym}">
            <span class="rrg-legend-dot" style="background:${s.color}"></span>${sFav ? '<span class="rrg-legend-fav">\u2605</span>' : ''}
            <span class="rrg-legend-sym">${s.sym}</span>
            <span class="rrg-heading" style="color:${arrowColor}">${s.arrow}</span>
            <span class="rrg-legend-tags">${s.isCrossing ? `<span class="rrg-crossing" style="color:${qColor};background:${qColor}22">NEW</span><span class="rrg-from" style="color:${tc[QUADRANT_META[s.prevQ].colorVar]}">from ${QUADRANT_META[s.prevQ].short}</span>` : ''}${s.nearEma21 ? '<span class="rrg-ema-tag">E21</span>' : ''}${s.nearEma8 ? '<span class="rrg-ema-tag">E8</span>' : ''}</span>
            <span class="rrg-distance-bar"><span class="fill" style="width:${distPct}%;background:${qColor}"></span></span>
            <span class="rrg-legend-sector"${s.sectorColor ? ` style="color:${s.sectorColor}"` : ''}>${s.sectorName || ''}</span>
          </div>`;
        });
      }
      listEl.innerHTML = html;

      // Quadrant nav button clicks — scroll the list container
      navEl.querySelectorAll('.srrg-quad-btn[data-quad]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const q = btn.dataset.quad;
          const anchor = document.getElementById('srrg-q-' + q);
          if (anchor) {
            listEl.scrollTo({ top: anchor.offsetTop, behavior: 'smooth' });
          }
        });
      });

      // Sector column toggle
      const secBtn = document.getElementById('srrg-toggle-sec');
      if (secBtn) {
        const sidebar = document.getElementById('stock-rrg-sidebar');
        secBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          sidebar.classList.toggle('show-sectors');
          const showing = sidebar.classList.contains('show-sectors');
          secBtn.textContent = showing ? 'Hide Sectors' : 'Show Sectors';
          drawStockRRGChartOnly();
        });
      }

      // Scroll the active item into view
      if (activeSym) {
        const activeEl = listEl.querySelector(`.rrg-legend-item[data-sym="${activeSym}"]`);
        if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
      }
    }

    // Stock RRG canvas mouse events
    const stockRRGCanvas = document.getElementById('stock-rrg-canvas');
    if (stockRRGCanvas) {
      stockRRGCanvas.addEventListener('mousemove', function(e) {
        if (srrg_lockedStock) return; // don't hover when locked
        const rect = this.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const positions = this._stockPositions || [];
        let closest = null, closestDist = 20;
        positions.forEach(p => {
          const d = Math.sqrt((p.x - mx) ** 2 + (p.y - my) ** 2);
          if (d < closestDist) { closest = p.sym; closestDist = d; }
        });
        if (closest !== srrg_hoveredStock) {
          srrg_hoveredStock = closest;
          drawStockRRG();
        }
      });
      stockRRGCanvas.addEventListener('mouseleave', function() {
        if (srrg_lockedStock) return;
        if (srrg_hoveredStock) {
          srrg_hoveredStock = null;
          drawStockRRG();
        }
      });
    }

    // Stock RRG legend events (hover, click, keyboard)
    const stockRRGLegendEl = document.getElementById('srrg-sidebar-list');
    if (stockRRGLegendEl) {
      let srrgHoverTimer = null;
      stockRRGLegendEl.addEventListener('mouseenter', (e) => {
        if (srrg_lockedStock) return;
        const item = e.target.closest('.rrg-legend-item');
        if (!item) return;
        const sym = item.dataset.sym;
        if (sym && sym !== srrg_hoveredStock) {
          clearTimeout(srrgHoverTimer);
          srrgHoverTimer = setTimeout(() => {
            srrg_hoveredStock = sym;
            drawStockRRGChartOnly();
          }, 120);
        }
      }, true);
      stockRRGLegendEl.addEventListener('mouseleave', () => {
        clearTimeout(srrgHoverTimer);
        if (srrg_lockedStock) return;
        if (srrg_hoveredStock) {
          srrg_hoveredStock = null;
          drawStockRRGChartOnly();
        }
      });
      stockRRGLegendEl.addEventListener('click', (e) => {
        const item = e.target.closest('.rrg-legend-item');
        if (!item) return;
        const sym = item.dataset.sym;
        if (sym) {
